const L=[
{id:1,t:"Time Value of Money & NPV",i:"\u23f3",co:"#1a5276",ch:"Present Value & Discounting",
kp:["Money has time value \u2014 \u00a3100 today > \u00a3100 future (interest, inflation, risk)","Compounding: PV\u2192FV. Discounting: FV\u2192PV (the reverse)","Discount factor 1/(1+r)^n shrinks as n grows","NPV = \u03a3 discounted CFs \u2212 initial investment","Decision: Accept if NPV \u2265 0, reject otherwise","Mutually exclusive: choose highest NPV"],
fm:[{n:"Future Value",eq:"FV = PV \u00d7 (1+r)^n",c:"Investment grows to this"},{n:"Present Value",eq:"PV = FV / (1+r)^n",c:"Today\u2019s value of a future CF"},{n:"Discount Factor",eq:"DF = 1/(1+r)^n",c:"Always 0\u20131, converts FV\u2192PV"},{n:"NPV",eq:"NPV = \u03a3[CF_t/(1+r)^t] \u2212 I_0",c:"Value created above required return"}],
dd:"A pound today > a pound tomorrow because of (1) time impatience, (2) risk, (3) inflation. The discount rate r captures all three. NPV transforms all CFs to year-0 equivalents. Positive NPV = project exceeds investors\u2019 required return.",
tf:[{h:"The \u2018time machine\u2019 model",b:"Discounting = time machine bringing future money to today. DF is the exchange rate. At 10%, \u00a31 next year = \u00a30.91 today. Always ask: WHEN does each CF occur, WHAT RATE translates it?"},{h:"The \u2018minimum bar\u2019 trick",b:"NPV > 0 doesn\u2019t mean profit \u2014 it means the project EXCEEDS the minimum return investors demand. The discount rate IS the bar."},{h:"Exam setup",b:"Draw table: Year | CF | DF | PV. Compute DF = 1/(1+r)^n for each year. Multiply CF\u00d7DF. Sum PVs. Subtract I_0. Write decision rule: \u2018Since NPV > 0, accept.\u2019"}],
pq:[{q:"Project costs \u00a3200,000. CFs: Yr1=\u00a360k, Yr2=\u00a370k, Yr3=\u00a380k, Yr4=\u00a390k. Rate=12%. Find NPV.",a:"Year 0: \u2212\u00a3200,000 \u00d7 1.0000 = \u2212\u00a3200,000\nYear 1: \u00a360,000 \u00d7 1/1.12^1 = \u00d7 0.8929 = \u00a353,571\nYear 2: \u00a370,000 \u00d7 1/1.12^2 = \u00d7 0.7972 = \u00a355,804\nYear 3: \u00a380,000 \u00d7 1/1.12^3 = \u00d7 0.7118 = \u00a356,943\nYear 4: \u00a390,000 \u00d7 1/1.12^4 = \u00d7 0.6355 = \u00a357,195\n\nNPV = \u2212200,000 + 53,571 + 55,804 + 56,943 + 57,195\nNPV = +\u00a323,513\n\nSince NPV > 0, ACCEPT. Creates \u00a323,513 above 12% return.\n\nSpot: initial investment (neg CF at yr 0), the discount rate, timing of each CF."},{q:"Project A: costs \u00a3100k, NPV=\u00a330k. Project B: costs \u00a3500k, NPV=\u00a380k. Mutually exclusive. Which?",a:"Project B \u2014 higher NPV (\u00a380k > \u00a330k).\n\nNPV measures ABSOLUTE value. Even if A has higher % return, B creates \u00a350k more value. This is why NPV > IRR for mutually exclusive decisions."}]},

{id:2,t:"Interest Rates & Appraisal",i:"\ud83d\udcca",co:"#1e8449",ch:"Returns & Project Selection",
kp:["The discount rate is what investors demand as a MINIMUM return \u2014 it\u2019s the price of using their money. If a project can\u2019t beat this rate, it\u2019s destroying value.",
"A \u2018return\u2019 is simply what you get back relative to what you put in. \u00a3100 in, \u00a3150 out = 50% return. But TIME matters \u2014 50% over 1 year is great, 50% over 20 years is terrible.",
"Simple average return (total%/years) is WRONG for multi-year investments because it ignores compounding. Use the geometric average instead.",
"AER (Annual Equivalent Rate) is the TRUE annual rate when interest compounds more than once a year. A bank quoting 8% compounded quarterly is really charging 8.24%.",
"IRR is the discount rate that makes NPV exactly zero. Think of it as asking: \u2018what rate of return does this project actually earn?\u2019 If that rate exceeds what investors demand (k), the project is worth doing.",
"IRR has serious problems: (1) non-conventional cash flows can give multiple answers, (2) it ignores project SIZE so can rank mutually exclusive projects wrongly, (3) sometimes no IRR exists at all.",
"Payback asks \u2018how quickly do I get my money back?\u2019 Simple and popular, but ignores the time value of money and everything that happens after the payback date.",
"AAR uses accounting profit and book values, not actual cash flows. It depends on arbitrary depreciation methods and is not a true economic return."],
fm:[{n:"Geometric Return",eq:"r = (FV/PV)^(1/n) \u2212 1",c:"The TRUE annualised return that properly reverses compounding. Use this, not simple average."},{n:"AER",eq:"AER = (1+r/m)^m \u2212 1",c:"Converts a quoted rate with m compounding periods into what you ACTUALLY earn/pay per year."},{n:"Doubling Time",eq:"n = log(2)/log(1+r)",c:"How many years to double. Quick check: Rule of 72 = 72/rate."},{n:"IRR Interpolation",eq:"IRR = r+ + [NPV+/(NPV+\u2212NPV\u2212)] \u00d7 (r\u2212 \u2212 r+)",c:"Estimates the exact rate where NPV crosses zero, using two trial rates."},{n:"Payback",eq:"PP = Full years + Remaining/Next year\u2019s CF",c:"Time to recover investment. Crude but intuitive."},{n:"AAR",eq:"Avg Net Income / Avg Book Value",c:"Accounting ratio, not a real return. Avoid unless asked."}],
dd:"This entire lecture answers one question: \u2018Is this project worth doing?\u2019 There are four methods to answer it, and they sometimes disagree.\n\nThe CORE IDEA is that investors have alternatives. If they give money to your project, they can\u2019t invest it elsewhere. So your project must earn at least as much as their best alternative \u2014 this is the cost of capital (k). NPV checks whether the project beats this bar (in \u00a3). IRR checks the same thing (in %).\n\nWhy do we need IRR if NPV already works? Because managers find percentages more intuitive. \u2018This project returns 17%\u2019 is easier to grasp than \u2018this project has NPV of \u00a323,513\u2019. But IRR can mislead, which is why NPV is the gold standard.\n\nWhy geometric average instead of simple? Imagine investing \u00a3100 that doubles to \u00a3200 in year 1 (+100%) then falls back to \u00a3100 in year 2 (\u221250%). Simple average: (100%+(\u221250%))/2 = +25%. But you\u2019re back where you started! The geometric average correctly gives 0%.\n\nWhy AER matters: Banks quote nominal rates to look cheap. \u20188% compounded quarterly\u2019 sounds like 8% but is really 8.24% because each quarter\u2019s interest earns interest in the next quarter. AER reveals the true cost.",
tf:[{h:"WHY do we need different appraisal methods?",b:"Imagine you\u2019re a CEO deciding whether to build a new factory. You need to answer: (1) Does it create value? \u2192 NPV tells you in pounds. (2) What return does it earn? \u2192 IRR tells you as a percentage. (3) How quickly do I get my money back? \u2192 Payback tells you in years. Each answers a different question. NPV is the most reliable because it measures actual value created."},{h:"The \u2018opportunity cost\u2019 concept (why the discount rate exists)",b:"If you invest \u00a3100k in Project A, you CAN\u2019T invest that \u00a3100k in Project B. The discount rate represents what you\u2019re giving up \u2014 the return you could earn elsewhere. If the stock market returns 10%, any project must beat 10% to be worthwhile. That\u2019s why we discount at the cost of capital."},{h:"Simple vs Geometric average \u2014 the trap",b:"\u00a3100 \u2192 \u00a3200 (+100%) \u2192 \u00a3100 (\u221250%). Simple average: (100\u221250)/2 = +25%. But you made NOTHING! Geometric: (100/100)^(1/2)\u22121 = 0%. The geometric average is correct because it reverses the compounding process. Simple average always overstates multi-period returns."},{h:"AER in plain English",b:"A bank says \u20188% interest, compounded quarterly.\u2019 That means every 3 months they add 2% (=8%/4) to your balance. But in Q2, you earn 2% on the original PLUS 2% on Q1\u2019s interest. By year-end you actually earned 8.24%, not 8%. The more frequently they compound, the higher the true rate. AER strips away the marketing and shows reality."},{h:"When methods disagree (EXAM FAVOURITE)",b:"NPV says Project A is better (\u00a380k vs \u00a330k). IRR says Project B is better (24% vs 18%). Who\u2019s right? NPV \u2014 always. The conflict happens because IRR ignores scale. B earns a higher RATE on a smaller investment. A earns a lower rate on a larger investment but creates more TOTAL VALUE. Think: would you prefer 50% return on \u00a310, or 10% return on \u00a310,000?"}],
pq:[{q:"NPV at 12% = +\u00a323,513. NPV at 20% = \u2212\u00a312,208. Find IRR. Cost of capital = 15%.",a:"WHAT ARE WE DOING? Finding the exact rate where NPV = 0.\nWe know NPV is positive at 12% and negative at 20%.\nSo the \u2018zero crossing\u2019 must be somewhere between 12% and 20%.\n\nIRR = r+ + [NPV+ / (NPV+ \u2212 NPV\u2212)] \u00d7 (r\u2212 \u2212 r+)\n\nr+ = 12% (the rate giving positive NPV)\nr\u2212 = 20% (the rate giving negative NPV)\nNPV+ = 23,513\nNPV\u2212 = \u221212,208\n\nIRR = 12% + [23,513 / (23,513 \u2212 (\u221212,208))] \u00d7 (20% \u2212 12%)\n    = 12% + [23,513 / 35,721] \u00d7 8%\n    = 12% + 0.6584 \u00d7 8%\n    = 12% + 5.27%\n    = 17.27%\n\nDecision: IRR (17.27%) > cost of capital (15%) \u2192 ACCEPT.\nThe project earns 17.27% but investors only demand 15%.\n\nSETUP TIP: Always show the two NPV calculations first."},{q:"Nominal rate 8% compounded quarterly. Find AER.",a:"WHAT IS THE QUESTION REALLY ASKING?\nThe bank says \u20188%\u2019 but compounds 4 times a year.\nWhat do you ACTUALLY earn by the end of the year?\n\nAER = (1 + r/m)^m \u2212 1\n\nr = 0.08 (the quoted/nominal rate)\nm = 4 (quarterly = 4 times per year)\n\nAER = (1 + 0.08/4)^4 \u2212 1\n    = (1 + 0.02)^4 \u2212 1\n    = (1.02)^4 \u2212 1\n    = 1.0824 \u2212 1\n    = 0.0824 = 8.24%\n\nThe real rate is 8.24%, not 8%.\nThe extra 0.24% comes from earning interest on interest.\n\nCommon frequencies: monthly=12, quarterly=4, semi-annual=2, daily=365."},{q:"Invest \u00a31,000, receive \u00a31,350 after 4 years. Annualised return? Doubling time?",a:"WHAT IS THE QUESTION ASKING?\nYou made 35% total over 4 years. But what\u2019s the\nANNUAL rate that produces this result with compounding?\n\nr = (FV/PV)^(1/n) \u2212 1\n  = (1350/1000)^(1/4) \u2212 1\n  = (1.35)^(0.25) \u2212 1\n  = 1.0778 \u2212 1\n  = 7.78% per year\n\nWHY NOT 35%/4 = 8.75%?\nBecause simple average ignores compounding.\n7.78% compounded 4 years: 1000 \u00d7 1.0778^4 = 1,350 \u2713\n8.75% compounded 4 years: 1000 \u00d7 1.0875^4 = 1,397 \u2718 (too high!)\n\nDOUBLING TIME:\nn = log(2)/log(1+r) = log(2)/log(1.0778)\n  = 0.693/0.0749 = 9.25 years\n\nRule of 72 quick check: 72/7.78 \u2248 9.3 years \u2713"},{q:"Project A: Initial \u00a3100k, NPV = \u00a330k, IRR = 24%.\nProject B: Initial \u00a3400k, NPV = \u00a380k, IRR = 18%.\nMutually exclusive. Which should be chosen? Why do NPV and IRR disagree?",a:"NPV says: Project B (\u00a380k > \u00a330k) \u2192 B creates more value.\nIRR says: Project A (24% > 18%) \u2192 A earns a higher rate.\n\nCORRECT ANSWER: Choose Project B.\n\nWHY THEY DISAGREE:\nIRR ignores SCALE. A earns 24% but on only \u00a3100k.\nB earns 18% but on \u00a3400k.\n\n24% \u00d7 \u00a3100k = \u00a324k of value created\n18% \u00d7 \u00a3400k = \u00a372k of value created\n(These are approximate \u2014 NPV is more precise)\n\nAnalogy: Would you prefer 50% return on \u00a310\nor 10% return on \u00a310,000?\n50% \u00d7 10 = \u00a35 vs 10% \u00d7 10,000 = \u00a31,000.\n\nNPV measures VALUE. IRR measures RATE.\nWhen they conflict, NPV wins. Always."}]},

{id:3,t:"Financial Markets & EMH",i:"\ud83c\udfdb\ufe0f",co:"#7d3c98",ch:"Market Efficiency & Share Valuation",
kp:["Money markets (<1yr) vs Capital markets (>1yr)","Ordinary shares: residual, voting, variable dividends","Preference shares: fixed div, liquidation priority","P = CF/r (flat perp) or CF1/(r\u2212g) (growing)","P/E = 1/(r\u2212g) encodes risk and growth","EMH: price = best estimate of true value","Weak: tech analysis fails. Semi-strong: fundamental fails","Strong: even insider info reflected (probably not true)"],
fm:[{n:"Flat Perpetuity",eq:"V = CF / r",c:"Infinite constant CF"},{n:"Growing Perpetuity",eq:"V = CF1 / (r\u2212g)",c:"CFs grow at g, need g<r"},{n:"Share Price (Gordon)",eq:"P = d1 / (r\u2212g)",c:"Next dividend / (r\u2212g)"},{n:"P/E Ratio",eq:"P/E = 1/(r\u2212g)",c:"High P/E = low risk or high growth"},{n:"Enterprise Value",eq:"EV = Equity + Debt \u2212 Cash",c:"Total firm value"}],
dd:"EMH: thousands of investors in aggregate make price reflect all info. Galton\u2019s ox (787 guesses, 1lb off). Evidence FOR: event studies, random walk. AGAINST: anomalies, bubbles, behavioural finance.",
tf:[{h:"d0 vs d1 trap (CRITICAL)",b:"Gordon model needs NEXT year\u2019s dividend (d1). If given current dividend d0, compute d1 = d0\u00d7(1+g). Using d0 is the most common exam error."},{h:"Three EMH layers",b:"Weak (easiest to defend) \u2192 Semi-strong (mostly true) \u2192 Strong (almost certainly false). Always present both sides in essays."},{h:"Two-variable trick",b:"Every share price = just r and g. High P/E = low r or high g. If you know price + one variable, solve for the other."}],
pq:[{q:"Company paid \u00a32.40 dividend. Growth=5% forever. Required return=12%. Share price?",a:"Step 1: d1 = d0 \u00d7 (1+g) = 2.40 \u00d7 1.05 = \u00a32.52\nStep 2: P = d1/(r\u2212g) = 2.52/(0.12\u22120.05) = 2.52/0.07 = \u00a336.00\n\nCRITICAL: Using d0 gives 2.40/0.07 = \u00a334.29 \u2014 WRONG.\n\nWith g=0: P = 2.40/0.12 = \u00a320. Growth adds \u00a316 (44% of price)."},{q:"Firm: earnings \u00a35/share, P/E=16. What\u2019s implied r\u2212g?",a:"r\u2212g = 1/P/E = 1/16 = 6.25%\n\nIf r\u224810%, then g\u22483.75%\nShare price: \u00a35 \u00d7 16 = \u00a380\nCheck: 5/0.0625 = \u00a380 \u2713"}]},

{id:4,t:"Bonds & Bond Pricing",i:"\ud83d\udcdc",co:"#b9770e",ch:"Fixed Income Securities",
kp:["Bond: maturity, face value, coupon rate, frequency","Value = PV coupons + PV face value","Coupon=YTM\u2192par | <YTM\u2192discount | >YTM\u2192premium","Prices and yields: OPPOSITE directions","Coupons = annuity \u2192 use annuity factor","LIBOR \u2192 SONIA (UK), SOFR (US)","Credit ratings: Moody\u2019s, S&P"],
fm:[{n:"Bond Price",eq:"P = \u03a3[C/(1+y)^t] + FV/(1+y)^n",c:"Discount each coupon + FV"},{n:"Annuity Method",eq:"P = C\u00d7AF + FV\u00d7DF",c:"Faster: AF for coupons, DF for FV"},{n:"Annuity Factor",eq:"AF = [1\u22121/(1+y)^n] / y",c:"PV of \u00a31/yr for n yrs"},{n:"Coupon",eq:"C = Rate \u00d7 Face Value",c:"Annual interest payment"}],
dd:"Key: when market rates rise, existing bonds less attractive (fixed coupons < new rate) so price falls. When rates fall, higher-coupon bonds become valuable. At par: coupon rate = YTM.",
tf:[{h:"The seesaw",b:"Prices and yields on opposite ends. One up, other down. Predict direction BEFORE calculating."},{h:"Par checkpoint (sanity check)",b:"Coupon=YTM \u2192 price MUST = face value. Coupon>YTM \u2192 premium. Coupon<YTM \u2192 discount. If answer violates this, you have an error."},{h:"Semi-annual bonds",b:"Halve coupon rate, double periods, halve YTM. E.g. 6% annual, 5yr, 8% YTM \u2192 3% coupon, 10 periods, 4% rate."},{h:"What to spot",b:"Face value (\u00a31,000 or \u00a3100), coupon RATE (multiply by FV for \u00a3), YTM, maturity. Check if semi-annual."}],
pq:[{q:"Bond: FV=\u00a31,000, coupon=6% annual, 5yr, YTM=8%. Price? Par/premium/discount?",a:"C = 6% \u00d7 \u00a31,000 = \u00a360/year\n\nIndividual method:\nYr1: 60/1.08^1 = 55.56   Yr2: 60/1.08^2 = 51.44\nYr3: 60/1.08^3 = 47.63   Yr4: 60/1.08^4 = 44.10\nYr5: 60/1.08^5 = 40.83   FV: 1000/1.08^5 = 680.58\nPrice = 55.56+51.44+47.63+44.10+40.83+680.58 = \u00a3920.15\n\nAnnuity method (faster):\nAF(8%,5) = [1\u22121/1.08^5]/0.08 = [1\u22120.6806]/0.08 = 3.9927\nP = 60\u00d73.9927 + 1000\u00d70.6806 = 239.56+680.58 = \u00a3920.15 \u2713\n\nDISCOUNT (\u00a3920 < \u00a31,000) because coupon 6% < YTM 8%."},{q:"Same bond, YTM drops to 4%. New price?",a:"AF(4%,5) = [1\u22121/1.04^5]/0.04 = 4.4518\nP = 60\u00d74.4518 + 1000\u00d70.8219 = 267.11+821.93 = \u00a31,089.04\n\nPREMIUM (\u00a31,089 > \u00a31,000) because coupon 6% > YTM 4%.\n\nSummary: 8%\u2192\u00a3920 (disc), 6%\u2192\u00a31,000 (par), 4%\u2192\u00a31,089 (prem).\nAs YTM falls, price rises. The seesaw."}]},

{id:5,t:"Risk, Return & Portfolio Theory",i:"\u2696\ufe0f",co:"#c0392b",ch:"Markowitz & Diversification",
kp:["Risk = standard deviation of returns","Risk-averse: need positive EV to take risk","Loss aversion: pain of loss > pleasure of equal gain","Diversification works if correlation < +1","Zero correlation: same return, lower risk","Efficient frontier: optimal return/risk portfolios","CML: risk-free + market portfolio M"],
fm:[{n:"Expected Value",eq:"E(V) = \u03a3 Vi\u00d7Pi",c:"Probability-weighted average"},{n:"Variance",eq:"\u03c3\u00b2 = \u03a3 Pi\u00d7(Vi\u2212E(V))\u00b2",c:"Avg squared deviation"},{n:"Std Dev",eq:"\u03c3 = \u221a\u03c3\u00b2",c:"Risk in return units"},{n:"Portfolio Var",eq:"\u03c3\u00b2p = w1\u00b2\u03c31\u00b2 + w2\u00b2\u03c32\u00b2 + 2w1w2\u03c31\u03c32\u03c1",c:"Weights + risks + correlation"},{n:"Portfolio Return",eq:"E(Rp) = w1\u00d7E(R1) + w2\u00d7E(R2)",c:"Simple weighted average"}],
dd:"Markowitz (1952): spreading investments reduces risk. Correlation is key. At \u03c1=+1 no benefit. At \u03c1=\u22121 risk eliminated. At \u03c1=0 significant reduction. Coin flip: two \u00a310 bets vs one \u00a320 bet \u2014 same EV, worst-case drops 50%\u219225%.",
tf:[{h:"Return additive, risk NOT",b:"Portfolio return = weighted average. But portfolio risk \u2260 weighted average \u2014 covariance term makes it LESS. This is diversification\u2019s mathematical basis."},{h:"Variance recipe",b:"(1) Find E(V), (2) Subtract mean from each outcome, (3) Square, (4) Multiply by probability, (5) Sum = variance. SD = square root. Set up columns."},{h:"Zero correlation shortcut",b:"When \u03c1=0, the covariance term 2w1w2\u03c31\u03c32\u03c1 vanishes. Much simpler: \u03c3\u00b2p = w1\u00b2\u03c31\u00b2 + w2\u00b2\u03c32\u00b2 only."}],
pq:[{q:"Stock X: Boom(P=0.3)=20%, Normal(P=0.5)=10%, Recession(P=0.2)=\u22125%. Find E(R), \u03c3\u00b2, \u03c3.",a:"E(R) = 0.3\u00d720% + 0.5\u00d710% + 0.2\u00d7(\u22125%) = 6+5\u22121 = 10%\n\nVariance:\nBoom:   0.3\u00d7(20\u221210)\u00b2 = 0.3\u00d7100 = 30\nNormal: 0.5\u00d7(10\u221210)\u00b2 = 0\nRecess: 0.2\u00d7(\u22125\u221210)\u00b2 = 0.2\u00d7225 = 45\n\u03c3\u00b2 = 30+0+45 = 75 (%\u00b2) = 0.0075\n\n\u03c3 = \u221a75 = 8.66%"},{q:"P: E(R)=12%, \u03c3=20%. Q: E(R)=8%, \u03c3=10%. Correlation=0. 50/50 portfolio.",a:"Return: 0.5\u00d712% + 0.5\u00d78% = 10%\n\nVariance (\u03c1=0):\n\u03c3\u00b2p = 0.25\u00d7400 + 0.25\u00d7100 = 100+25 = 125\n\u03c3p = \u221a125 = 11.18%\n\nWeighted avg risk would be: 0.5\u00d720+0.5\u00d710 = 15%\nActual: 11.18% \u2014 risk REDUCED by 3.82pp!\nSame return, less risk = diversification benefit."}]},

{id:6,t:"CAPM",i:"\u03b2",co:"#2471a3",ch:"Systematic Risk & Asset Pricing",
kp:["Diversification limit ~20 assets","Systematic (market) vs Unsystematic (firm) risk","Market compensates ONLY systematic risk","\u03b2 = Cov(Ri,Rm)/Var(Rm)","\u03b2=1 market, >1 more volatile, <1 less","SML: E(Ri) = Rf + \u03b2i(Rm\u2212Rf)","Above SML=undervalued, Below=overvalued","Fama & French (1992) multi-factor critique","Better than DGM: explicitly models risk"],
fm:[{n:"Beta",eq:"\u03b2 = Cov(Ri,Rm) / Var(Rm)",c:"Co-movement with market"},{n:"SML",eq:"E(Ri) = Rf + \u03b2(Rm\u2212Rf)",c:"Fair return for systematic risk"},{n:"MRP",eq:"MRP = Rm \u2212 Rf",c:"Market risk premium"},{n:"Covariance",eq:"Cov = \u03a3 Pi(Xi\u2212X\u0304)(Yi\u2212Y\u0304)",c:"Joint movement"}],
dd:"CAPM builds on Markowitz. Only systematic risk rewarded. Beta quantifies it. SML gives fair return = Ke for WACC. Fama & French showed size+value explain better, but CAPM remains standard.",
tf:[{h:"Beta as \u2018for every 1%\u2019",b:"\u03b2=1.5: for every 1% market moves, stock moves ~1.5%. Simple interpretation."},{h:"SML as fair-price line",b:"Above = undervalued (buy). Below = overvalued (sell). On = fairly priced."},{h:"CAPM vs DGM",b:"CAPM: models risk via \u03b2, works for all stocks. DGM: Ke=D1/P0+g, only dividend-payers. CAPM generally superior."},{h:"Beta calculation steps",b:"(1) Mean returns for stock & market, (2) Deviations, (3) Stock dev \u00d7 market dev \u00d7 prob = covariance, (4) Market variance, (5) \u03b2 = cov/var."}],
pq:[{q:"Rf=3%, Rm=11%. Stock A: \u03b2=1.4, Stock B: \u03b2=0.7. Expected returns? A yields 14%: over/undervalued?",a:"A: E(R) = 3% + 1.4\u00d7(11%\u22123%) = 3% + 11.2% = 14.2%\nB: E(R) = 3% + 0.7\u00d78% = 3% + 5.6% = 8.6%\n\nStock A: CAPM says 14.2%, actual 14%.\n14% < 14.2% \u2192 BELOW SML \u2192 OVERVALUED.\nNot enough return for its risk."},{q:"Cov(Stock,Market)=0.006, Var(Market)=0.004. Rf=2%, Rm=10%. Find \u03b2 and E(R).",a:"\u03b2 = 0.006/0.004 = 1.5\n\nE(R) = 2% + 1.5\u00d7(10%\u22122%) = 2%+12% = 14%\n\n1.5\u00d7 market volatility \u2192 investors need 14%."}]},

{id:7,t:"Derivatives & FOREX",i:"\ud83c\udf10",co:"#117a65",ch:"Risk Management & Currency",
kp:["Derivative = value from underlying","Forwards: OTC, customised, counterparty risk","Futures: exchange, standardised, mark-to-market","Options: right not obligation, premium","Asymmetric payoff: limited loss, unlimited gain","Swaps: exchange CFs (fixed\u2194floating)","Zero-sum game","PPP: FX adjusts for inflation","IRP: interest diffs \u2192 forward premium/discount","3 FX risks: Transaction, Translation, Economic"],
fm:[{n:"Call Profit",eq:"max(S\u2212E,0) \u2212 Premium",c:"Exercise if S>E"},{n:"Put Profit",eq:"max(E\u2212S,0) \u2212 Premium",c:"Exercise if E>S"},{n:"Margin Call",eq:"Balance < maintenance margin",c:"Top up to initial"},{n:"PPP",eq:"\u0394FX \u2248 Infl_dom \u2212 Infl_for",c:"Higher inflation \u2192 depreciation"},{n:"IRP",eq:"F/S = (1+rd)/(1+rf)",c:"Forward eliminates arbitrage"}],
dd:"Forwards fix future prices but you\u2019re stuck. Futures add clearing + mark-to-market. Options: premium for right (not obligation). Swaps transform exposure.",
tf:[{h:"Options as insurance",b:"Put = insurance on shares. Premium = cost. Price falls below exercise \u2192 pays out. High = lose premium but happy."},{h:"Forwards vs Futures",b:"Bespoke suit (tailored, counterparty risk) vs off-the-rack (standardised, exchange guarantee). Know the 6 dimensions."},{h:"Margin tracking",b:"Initial margin \u2192 daily P&L \u2192 adjust \u2192 if below maintenance \u2192 top up to INITIAL (not maintenance). Net P&L = (final\u2212entry)\u00d7contracts."}],
pq:[{q:"Buy call: E=\u00a350, premium=\u00a34. At maturity: (a)\u00a360 (b)\u00a352 (c)\u00a345.",a:"(a) S=60: Payoff=max(60\u221250,0)=10. Profit=10\u22124= +\u00a36. Exercise YES.\n(b) S=52: Payoff=max(52\u221250,0)=2. Profit=2\u22124= \u2212\u00a32. Exercise YES (recover \u00a32).\n(c) S=45: Payoff=max(45\u221250,0)=0. Profit=\u2212\u00a34. Exercise NO.\n\nBreak-even: \u00a354. Max loss = premium (\u00a34). Upside unlimited."},{q:"Long 5 futures at \u00a3500. Initial margin=\u00a3500, maintenance=\u00a3375.\nDay2:\u00a3490, Day3:\u00a3470, Day4:\u00a3485, Day5:\u00a3510.",a:"Day1: P=500, Bal=\u00a3500\nDay2: PL=(490\u2212500)\u00d75=\u221250. Bal=450. Call? No (>375)\nDay3: PL=(470\u2212490)\u00d75=\u2212100. Bal=350. Call? YES (<375)\n  Top up: 500\u2212350=+\u00a3150. Bal=\u00a3500\nDay4: PL=(485\u2212470)\u00d75=+75. Bal=575\nDay5: PL=(510\u2212485)\u00d75=+125. Bal=700\n\nNet PL: (510\u2212500)\u00d75 = +\u00a350\nCash in: 500+150=650. Final: 700."}]},

{id:8,t:"WACC & Modigliani-Miller",i:"\ud83c\udfd7\ufe0f",co:"#6c3483",ch:"Capital Structure",
kp:["WACC = minimum return to earn","Kd after tax = Kd\u00d7(1\u2212T)","Kps = Div/P0","Kos: DGM = D1/P0+g, CAPM = Rf+\u03b2(Rm\u2212Rf)","MARKET value weights","MM 1958: VL=VU, structure irrelevant","Pizza: more slices \u2260 more pizza","MM 1963: VL=VU+TD, tax shield","Financial distress limits debt","Trade-off: tax shield vs distress cost"],
fm:[{n:"WACC",eq:"Kd(1\u2212T)\u00d7Wd + Kps\u00d7Wps + Kos\u00d7Wos",c:"Weighted average"},{n:"After-tax Debt",eq:"Kdt = Kd(1\u2212T)",c:"Interest tax-deductible"},{n:"Pref Shares",eq:"Kps = Div/P0",c:"Fixed div / price"},{n:"Equity (DGM)",eq:"Kos = D1/P0 + g",c:"Yield + growth"},{n:"Equity (CAPM)",eq:"Kos = Rf + \u03b2(Rm\u2212Rf)",c:"Risk-free + premium"},{n:"MM58",eq:"VL = VU",c:"No tax: irrelevant"},{n:"MM63",eq:"VL = VU + TD",c:"Tax shield value"},{n:"MM Prop II",eq:"Ke = Ku+(Ku\u2212Kd)D/E",c:"Ke rises with leverage"}],
dd:"MM 1958: financing irrelevant (pizza). 1963 with tax: interest deductible \u2192 shield TD. 100% debt? No \u2014 distress costs. Trade-off finds optimum.",
tf:[{h:"WACC checklist",b:"(1) Cost of each source \u2014 DON\u2019T FORGET TAX ON DEBT. (2) Market value weights \u2014 NOT book. (3) Formula. Most common mistake: pre-tax debt cost."},{h:"Three-act play (essays)",b:"Act 1 (MM58): irrelevant. Act 2 (MM63): debt adds value. Act 3 (Trade-off): distress limits it."},{h:"Numbers to find",b:"Bond YTM or interest rate (Kd), dividend+price (Kps, Kos), beta+market data (CAPM Kos), TAX RATE, MARKET values of components."}],
pq:[{q:"Equity \u00a36m (\u03b2=1.2, Rf=4%, Rm=12%). Prefs \u00a31.5m (div=\u00a30.80, price=\u00a310). Bonds \u00a32.5m (YTM=6%). Tax=25%. WACC?",a:"Step 1 \u2014 Costs:\nKos = 4%+1.2\u00d7(12%\u22124%) = 4%+9.6% = 13.6%\nKps = 0.80/10 = 8%\nKdt = 6%\u00d7(1\u22120.25) = 4.5%  \u2190 DON\u2019T FORGET TAX!\n\nStep 2 \u2014 Weights (market values):\nV = 6+1.5+2.5 = \u00a310m\nWos=0.60, Wps=0.15, Wd=0.25\n\nStep 3 \u2014 WACC:\n= 4.5%\u00d70.25 + 8%\u00d70.15 + 13.6%\u00d70.60\n= 1.125 + 1.20 + 8.16 = 10.49%\n\nFirm must earn \u226510.49% on investments."}]},

{id:9,t:"Dividend Policy",i:"\ud83d\udcb0",co:"#d4ac0d",ch:"Dividends vs Retained Earnings",
kp:["Payout: distribute vs retain & reinvest","MM: irrelevant in perfect markets","Homemade dividends: sell shares","Price same if ROE=Ke","Bird-in-hand: refuted as fallacy","Tax preference: CG taxed lower","Signalling: div changes = info","Pecking order: internal\u2192debt\u2192equity","Clientele effect: investor preferences","Lintner: firms smooth dividends","Buybacks: flexible alternative"],
fm:[{n:"Growth",eq:"g = Retention \u00d7 ROE",c:"Growth from retained earnings"},{n:"100% Payout",eq:"P = Div/Ke",c:"No growth perpetuity"},{n:"Partial Payout",eq:"P = D1/(Ke\u2212g)",c:"Gordon Growth Model"},{n:"MM Proof",eq:"ROE=Ke \u2192 P same for any payout",c:"Growth compensates lost div"}],
dd:"MM: value = earnings power, not payout. In reality: taxes, transaction costs, signalling. Pecking order from Akerlof\u2019s lemons. Lintner: smoothing.",
tf:[{h:"The numerical proof (exam gold)",b:"Show P=\u00a310 with 100% payout AND P=\u00a310 with 40% payout when ROE=Ke. Most convincing technique."},{h:"Signal vs noise",b:"Dividends credible because costly to fake. Raising commits to future \u2014 if unsustainable, cut destroys value."},{h:"Pecking order chain",b:"Info asymmetry \u2192 external premium \u2192 expensive \u2192 prefer internal \u2192 divs from leftover."}],
pq:[{q:"Prove MM: Earnings=\u00a31, ROE=Ke=10%. Compare 100% vs 40% payout.",a:"100% payout: Div=\u00a31, g=0\nP = 1/0.10 = \u00a310.00\n\n40% payout: Div=\u00a30.40, Retention=0.60\ng = 0.60\u00d710% = 6%\nP = 0.40/(0.10\u22120.06) = 0.40/0.04 = \u00a310.00\n\nSAME PRICE! ROE=Ke \u2192 growth compensates lower div.\nBreaks if: ROE\u2260Ke, or real world (taxes, signalling)."}]},

{id:10,t:"Working Capital Management",i:"\ud83d\udd04",co:"#a04000",ch:"Liquidity & Operations",
kp:["NWC = CA \u2212 CL","Balance liquidity vs profitability","OC = DIO + DSO","CCC = DIO + DSO \u2212 DPO","Shorter CCC = more efficient","Aggressive: low WC, high risk/return","Conservative: high WC, safe, costly","Trade credit (3/10 net 40) \u2248 44.9%!","EOQ = \u221a(2DS/H)","JIT: minimal inventory, strong suppliers","Factoring vs invoice discounting","Financing: matching, aggressive, conservative"],
fm:[{n:"NWC",eq:"CA \u2212 CL",c:"Positive = covers short-term"},{n:"DIO",eq:"(Inv/COGS)\u00d7365",c:"Days in inventory"},{n:"DSO",eq:"(Rec/Revenue)\u00d7365",c:"Days to collect"},{n:"DPO",eq:"(Pay/COGS)\u00d7365",c:"Days to pay"},{n:"OC",eq:"DIO + DSO",c:"Purchase to collection"},{n:"CCC",eq:"DIO + DSO \u2212 DPO",c:"Cash gap"},{n:"Trade Credit",eq:"[d/(1\u2212d)]^(365/(full\u2212disc))\u22121",c:"Annualised cost"},{n:"EOQ",eq:"\u221a(2DS/H)",c:"D=demand, S=order, H=hold"}],
dd:"CCC = cash gap. Positive = pay before collecting. EOQ balances ordering vs carrying. JIT works until supply breaks. Trade credit (3/10 net 40) annualises to ~44.9%!",
tf:[{h:"CCC as cash gap",b:"Pay supplier \u2192 inventory sits (DIO) \u2192 sell \u2192 wait (DSO). But delayed payment by DPO. Gap = CCC. Negative = suppliers finance you."},{h:"Trade credit as hidden loan",b:"3/10 net 40 = 3% off for paying in 10 days vs full by 40. Skipping = borrowing 97% for 30 days at 3%. Annualised \u2248 44.9%. Way more than a bank loan!"},{h:"EOQ insight",b:"At optimal quantity, ordering cost EXACTLY equals holding cost. If they don\u2019t match, recheck."}],
pq:[{q:"Rev=\u00a3800k, COGS=\u00a3500k, Inv=\u00a330k, Rec=\u00a360k, Pay=\u00a340k. Find CCC.",a:"DIO = (30,000/500,000)\u00d7365 = 21.9 days\nDSO = (60,000/800,000)\u00d7365 = 27.4 days\nDPO = (40,000/500,000)\u00d7365 = 29.2 days\n\nOC = 21.9+27.4 = 49.3 days\nCCC = 21.9+27.4\u221229.2 = 20.1 days\n\n20-day gap: pay suppliers ~20 days before collecting."},{q:"Terms: 2/10 net 30. Annualised cost? Bank=15%. Take discount?",a:"Cost = [0.02/0.98]^(365/20) \u2212 1\n     = (1.02041)^18.25 \u2212 1\n     = 44.59%\n\n44.6% >> 15% \u2192 TAKE the discount, borrow from bank.\nThat 2% sounds small but annualised = enormous."},{q:"Demand=10,000. Order cost=\u00a350. Hold cost=\u00a32/unit/yr. EOQ?",a:"EOQ = \u221a(2\u00d710,000\u00d750/2) = \u221a500,000 = 707 units\nOrders/yr: 10,000/707 = 14.1\n\nVerify: Order cost = 14.1\u00d750 = \u00a3707\nHold cost = (707/2)\u00d72 = \u00a3707\nThey match \u2713 (always equal at EOQ)"}]}
];

const SB=[
{t:"Efficient Market Hypothesis (EMH)",l:[3],co:"#7d3c98",a:[
"<strong>What is it?</strong> The idea that share prices already reflect all available information. You can\u2019t consistently \u2018beat the market\u2019 because every piece of news is already priced in before you can act.",
"<strong>Weak form:</strong> Past prices contain no useful patterns. Looking at charts and trends (technical analysis) won\u2019t help you predict future prices. Evidence: random walk tests show stock prices follow unpredictable paths.",
"<strong>Semi-strong form:</strong> All PUBLIC information (financial statements, news, analyst reports) is already in the price. Fundamental analysis (studying company accounts to find \u2018undervalued\u2019 stocks) won\u2019t give you an edge. Evidence: event studies show prices adjust within minutes of announcements.",
"<strong>Strong form:</strong> Even PRIVATE insider information is reflected in the price. This is almost certainly false \u2014 if it were true, insider trading laws would be unnecessary. Martha Stewart went to prison for trading on insider info, proving it gave her an unfair advantage.",
"<strong>Evidence FOR:</strong> Galton\u2019s ox (1906: crowd average within 1lb of true weight), Ask the Audience (91% accuracy vs 65% Phone a Friend), most fund managers fail to beat the index after fees, event studies show very rapid price adjustment.",
"<strong>Evidence AGAINST:</strong> January effect (stocks tend to rise in January), small-firm premium (small companies earn higher returns than CAPM predicts), momentum (winners keep winning for 6\u201312 months), dot-com bubble and 2008 crash (prices clearly deviated from fundamentals).",
"<strong>Behavioural finance critique:</strong> Investors are not perfectly rational. They exhibit overconfidence, herd behaviour, loss aversion, and anchoring bias. Kahneman & Tversky showed systematic irrationality. Shiller showed markets exhibit \u2018irrational exuberance\u2019.",
"<strong>Practical implication:</strong> If markets are efficient, you should just buy an index fund (passive investing) rather than paying a fund manager to try to beat the market. Warren Buffett bet $1m that an index fund would beat hedge funds over 10 years \u2014 and won.",
"<strong>Exam conclusion:</strong> Markets are BROADLY semi-strong efficient. Prices generally reflect public info quickly. But anomalies and behavioural biases create pockets of inefficiency, especially in smaller, less-followed stocks."]},

{t:"Investment Appraisal Methods",l:[1,2],co:"#1e8449",a:[
"<strong>NPV (Net Present Value):</strong> Theoretically the BEST method. It discounts all future CFs to today and subtracts the investment. A positive NPV means the project creates wealth \u2014 measured in actual pounds. It considers the time value of money, uses all CFs, and gives an absolute measure of value.",
"<strong>IRR (Internal Rate of Return):</strong> Gives a % return, which managers find intuitive (\u201cthis project earns 17%\u201d). Accept if IRR > cost of capital. But it has three critical flaws: (1) multiple IRRs when CFs change sign more than once, (2) can rank mutually exclusive projects wrongly because it ignores scale, (3) assumes reinvestment at the IRR rate.",
"<strong>Why NPV and IRR can disagree:</strong> Project A: invest \u00a3100k, IRR=24%. Project B: invest \u00a3500k, IRR=18%. IRR picks A, but B creates far more value (higher NPV). IRR ignores that B is a much larger project. Analogy: 50% return on \u00a310 vs 10% return on \u00a310,000.",
"<strong>Payback Period:</strong> How long until cumulative CFs recover the investment. Advantages: simple, intuitive, biased toward liquidity (useful if cash-strapped). Disadvantages: ignores time value of money, ignores ALL cash flows after the cutoff, arbitrary cutoff date.",
"<strong>Discounted Payback:</strong> Same idea but discounts CFs first. Fixes the time value problem but still ignores post-cutoff CFs.",
"<strong>AAR (Average Accounting Return):</strong> Average profit / Average book value. Uses accounting numbers (subject to depreciation choices), not real cash flows. Not time-adjusted. Arbitrary benchmark. The weakest method.",
"<strong>In practice:</strong> Surveys show firms use multiple methods. IRR is the most popular in practice (managers like percentages), but NPV is the academic gold standard. Best practice: use NPV as the primary tool, IRR as a secondary check.",
"<strong>Exam rule:</strong> When asked to compare methods, always conclude that NPV is theoretically superior. When NPV and IRR conflict, NPV wins."]},

{t:"CAPM \u2014 Systematic Risk & Pricing",l:[5,6],co:"#2471a3",a:[
"<strong>Core idea:</strong> Investors who hold diversified portfolios only face SYSTEMATIC risk (recessions, interest rate changes, pandemics \u2014 things that affect all companies). Firm-specific risk (CEO quits, factory fire) is eliminated by diversification. Therefore, only systematic risk should be compensated with higher returns.",
"<strong>Beta (\u03b2):</strong> Measures how much a stock moves with the market. \u03b2=1 means same volatility as market. \u03b2=1.5 means 50% MORE volatile. \u03b2=0.7 means 30% LESS volatile. Calculated as Cov(stock,market)/Var(market).",
"<strong>The Security Market Line (SML):</strong> E(Ri) = Rf + \u03b2(Rm\u2212Rf). This gives the \u2018fair\u2019 expected return. Stocks plotting ABOVE the SML are undervalued (buy). BELOW = overvalued (sell). ON the line = fairly priced.",
"<strong>Assumptions:</strong> Rational investors, efficient markets, single investment period, unlimited borrowing/lending at Rf, no taxes or transaction costs, all investors have same expectations. NONE of these hold perfectly in reality.",
"<strong>Fama & French (1992) critique:</strong> Showed that two additional factors \u2014 firm SIZE (small > large) and VALUE (high book-to-market > low) \u2014 explain returns better than beta alone. Led to the three-factor model. Beta by itself has weak empirical explanatory power.",
"<strong>Other limitations:</strong> Beta is estimated from historical data and is UNSTABLE over time. The \u2018market portfolio\u2019 should theoretically include ALL risky assets (property, art, human capital), not just stocks. Single-period assumption ignores that investors plan over decades.",
"<strong>Advantages (why it\u2019s still used):</strong> Simple, intuitive, focuses on the right type of risk, gives a concrete Ke estimate for WACC. As Churchill said about democracy: \u2018the worst system except for all the others.\u2019",
"<strong>CAPM vs DGM for estimating Ke:</strong> DGM (Ke = D1/P0 + g) only works for dividend-paying firms with stable growth. CAPM works for ANY stock. DGM\u2019s growth estimate (g) is often unreliable. CAPM explicitly models risk through beta, while DGM buries risk assumptions inside r and g. CAPM is generally preferred."]},

{t:"Capital Structure \u2014 MM, Pizza & Tax Shield",l:[8],co:"#6c3483",a:[
"<strong>The big question:</strong> Does it matter HOW a firm is financed? If a firm worth \u00a310m switches from 100% equity to 50% debt / 50% equity, does its total value change? MM says: it depends on whether there are taxes.",
"<strong>The Pizza Analogy (MM 1958, no tax):</strong> Imagine a pizza. Cutting it into 8 slices instead of 4 does NOT give you more pizza. Similarly, splitting a firm\u2019s cash flows between debt and equity (the \u2018slices\u2019) does not change the total value (the \u2018pizza\u2019). The firm\u2019s value comes from its ASSETS (the projects it runs), not from how it\u2019s financed. VL = VU.",
"<strong>MM 1958 Proposition II:</strong> If you add cheap debt, the cost of equity RISES to compensate. Why? Shareholders now face more risk \u2014 debt interest must be paid first, making equity returns more volatile. The cheap debt is exactly offset by more expensive equity. Result: WACC stays constant no matter the mix.",
"<strong>The Tax Shield (MM 1963, with tax):</strong> In reality, interest payments are TAX-DEDUCTIBLE. If a firm pays \u00a3100 in interest and the tax rate is 25%, it saves \u00a325 in tax. This \u00a325 saving is the tax shield. Over time, these savings add up. The present value of all future tax savings = Tax rate \u00d7 Debt = T\u00d7D.",
"<strong>MM 1963 formula:</strong> VL = VU + T\u00d7D. The levered firm is worth MORE than the unlevered firm by exactly the tax shield. Example: If VU = \u00a310m, T = 25%, D = \u00a34m, then VL = 10 + 0.25\u00d74 = \u00a311m. That extra \u00a31m comes purely from tax savings.",
"<strong>So why not 100% debt?</strong> If more debt = more value, why not finance entirely with debt? Because MM 1963 ignores FINANCIAL DISTRESS COSTS. As debt increases, the probability of bankruptcy rises. These costs destroy value: direct costs (lawyers, accountants, court fees) and indirect costs (customers leave, suppliers demand cash, best employees quit, assets sold at fire-sale prices).",
"<strong>Trade-off Theory:</strong> The optimal capital structure is where the MARGINAL tax shield benefit equals the MARGINAL financial distress cost. At low debt levels, adding more debt increases value (tax shield > distress risk). At high debt levels, the distress costs explode and outweigh the tax benefit. The optimal point is in the middle.",
"<strong>In practice:</strong> Most firms use moderate leverage (30\u201360% debt). Industry norms matter \u2014 utilities use more debt (stable CFs), tech firms use less (volatile CFs). No firm uses 0% or 100% debt.",
"<strong>Essay structure:</strong> Start with MM 1958 (irrelevant). Then MM 1963 (debt adds value). Then the critique (financial distress). Then trade-off theory (optimum). This is the \u2018three-act play\u2019 structure."]},

{t:"Dividend Policy \u2014 All Theories",l:[9],co:"#d4ac0d",a:[
"<strong>The question:</strong> Should a firm pay out earnings as dividends, or retain and reinvest them? Does the choice affect the firm\u2019s value?",
"<strong>MM Dividend Irrelevance:</strong> In a perfect world (no taxes, no transaction costs, perfect information), it doesn\u2019t matter. If the firm cuts dividends and reinvests, future earnings grow. The PV of that growth exactly equals the lost dividends. Investors who want income can create \u2018homemade dividends\u2019 by selling some shares. PROVE THIS WITH NUMBERS: show P=\u00a310 at 100% payout AND P=\u00a310 at 40% payout when ROE=Ke.",
"<strong>Bird-in-the-Hand (Gordon 1959):</strong> Investors prefer a certain dividend NOW over an uncertain capital gain LATER. Therefore, firms paying higher dividends should have higher share prices. MM\u2019s rebuttal: risk is already captured in the discount rate. Paying more dividends doesn\u2019t make the firm\u2019s projects less risky. Largely REFUTED by academics but still believed by some practitioners.",
"<strong>Tax Preference Theory:</strong> In most countries, dividends are taxed HIGHER than capital gains. UK: dividends up to 39.35%, capital gains 10\u201320%. Plus, capital gains tax can be DEFERRED until you sell. Therefore, investors prefer LOW dividends (more capital gains) and firms with low payouts should have HIGHER share prices.",
"<strong>Signalling Hypothesis:</strong> Managers know more about the firm\u2019s future than investors (information asymmetry). A dividend INCREASE signals management\u2019s confidence that earnings will be sustainably higher. A DECREASE signals trouble ahead. This works because it\u2019s COSTLY TO FAKE \u2014 a firm that raises dividends unsustainably will face an embarrassing and value-destroying cut later.",
"<strong>Pecking Order Theory (Myers & Majluf):</strong> Because of information asymmetry, external financing is expensive. Investors don\u2019t know if the firm is a \u2018jewel\u2019 or a \u2018lemon\u2019 (Akerlof). So firms prefer: (1) Internal funds (cheapest, no scrutiny), (2) Debt (some scrutiny, but lower risk for investor), (3) New equity (most scrutiny, most expensive). Dividends are only paid from leftover cash AFTER all profitable projects are funded.",
"<strong>Clientele Effect:</strong> Different investors prefer different payout levels. Pension funds need regular income \u2192 prefer high dividends. Growth investors prefer retention \u2192 prefer low dividends. Firms attract a \u2018clientele\u2019 matching their policy. Changing policy upsets existing investors and causes selling pressure.",
"<strong>Lintner (1956) \u2014 Dividend Smoothing:</strong> Empirically, firms don\u2019t cut or raise dividends frequently. They set a TARGET payout ratio and adjust gradually. They only raise dividends when confident the new level is sustainable. Very reluctant to cut (negative signal).",
"<strong>Share Buybacks:</strong> Increasingly used as an alternative. More flexible (no commitment), often tax-advantaged, signals undervaluation, boosts EPS. Brav et al. (2005) found managers prefer buybacks for their flexibility.",
"<strong>Essay structure:</strong> Start with MM (baseline). Then layer real-world frictions: taxes \u2192 tax preference. Info asymmetry \u2192 signalling + pecking order. Investor differences \u2192 clientele. Empirics \u2192 Lintner smoothing. Modern trend \u2192 buybacks."]},

{t:"Derivatives, Hedging & FX Risk",l:[7],co:"#117a65",a:[
"<strong>What is a derivative?</strong> A contract whose value is derived from something else (the \u2018underlying\u2019). The underlying could be a commodity (wheat, oil), a financial asset (shares, bonds), a currency, or an interest rate. Derivatives don\u2019t create value \u2014 they TRANSFER risk from one party to another.",
"<strong>Forwards vs Futures \u2014 6 key differences:</strong> (1) Terms: forwards customised, futures standardised. (2) Trading: forwards OTC (private), futures on exchanges. (3) Clearing: forwards none, futures have clearing house. (4) Counterparty risk: forwards yes (other party might default), futures no (exchange guarantees). (5) Liquidity: forwards illiquid, futures very liquid. (6) Settlement: forwards held to maturity, futures usually closed before.",
"<strong>Options \u2014 the insurance analogy:</strong> Buying a put option = buying insurance on your shares. You pay a premium. If the price drops, the insurance pays out (you can sell at the higher exercise price). If the price stays high, you lose the premium but you\u2019re happy. KEY: the buyer\u2019s maximum loss is ALWAYS limited to the premium. Upside is unlimited.",
"<strong>Swaps:</strong> Two parties agree to exchange cash flows. Most common: interest rate swap where Firm A swaps its floating rate payments for Firm B\u2019s fixed rate payments. Both benefit from CERTAINTY even though one will \u2018win\u2019 and one will \u2018lose\u2019 depending on rate movements.",
"<strong>Three types of FX risk:</strong> (1) TRANSACTION risk: a specific payment in foreign currency changes value before settlement. Most direct and immediate. (2) TRANSLATION risk: when consolidating overseas subsidiaries\u2019 accounts, exchange rate changes affect reported figures. No actual cash lost. (3) ECONOMIC risk: long-term competitiveness. A strong domestic currency makes exports expensive and imports cheap.",
"<strong>External hedging:</strong> Use derivatives (forwards, futures, options, swaps) in the FX market to lock in rates or cap losses.",
"<strong>Internal hedging:</strong> (1) Leading/lagging: speed up or delay payments to exploit expected FX movements. (2) Netting: multinational subsidiaries offset payments to each other. (3) Foreign currency borrowing: borrow in the currency you\u2019re exposed to, so the loan repayment offsets the exposure.",
"<strong>Exchange rate theories:</strong> PPP (long run: rates adjust for inflation differences), IRP (forward rates eliminate interest rate arbitrage), BOP (trade surplus \u2192 currency appreciates), Monetary (money supply \u2192 inflation \u2192 depreciation), Asset Market (capital flows to higher-returning countries)."]},

{t:"Working Capital Management",l:[10],co:"#a04000",a:[
"<strong>The core trade-off:</strong> Liquidity vs Profitability. Too much working capital (cash, inventory, receivables) = safe but low returns. Too little = efficient but risky (can\u2019t pay bills, run out of stock, lose customers).",
"<strong>CCC as the master metric:</strong> Cash Conversion Cycle = DIO + DSO \u2212 DPO. It measures how many days your cash is \u2018trapped\u2019 in the operating cycle. Shorter = better. Negative CCC (like Amazon or Tesco) means you collect from customers BEFORE paying suppliers \u2014 your suppliers are financing your operations.",
"<strong>Aggressive policy:</strong> Minimise current assets. Low inventory (risk: stockouts), tight credit terms (risk: lose customers), low cash balances (risk: can\u2019t pay bills). Higher profitability but higher risk. Like a high-beta stock.",
"<strong>Conservative policy:</strong> Maintain large buffers. High inventory (safe but expensive to store), generous credit (attracts customers but ties up cash), large cash balances (safe but earns low returns). Lower risk but lower profitability. Like a government bond.",
"<strong>Trade credit is secretly expensive:</strong> \u20182/10 net 30\u2019 looks trivial (2% discount). But annualised: you\u2019re borrowing for 20 extra days at 2% \u2192 ~44.6% per year. Almost always cheaper to take the discount and borrow from a bank.",
"<strong>EOQ:</strong> Balances ordering costs (fall with larger orders) against holding costs (rise with larger orders). At the optimal quantity, the two costs are exactly equal. Simple formula but powerful insight.",
"<strong>JIT (Just-in-Time):</strong> Toyota model. Eliminate inventory entirely through perfect supplier coordination. Brilliant in theory, but COVID exposed the weakness \u2014 zero buffer means any supply disruption halts production.",
"<strong>Financing strategies:</strong> (1) Maturity matching: fund long-term assets with long-term debt, short-term with short-term. Moderate risk. (2) Aggressive: use cheap short-term debt to fund some permanent assets. Higher return but refinancing risk. (3) Conservative: use long-term debt for everything, invest surplus in marketable securities. Safest but lowest return."]}
];

{c:"Section A",i:["NPV for 5+ yr project","IRR interpolation","AER conversions","Bond pricing (both methods)","Par/premium/discount logic","E(V), variance, SD","Portfolio variance","Covariance and beta","CAPM/SML return","Full WACC","Ke via DGM and CAPM","Option profit","Futures margin","DIO/DSO/DPO/CCC","EOQ + trade credit cost"]},

// ══════════ STEP-BY-STEP PROCESSES ══════════
const STEPS={
1:[
{s:"Step 1: Identify the cash flows",d:"Read the question and list every cash flow. Ask three questions for each: (1) HOW MUCH in \u00a3? (2) WHEN does it happen \u2014 Year 0, 1, 2, 3...? (3) Which DIRECTION \u2014 money IN (positive) or OUT (negative)? Year 0 is always the initial investment (negative). Remaining years are revenues (positive). If there\u2019s a scrap/residual value in the final year, add it to that year\u2019s CF."},
{s:"Step 2: Identify the discount rate",d:"Find the rate in the question. It might be called \u2018cost of capital\u2019, \u2018required return\u2019, \u2018discount rate\u2019, or \u2018WACC\u2019. Convert to decimal (e.g., 12% = 0.12)."},
{s:"Step 3: Calculate the discount factor for each year",d:"DF = 1/(1+r)^n. Year 0: DF=1. Year 1: 1/(1+r). Year 2: 1/(1+r)\u00b2. And so on. Write each DF to 4 decimal places."},
{s:"Step 4: Calculate the present value of each CF",d:"For each year: PV = CF \u00d7 DF. Multiply the cash flow by its discount factor."},
{s:"Step 5: Sum all present values",d:"Add up every PV (including the negative Year 0). This total is the NPV."},
{s:"Step 6: State the decision",d:"Write: \u2018Since NPV = \u00a3X > 0, the project should be accepted as it creates value above the required return.\u2019 If NPV < 0: \u2018...should be rejected.\u2019"}
],
2:[
{s:"First: understand WHAT you\u2019re being asked",d:"This lecture has THREE different calculation types. You need to recognise which one the question is asking for:\n\n(A) IRR \u2014 \u2018Find the project\u2019s rate of return\u2019 or \u2018Find the discount rate that makes NPV=0\u2019. You\u2019ll be given project cash flows and possibly two NPVs at two rates.\n\n(B) AER \u2014 \u2018Find the effective annual rate\u2019 or \u2018What is the true cost?\u2019 You\u2019ll be given a nominal/quoted rate and a compounding frequency.\n\n(C) Geometric return \u2014 \u2018Find the annualised return\u2019. You\u2019ll be given PV, FV, and number of years."},
{s:"IRR Step 1: Do you have two NPVs already?",d:"Check the question. Sometimes it GIVES you NPV at two rates (e.g., \u2018NPV at 12% is +\u00a323k, NPV at 20% is \u2212\u00a312k\u2019). If so, skip straight to interpolation. If not, you need to calculate NPV at two different rates yourself \u2014 use the full NPV table method from Lecture 1, once at each rate. You need one POSITIVE and one NEGATIVE NPV."},
{s:"IRR Step 2: WHY does this work?",d:"NPV is positive at low rates and negative at high rates (for conventional projects). Somewhere in between, NPV = 0. That \u2018somewhere\u2019 is the IRR. The interpolation formula draws a straight line between your two known points and finds where it crosses zero. It\u2019s an approximation \u2014 the closer your two trial rates, the more accurate."},
{s:"IRR Step 3: Apply the interpolation formula",d:"IRR = r\u208a + [NPV\u208a / (NPV\u208a \u2212 NPV\u208b)] \u00d7 (r\u208b \u2212 r\u208a)\n\nr\u208a = the rate that gave POSITIVE NPV\nr\u208b = the rate that gave NEGATIVE NPV\nNPV\u208a = the positive NPV value\nNPV\u208b = the negative NPV value (put it as a NEGATIVE number)\n\nThe fraction NPV\u208a/(NPV\u208a\u2212NPV\u208b) tells you how far between the two rates the zero-crossing is. Multiply by the gap between rates, add to the lower rate."},
{s:"IRR Step 4: Make the decision",d:"Compare your IRR to the cost of capital (k). k is the minimum return investors demand.\n\nIRR > k \u2192 ACCEPT (project earns more than required)\nIRR < k \u2192 REJECT (project doesn\u2019t cover capital costs)\nIRR = k \u2192 INDIFFERENT (project just breaks even)\n\nWrite: \u2018Since IRR (17.3%) exceeds the cost of capital (15%), the project should be accepted.\u2019"},
{s:"AER Step 1: Identify the two inputs",d:"You need: (1) The NOMINAL rate \u2014 the \u2018advertised\u2019 or \u2018quoted\u2019 rate. (2) The compounding FREQUENCY \u2014 how many times per year interest is added. Monthly = 12, Quarterly = 4, Semi-annual = 2, Daily = 365."},
{s:"AER Step 2: WHY does this matter?",d:"A bank says \u20188% interest, compounded quarterly.\u2019 Each quarter they add 2% (= 8%/4). But in Q2, you earn 2% on Q1\u2019s interest too. And in Q3, on Q1+Q2\u2019s interest. By year end, you\u2019ve actually earned more than 8%. The AER tells you the REAL rate after this \u2018interest on interest\u2019 effect."},
{s:"AER Step 3: Apply the formula and interpret",d:"AER = (1 + r/m)^m \u2212 1\n\nPlug in r (as decimal) and m. Example: 8% quarterly:\n(1 + 0.08/4)^4 \u2212 1 = (1.02)^4 \u2212 1 = 1.0824 \u2212 1 = 8.24%.\n\nThe true cost is 8.24%, not 8%. The difference grows with higher frequencies. Daily at 8%: (1+0.08/365)^365\u22121 = 8.33%."},
{s:"Geometric Return: When and how",d:"Use when given a START value, an END value, and TIME.\n\nFormula: r = (FV/PV)^(1/n) \u2212 1\n\nWhy not simple average? Because 100% gain followed by 50% loss = \u00a3100\u2192\u00a3200\u2192\u00a3100. Simple avg: (100\u221250)/2 = +25%. But you made NOTHING. Geometric: (100/100)^(1/2)\u22121 = 0%. The geometric average gives the REAL rate.\n\nDoubling time: n = log(2)/log(1+r). Quick check: 72/rate \u2248 years to double."}
],
3:[
{s:"Step 1: Identify what you\u2019re valuing",d:"Is it a share (dividends), a firm (earnings/CF), or an asset? This determines which perpetuity formula to use."},
{s:"Step 2: Find the NEXT period\u2019s cash flow (CF\u2081 or d\u2081)",d:"CRITICAL: If the question says \u2018the firm just paid\u2019 or \u2018current dividend\u2019, that\u2019s d\u2080 (this year). You need d\u2081 = d\u2080 \u00d7 (1+g). If the question says \u2018expected dividend next year\u2019, that IS d\u2081."},
{s:"Step 3: Identify r (required return) and g (growth rate)",d:"r might be called \u2018cost of equity\u2019, \u2018required return\u2019, or \u2018discount rate\u2019. g is the constant growth rate. Check that g < r (otherwise the formula doesn\u2019t work)."},
{s:"Step 4: Apply the formula",d:"Flat (no growth): P = CF/r. Growing: P = CF\u2081/(r\u2212g). For P/E: P/E = 1/(r\u2212g)."},
{s:"Step 5: Verify",d:"Does the price seem reasonable? If g is close to r, the price will be very high. If g=0, the price should be lower."}
],
4:[
{s:"Step 1: Identify the bond\u2019s characteristics",d:"From the question, extract: Face Value (FV, usually \u00a31,000), Coupon Rate (%), Maturity (years), Payment Frequency (annual or semi-annual), and YTM (the discount rate)."},
{s:"Step 2: Calculate the coupon payment in \u00a3",d:"C = Coupon Rate \u00d7 Face Value. E.g., 6% \u00d7 \u00a31,000 = \u00a360 per year. If semi-annual: \u00a360/2 = \u00a330 every 6 months."},
{s:"Step 3: Map out the cash flows",d:"Years 1 to n\u22121: You receive the coupon (e.g., \u00a360). Year n (final): You receive the coupon PLUS the face value (e.g., \u00a360 + \u00a31,000 = \u00a31,060)."},
{s:"Step 4: Choose your method",d:"Method A (Individual): Discount each year\u2019s CF separately using DF = 1/(1+YTM)^t, then sum. Method B (Annuity): Price = C \u00d7 AF + FV \u00d7 DF. AF = [1\u22121/(1+y)^n]/y. Both give the same answer."},
{s:"Step 5: Calculate and check",d:"Compute the price. Then sanity-check: Coupon > YTM \u2192 price must be ABOVE face value (premium). Coupon < YTM \u2192 price must be BELOW (discount). Coupon = YTM \u2192 price = face value exactly (par)."},
{s:"Step 6: State your finding",d:"Write: \u2018The bond trades at a [premium/discount/par] of \u00a3X because the coupon rate (Y%) is [above/below/equal to] the YTM (Z%).\u2019"}
],
5:[
{s:"Step 1: List all possible outcomes",d:"From the question, create a table: Outcome (e.g., Boom/Normal/Recession) | Probability (P) | Return (R). Probabilities must sum to 1.0."},
{s:"Step 2: Calculate Expected Return E(R)",d:"E(R) = \u03a3 R\u1d62 \u00d7 P\u1d62. Multiply each return by its probability and sum everything."},
{s:"Step 3: Calculate deviations from the mean",d:"For each outcome: (R\u1d62 \u2212 E(R)). This shows how far each outcome is from the average."},
{s:"Step 4: Square each deviation",d:"(R\u1d62 \u2212 E(R))\u00b2. Squaring makes all values positive and penalises large deviations more."},
{s:"Step 5: Probability-weight and sum = Variance",d:"\u03c3\u00b2 = \u03a3 P\u1d62 \u00d7 (R\u1d62 \u2212 E(R))\u00b2. Multiply each squared deviation by its probability, then add them all up."},
{s:"Step 6: Square root = Standard Deviation",d:"\u03c3 = \u221a\u03c3\u00b2. This is the risk measure, now in the same units (%) as the return."},
{s:"For portfolios: Additional steps",d:"Portfolio return = w\u2081E(R\u2081) + w\u2082E(R\u2082) (weighted average). Portfolio variance = w\u2081\u00b2\u03c3\u2081\u00b2 + w\u2082\u00b2\u03c3\u2082\u00b2 + 2w\u2081w\u2082\u03c3\u2081\u03c3\u2082\u03c1. If \u03c1=0, the last term vanishes. Compare portfolio \u03c3 to the weighted average of individual \u03c3s to show the diversification benefit."}
],
6:[
{s:"Step 1: Do you need to calculate Beta, or is it given?",d:"If beta is given (e.g., \u03b2=1.4), skip to Step 5. If you have return data for the stock and the market, continue to Step 2."},
{s:"Step 2: Calculate mean returns",d:"Find the average return for the stock and for the market index separately."},
{s:"Step 3: Calculate Covariance",d:"For each period: (Stock return \u2212 Stock mean) \u00d7 (Market return \u2212 Market mean) \u00d7 Probability. Sum all of these = Covariance."},
{s:"Step 4: Calculate Market Variance",d:"For each period: (Market return \u2212 Market mean)\u00b2 \u00d7 Probability. Sum = Var(Rm). Note: this is the same process as variance from L5, but for the market only."},
{s:"Step 5: Calculate Beta",d:"\u03b2 = Covariance / Market Variance. Interpret: \u03b2>1 means more volatile than market, \u03b2<1 means less."},
{s:"Step 6: Apply the SML/CAPM",d:"E(R\u1d62) = Rf + \u03b2(Rm \u2212 Rf). Plug in the risk-free rate, beta, and market return. This gives the expected (fair) return."},
{s:"Step 7: Valuation judgement (if asked)",d:"If the stock\u2019s actual return > CAPM return \u2192 it\u2019s above the SML \u2192 undervalued (buy). If actual < CAPM \u2192 below SML \u2192 overvalued (sell)."}
],
7:[
{s:"Options \u2014 Step 1: Identify the contract",d:"What type? Call (right to BUY) or Put (right to SELL). Find: Exercise price (E), Premium paid, Spot price at maturity (S)."},
{s:"Options \u2014 Step 2: Exercise decision",d:"Call: Exercise if S > E (you\u2019re buying cheap). Put: Exercise if E > S (you\u2019re selling dear). Otherwise, let it expire."},
{s:"Options \u2014 Step 3: Calculate profit",d:"Call: Profit = max(S\u2212E, 0) \u2212 Premium. Put: Profit = max(E\u2212S, 0) \u2212 Premium. Note: even if payoff is positive but less than premium, you still exercise (to recover some cost)."},
{s:"Futures \u2014 Step 1: Set up the table",d:"Columns: Day | Price | Daily P&L | Margin Balance | Margin Call? Start Day 1 with the entry price and initial margin."},
{s:"Futures \u2014 Step 2: Daily mark-to-market",d:"Each day: P&L = (Today\u2019s price \u2212 Yesterday\u2019s price) \u00d7 Number of contracts. Add P&L to previous balance."},

function rSA(){

  ${mkExp('\ud83d\udcb5 Understanding Cash Flows &mdash; the foundation of everything','#60a5fa',`
<p style="margin-bottom:12px"><strong>What is a cash flow?</strong> It\u2019s real money moving in or out. Not accounting profit, not depreciation, not accruals \u2014 actual pounds you could deposit in a bank. If it\u2019s not real money, it\u2019s not a cash flow.</p>

<p style="margin:16px 0 8px"><strong style="color:#60a5fa;font-size:14px">In NPV / IRR questions (Lectures 1\u20132)</strong></p>
<p>The exam usually gives you cash flows directly. Look for these clues:</p>
<ul>
<li><strong>Year 0 \u2014 the investment:</strong> Words like \u201cinitial investment\u201d, \u201cupfront cost\u201d, \u201ccapital expenditure\u201d, \u201ccosts \u00a3X\u201d. This is always NEGATIVE (money going out).</li>
<li><strong>Years 1, 2, 3... \u2014 the returns:</strong> Words like \u201cexpected to generate\u201d, \u201cnet revenue\u201d, \u201cannual cash flow\u201d, \u201creturns \u00a3X per year\u201d. These are POSITIVE (money coming in).</li>
<li><strong>Final year extras:</strong> Look for \u201cscrap value\u201d, \u201cresidual value\u201d, \u201csold for \u00a3X at the end\u201d. Add this to the final year\u2019s CF.</li>
</ul>

<p style="margin:16px 0 8px"><strong style="color:#f87171">The tricky version: when they give you accounting data</strong></p>
<p>Sometimes you get profit data instead of cash flows. Key adjustments:</p>
<ul>
<li><strong>Add back depreciation:</strong> Depreciation is an accounting charge, NOT a real cash outflow. The machine was paid for at Year 0. If given \u201cprofit after depreciation\u201d, add depreciation back to get CF.</li>
<li><strong>Ignore sunk costs:</strong> \u201cThe firm has already spent \u00a330,000 on a feasibility study\u201d \u2014 irrelevant. It\u2019s spent regardless of whether you do the project.</li>
<li><strong>Include opportunity costs:</strong> If the project uses a building the firm could rent out for \u00a310,000/year, that\u2019s a real cost even though no money changes hands.</li>
</ul>

<p style="margin:16px 0 8px"><strong style="color:#60a5fa;font-size:14px">In Bond Pricing (Lecture 4)</strong></p>
<p>Bond CFs are the easiest \u2014 they\u2019re contractually defined:</p>
<ul>
<li><strong>Years 1 to n\u22121:</strong> Coupon = Coupon Rate \u00d7 Face Value. E.g. 6% \u00d7 \u00a31,000 = \u00a360. Same every year.</li>
<li><strong>Year n (final):</strong> Coupon + Face Value. E.g. \u00a360 + \u00a31,000 = \u00a31,060.</li>
<li>If semi-annual: halve the coupon, double the periods.</li>
</ul>

<p style="margin:16px 0 8px"><strong style="color:#60a5fa;font-size:14px">In Share Valuation (Lecture 3)</strong></p>
<p>The \u201ccash flow\u201d for shares is the dividend stream:</p>
<ul>
<li><strong>Flat perpetuity:</strong> Same dividend forever \u2192 P = d/r. No need to list individual CFs.</li>
<li><strong>Growing perpetuity:</strong> Dividend grows at g% \u2192 P = d\u2081/(r\u2212g). You need d\u2081 (NEXT year\u2019s dividend), not d\u2080 (this year\u2019s).</li>
</ul>

<p style="margin:16px 0 8px"><strong style="color:#60a5fa;font-size:14px">In Working Capital (Lecture 10)</strong></p>
<p>Here \u201ccash flow\u201d = the daily operating cycle:</p>
<ul>
<li>Cash OUT: when you pay suppliers (captured by DPO)</li>
<li>Cash IN: when customers pay you (captured by DSO)</li>
<li>CCC tells you how many days cash is trapped between out and in.</li>
</ul>

<p style="margin:16px 0 8px;padding:12px 16px;background:#1a2e4a;border-radius:8px"><strong style="color:#60a5fa">\ud83c\udfaf The universal rule:</strong> For EVERY cash flow, answer three questions: (1) How much? (2) When? (3) In or out? Once you have those answers, you can set up any table and start discounting.</p>
`,false)}

  ${mkExp('\ud83c\udfaf How to lay out your answer on paper','#f87171',`
<p style="margin-bottom:12px">For most Section A questions (NPV, IRR, bond pricing), the marker expects you to <strong>draw a table</strong>. Here is what each column means:</p>

  ${mkExp('\u2705 Sanity checks &mdash; how to verify your answer makes sense','#34d399',`
<p style="margin-bottom:10px">Before you move on, run these quick checks. If your answer violates any of these, you have an error:</p>

  ${mkExp('\ud83d\udd22 What numbers to look for in the exam question','#f59e0b',`
<p style="margin-bottom:10px">Each question type requires specific numbers from the question text. Here is exactly what to look for and what each number means:</p>

<p style="margin:16px 0 6px"><strong style="color:#60a5fa;font-size:14px">NPV / IRR questions</strong></p>
<ul>
<li><strong>Initial investment (I&lt;sub&gt;0&lt;/sub&gt;)</strong> &mdash; the upfront cost of the project, usually at Year 0. This is always a NEGATIVE cash flow.</li>
<li><strong>Future cash flows</strong> &mdash; the money the project generates each year (revenues minus costs). These go in Years 1, 2, 3, etc.</li>
<li><strong>Discount rate (r)</strong> &mdash; the cost of capital, also called the required return. Might be called &ldquo;cost of capital&rdquo;, &ldquo;required rate of return&rdquo;, or &ldquo;discount rate&rdquo;. For IRR, you also need a second rate to interpolate.</li>
</ul>

<p style="margin:16px 0 6px"><strong style="color:#60a5fa;font-size:14px">Bond pricing</strong></p>
<ul>
<li><strong>Face value (FV)</strong> &mdash; the amount printed on the bond, repaid at maturity. Usually &pound;1,000 (US) or &pound;100 (UK).</li>
<li><strong>Coupon rate</strong> &mdash; the annual interest rate the bond pays, as a % of face value. Multiply: Coupon &pound; = Rate &times; Face Value. E.g. 6% &times; &pound;1,000 = &pound;60/year.</li>
<li><strong>YTM (Yield to Maturity)</strong> &mdash; the current market interest rate for this type of bond. This is your DISCOUNT RATE for pricing.</li>
<li><strong>Maturity</strong> &mdash; number of years until the bond expires and face value is repaid. Also check: is it annual or semi-annual payments?</li>
</ul>

<p style="margin:16px 0 6px"><strong style="color:#60a5fa;font-size:14px">CAPM / Beta</strong></p>
<ul>
<li><strong>Rf (Risk-free rate)</strong> &mdash; the return on a &ldquo;safe&rdquo; investment like government bonds. Usually 2&ndash;5%.</li>
<li><strong>Rm (Market return)</strong> &mdash; the expected return on the overall stock market (e.g. FTSE 100). Usually 8&ndash;12%.</li>
<li><strong>&beta; (Beta)</strong> &mdash; the stock&rsquo;s sensitivity to market movements. &beta;=1 means same risk as market. &beta;=1.5 means 50% more volatile. Sometimes you must calculate &beta; from covariance and variance data.</li>
</ul>

<p style="margin:16px 0 6px"><strong style="color:#60a5fa;font-size:14px">WACC</strong></p>
<ul>
<li><strong>Market values</strong> of debt, preference shares, and ordinary shares &mdash; NOT book values. These determine the weights.</li>
<li><strong>Cost of debt (Kd)</strong> &mdash; usually the YTM on the firm&rsquo;s bonds, or the interest rate on its loans.</li>
<li><strong>Tax rate (T)</strong> &mdash; critical because debt interest is tax-deductible. After-tax cost = Kd &times; (1&minus;T).</li>
<li><strong>Dividend and share price</strong> for preference shares (Kps = Div/Price) and ordinary shares (DGM: Kos = D1/P0 + g).</li>
<li><strong>Beta + market data</strong> if calculating Kos via CAPM instead of DGM.</li>
</ul>

<p style="margin:16px 0 6px"><strong style="color:#60a5fa;font-size:14px">Portfolio risk</strong></p>
<ul>
<li><strong>Weights (w)</strong> &mdash; what proportion of your money is in each asset. E.g. 50/50 means w1=0.5, w2=0.5.</li>
<li><strong>&sigma; (Standard deviation)</strong> of each asset &mdash; this measures each asset&rsquo;s individual risk/volatility.</li>
<li><strong>&rho; (Correlation)</strong> &mdash; how the two assets move together. Ranges from &minus;1 (opposite) to +1 (identical). If &rho;=0 or not given, the covariance term simplifies or drops out.</li>
</ul>

<p style="margin:16px 0 6px"><strong style="color:#60a5fa;font-size:14px">Working capital (CCC, EOQ)</strong></p>
<ul>
<li><strong>From the Balance Sheet:</strong> Inventory, Accounts Receivable (what customers owe you), Accounts Payable (what you owe suppliers).</li>
<li><strong>From the Income Statement:</strong> Revenue (total sales) and COGS (Cost of Goods Sold = what the goods cost to make/buy).</li>
<li><strong>For EOQ:</strong> D = annual demand (units sold per year), S = ordering cost (cost to place one order), H = holding cost (cost to store one unit for one year).</li>
</ul>`,false)}

  ${mkExp('\ud83d\udcb0 Common mistakes that lose marks','#f87171',`<ul>
<li><strong>Forgetting tax on debt in WACC:</strong> The cost of debt MUST be after tax: Kd &times; (1&minus;T). Using the pre-tax rate is the #1 WACC error.</li>
<li><strong>Using d0 instead of d1 in Gordon model:</strong> The formula P = d1/(r&minus;g) needs NEXT year&rsquo;s dividend. If given this year&rsquo;s, multiply by (1+g) first.</li>
<li><strong>Book values instead of market values for WACC weights:</strong> Always use market values unless explicitly told otherwise.</li>
<li><strong>Wrong sign on NPV cash flows:</strong> The initial investment should be NEGATIVE. Future revenues should be POSITIVE.</li>
<li><strong>Confusing coupon rate with YTM:</strong> Coupon rate determines how much interest you receive. YTM is the market rate you discount at. They are NOT the same (unless the bond is at par).</li>
<li><strong>Not showing the formula:</strong> Even if you can do it in your head, WRITE THE FORMULA. You get marks for it.</li>

  <h2 class="sec">Likely Calculation Topics</h2>
  <table class="tbl"><thead><tr><th>Topic</th><th>Lec</th><th>Priority</th><th>What to do</th></tr></thead><tbody>
  ${SA.map(t=>`<tr><td style="font-weight:600;color:#e0e0e0">${t.t}</td><td>${t.l.map(x=>`<span style="color:#60a5fa;cursor:pointer" onclick="go('lec',${x})">L${x}</span>`).join(', ')}</td><td><span class="bdg ${pc[t.p]}">${t.p}</span></td><td style="color:#bbb">${t.d}</td></tr>`).join('')}
  </tbody></table>`;
}

function rSB(){
  return `<div class="hero"><h1>Section B &mdash; Essays</h1><p>3 questions, choose 2. Click topics to expand key arguments.</p></div>
  ${mkExp('\u270d\ufe0f Essay Structure &mdash; click for framework','#a78bfa',`<ul><li><strong>Intro:</strong> Define terms, state direction. "This essay will critically evaluate..."</li><li><strong>Body:</strong> Theory \u2192 evidence \u2192 evaluation. Named references.</li><li><strong>Conclusion:</strong> Balanced, acknowledge counter-arguments.</li><li>Refs: Fama & French (1992), Lintner (1956), MM (1958/63), Gordon (1959), Markowitz (1952)</li></ul>`,true)}
  <h2 class="sec">Possible Topics &mdash; click to expand</h2>
  ${SB.map(t=>mkExp(`${t.t} (${t.l.map(x=>'L'+x).join(', ')})`,t.co,`<ul>${t.a.map(a=>`<li>${a}</li>`).join('')}</ul>`,false)).join('')}`;
}

function rPR(){
  return `<div class="hero"><h1>Practice Questions</h1><p>${L.reduce((a,l)=>a+l.pq.length,0)} exam-style questions with worked solutions. Try on paper first!</p></div>
  ${mkExp('\ud83c\udfaf How to use these','#34d399',`<ul><li>Attempt on paper BEFORE revealing</li><li>Set up working as shown \u2014 marker-friendly format</li><li>Note \u201cWhat to look for\u201d and \u201cKey insight\u201d sections</li></ul>`,true)}
  ${L.map(l=>`<h2 class="sec" style="color:${l.co}">${l.i} L${l.id}: ${l.t}</h2>${l.pq.map(p=>mkPQ(p.q,p.a,l.co)).join('')}`).join('')}`;
}

function rCL(){
  const tot=CK.reduce((a,c)=>a+c.i.length,0);
  const dn=Object.values(CKS).filter(Boolean).length;
  const pct=tot?Math.round(dn/tot*100):0;
  return `<div class="hero"><h1>Progress Checklist</h1><p>${dn}/${tot} complete</p></div>
  <div class="prog"><div class="prog-f" style="width:${pct}%"></div></div>
  ${CK.map((c,ci)=>`<h2 class="sec">${c.c}</h2>${c.i.map((it,ii)=>{const k=ci+'-'+ii,d=CKS[k];return `<div class="cl" onclick="toggleCk('${k}')"><div class="cl-b${d?' dn':''}">${d?'\u2713':''}</div><span class="cl-t${d?' dn':''}">${it}</span></div>`}).join('')}`).join('')}`;
}

render();
</script></body></html>
