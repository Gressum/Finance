const L=[
{id:1,title:"Time Value of Money & NPV",icon:"\u23f3",color:"#1a5276",chapter:"Present Value & Discounting",
kp:["Money has time value \u2014 \u00a3100 today is worth more than \u00a3100 in the future because of interest, inflation and risk","Compounding converts PV \u2192 FV (forward in time); Discounting is the reverse (backward in time)","The discount factor 1/(1+r)\u207f gets smaller as n increases \u2014 distant cash flows are worth less today","NPV = sum of all discounted cash flows minus initial investment \u2014 measures absolute value creation","Decision rule: Accept if NPV \u2265 0; reject otherwise","When comparing mutually exclusive projects, choose the highest NPV"],
fm:[{n:"Future Value",eq:"FV\u2099 = PV \u00d7 (1 + r)\u207f",c:"What an investment grows to over n periods at rate r"},{n:"Present Value",eq:"PV = FV\u2099 / (1 + r)\u207f",c:"Today's equivalent of a future cash flow"},{n:"Discount Factor",eq:"DF = 1 / (1 + r)\u207f",c:"Multiplier converting FV to PV \u2014 always between 0 and 1"},{n:"Net Present Value",eq:"NPV = \u03a3 [CF\u209c / (1+r)\u1d57] \u2212 I\u2080",c:"Total value created after accounting for the cost of capital"}],
dd:"Everything in finance comes back to this: a pound today is worth more than a pound tomorrow. Three reasons: (1) Time impatience \u2014 people prefer consumption now, (2) Risk \u2014 future cash flows are uncertain, (3) Inflation \u2014 purchasing power erodes. The discount rate r captures all three. When you compute NPV, you transform every cash flow into 'year-0 equivalents' so they can be safely added. A positive NPV means the project exceeds the investors' required return.",
tf:"<strong>The 'time machine' mental model:</strong> Think of discounting as a time machine bringing future money to today. The discount factor is the 'exchange rate' between future and present pounds. At 10%, \u00a31 next year = \u00a30.91 today. Always ask: <em>when</em> does each cash flow occur, and <em>what rate</em> translates it?\n\n<strong>The 'minimum bar' trick:</strong> NPV > 0 doesn't mean accounting profit \u2014 it means the project <em>exceeds the minimum return investors demand</em>. The discount rate IS the bar. NPV = 0 means you earn exactly the required return.\n\n<strong>Exam shortcut:</strong> If given a discount factor table, use it directly. If not, compute 1/(1+r)^n for each year. Either way, set up a clear table.",
ct:"Set up a table: Year | Cash Flow | DF | PV. Compute DF for each year. Multiply CF \u00d7 DF. Sum all PVs. Subtract I\u2080. Write: 'Since NPV > 0, the project should be accepted.'",
el:"Foundation for ALL valuation. Used in bonds, shares, projects. NPV is theoretically the best appraisal method."},

{id:2,title:"Interest Rates & Investment Appraisal",icon:"\ud83d\udcca",color:"#1e8449",chapter:"Returns & Project Selection",
kp:["From the firm's perspective, the discount rate = cost of capital = minimum return investors require","Geometric average return properly reverses compounding (simple average overstates multi-period returns)","AER reveals the true annual cost when compounding is more frequent than annual","IRR = the discount rate that makes NPV = 0 \u2014 the project's 'break-even' discount rate","IRR decision: Accept if IRR \u2265 cost of capital (k); reject otherwise","IRR problems: multiple IRRs (non-conventional CFs), no IRR, wrong ranking of mutually exclusive projects","Payback Period: simple but ignores time value and all cash flows beyond the cut-off","AAR: uses book values not cash flows \u2014 depends on arbitrary depreciation methods"],
fm:[{n:"Geometric Return",eq:"r = (FV\u2099/PV)^(1/n) \u2212 1",c:"Annualised return that correctly accounts for compounding"},{n:"AER",eq:"AER = (1 + r/m)\u1d50 \u2212 1",c:"True annual rate when nominal rate r is compounded m times/year"},{n:"Doubling Time",eq:"n = log(2) / log(1+r)",c:"Periods until investment doubles at rate r"},{n:"IRR Interpolation",eq:"IRR = r\u208a + [NPV\u208a/(NPV\u208a \u2212 NPV\u208b)] \u00d7 (r\u208b \u2212 r\u208a)",c:"Estimates IRR between two trial rates"},{n:"Payback",eq:"PP = Years before recovery + Unrecovered/CF in recovery year",c:"Time to recoup initial outlay \u2014 ignores time value"},{n:"AAR",eq:"AAR = Avg Net Income / Avg Book Value",c:"Accounting return \u2014 not time-adjusted"}],
dd:"IRR gives you a percentage you can compare directly with the cost of capital \u2014 very intuitive. But it has serious flaws: (1) Non-conventional cash flows can produce multiple IRRs. (2) For mutually exclusive projects, IRR can rank incorrectly because it ignores scale \u2014 a small project with 30% IRR may create less value than a large one with 20% IRR. (3) There may be no IRR at all. Payback is popular because managers like knowing 'how quickly do I get my money back', but it ignores time value and everything after the cut-off. AAR uses accounting numbers dependent on depreciation \u2014 not cash flows.",
tf:"<strong>The 'NPV is king' principle:</strong> Whenever methods conflict, NPV wins. IRR, Payback, and AAR are supporting tools, not substitutes. Always conclude with NPV superiority.\n\n<strong>The 'rate vs value' distinction:</strong> IRR tells you the <em>rate</em>; NPV tells you the <em>value</em>. 50% return on \u00a31 = \u00a30.50. 15% return on \u00a31m = \u00a3150,000. Which would you prefer? This is exactly why IRR misleads on mutually exclusive projects.\n\n<strong>IRR interpolation trick:</strong> You're finding where a straight line crosses zero between two known points. Pick one rate giving small positive NPV and one giving small negative NPV \u2014 the closer together, the more accurate.",
ct:"For IRR: Show both full NPV calculations first, then apply the interpolation formula. For AER: Identify m and the nominal rate. Common trap: confusing monthly rate with annual rate.",
el:"Classic essay topic: NPV vs IRR vs Payback vs AAR. Know advantages, disadvantages, and when they conflict."},

{id:3,title:"Financial Markets, Equity & EMH",icon:"\ud83c\udfdb\ufe0f",color:"#7d3c98",chapter:"Market Efficiency & Share Valuation",
kp:["Money markets (< 1yr) vs Capital markets (> 1yr)","Ordinary shares: residual ownership, voting rights, variable dividends \u2014 last to be paid","Preference shares: fixed dividend, priority in liquidation, typically no voting rights","Perpetuity: P = CF/r (flat) or P = CF\u2081/(r\u2212g) (growing) \u2014 foundation of share valuation","P/E ratio = 1/(r\u2212g) \u2014 encodes market's view of risk (r) and growth (g)","EMH: market price is the best available estimate of true underlying value","Weak form: Past prices can't predict future \u2014 technical analysis fails","Semi-strong: No public info can beat the market \u2014 fundamental analysis fails","Strong form: Even insider info reflected \u2014 probably untrue (hence insider trading laws)"],
fm:[{n:"Flat Perpetuity",eq:"V = CF / r",c:"Value of an infinite, constant cash flow"},{n:"Growing Perpetuity",eq:"V\u2080 = CF\u2081 / (r \u2212 g)",c:"Value when CFs grow at constant rate g forever (requires g < r)"},{n:"Share Price (DVM)",eq:"P\u2080 = d\u2081 / (r \u2212 g)",c:"Gordon model \u2014 next dividend / (required return minus growth)"},{n:"P/E Ratio",eq:"P\u2080/e\u2081 = 1 / (r \u2212 g)",c:"Higher P/E = lower risk or higher expected growth"},{n:"Enterprise Value",eq:"EV = Equity + Debt \u2212 Cash",c:"Total firm value regardless of financing"}],
dd:"The EMH argues that thousands of motivated investors with different information trade shares, and in aggregate the price reflects all available information. Galton's ox-weight experiment (1906): 787 guesses averaged within 1 pound of truth. 'Ask the Audience' has 91% accuracy vs 65% for 'Phone a Friend'. Evidence FOR: event studies show rapid reaction; random walk tests. Evidence AGAINST: anomalies (January effect, small-firm premium, momentum); behavioural finance (overreaction, herding); bubble episodes.",
tf:"<strong>The 'three layers' approach:</strong> Weak form is easiest to defend \u2014 markets clearly don't follow simple patterns. Semi-strong is mostly true but anomalies exist. Strong form is almost certainly false \u2014 otherwise insider trading laws would be pointless.\n\n<strong>The 'two variables' trick:</strong> Every share valuation boils down to r (risk) and g (growth). If you know price and one variable, solve for the other. High P/E = either low r or high g.\n\n<strong>Exam framing:</strong> If asked to 'evaluate' EMH, present evidence on BOTH sides, then offer a nuanced conclusion. Never say markets are perfectly efficient or totally inefficient.",
ct:"Perpetuity: CF\u2081 is NEXT year's CF, not current. g must be < r. If given d\u2080, compute d\u2081 = d\u2080(1+g) first.",
el:"EMH was on CW1. CW2 may angle differently \u2014 e.g., connecting to behavioural finance."},

{id:4,title:"Bonds & Bond Pricing",icon:"\ud83d\udcdc",color:"#b9770e",chapter:"Fixed Income Securities",
kp:["Bond defined by: maturity, face value, coupon rate, payment frequency","Bond value = PV of all coupons + PV of face value at maturity","Coupon = YTM \u2192 par | Coupon < YTM \u2192 discount | Coupon > YTM \u2192 premium","Bond prices and interest rates move in OPPOSITE directions \u2014 fundamental","Coupons are an annuity \u2014 use the annuity factor for efficient calculation","UK gilts: conventional, index-linked, convertible, irredeemable","LIBOR replaced by SONIA (UK) and SOFR (US)","Credit rating agencies (Moody's, S&P) assess default risk"],
fm:[{n:"Bond Price (full)",eq:"P = \u03a3 [C/(1+y)\u1d57] + FV/(1+y)\u207f",c:"Discount each coupon individually plus face value"},{n:"Bond Price (annuity)",eq:"P = C \u00d7 AF(y,n) + FV \u00d7 DF(y,n)",c:"Annuity factor for coupons + discount factor for face value"},{n:"Annuity Factor",eq:"AF = [1 \u2212 1/(1+y)\u207f] / y",c:"PV of \u00a31 received every year for n years at rate y"},{n:"Coupon Payment",eq:"C = Coupon Rate \u00d7 Face Value",c:"Annual interest payment to bondholder"}],
dd:"Bonds are the core of debt capital markets. The key insight is the inverse price-yield relationship: when market rates rise, existing bonds become less attractive because their fixed coupons are below the new rate \u2014 so price falls. When rates fall, existing bonds with higher coupons become more valuable. At par: coupon rate = YTM, price = face value. Treasury bills are zero-coupon instruments. Corporate bonds carry credit risk reflected in a spread.",
tf:"<strong>The 'seesaw' model:</strong> Bond prices and interest rates sit on opposite ends of a seesaw. When one goes up, the other comes down. You can predict the direction before calculating.\n\n<strong>The 'par checkpoint':</strong> When coupon rate = YTM, price MUST equal face value. Use this to sanity-check every bond calculation. Coupon > YTM \u2192 premium (price > FV). Coupon < YTM \u2192 discount (price < FV).\n\n<strong>Two methods, same answer:</strong> Individual discounting and annuity method give identical results. Use the annuity method when possible \u2014 it's faster. For semi-annual: halve coupon rate, double periods, halve YTM.",
ct:"Both methods must give the same price. For semi-annual: halve coupon rate, double periods, halve YTM. Always check: is your price above or below face value? Does it match the coupon vs YTM relationship?",
el:"Bond markets, gilts, credit ratings, inverse price-yield relationship."},

{id:5,title:"Risk, Return & Portfolio Theory",icon:"\u2696\ufe0f",color:"#c0392b",chapter:"Markowitz & Diversification",
kp:["Risk = standard deviation of returns \u2014 measures volatility","Risk-averse investors won't take a 'fair bet' (EV=0) \u2014 need positive EV as compensation","Loss aversion: pain of losing \u00a320 > pleasure of gaining \u00a320 (Kahneman & Tversky)","Portfolio diversification reduces risk IF assets not perfectly positively correlated","With zero correlation: same expected return, lower risk \u2014 a free lunch!","Markowitz efficient frontier: portfolios with optimal return-to-risk","CML: combinations of risk-free asset + market portfolio M","All rational investors choose some mix of RFA and M based on risk appetite"],
fm:[{n:"Expected Value",eq:"E(V) = \u03a3 V\u1d62 \u00d7 P\u1d62",c:"Probability-weighted average of all outcomes"},{n:"Variance",eq:"\u03c3\u00b2 = \u03a3 P\u1d62 \u00d7 (V\u1d62 \u2212 E(V))\u00b2",c:"Average squared deviation from mean"},{n:"Standard Deviation",eq:"\u03c3 = \u221a\u03c3\u00b2",c:"Risk in the same units as the return"},{n:"Portfolio Variance",eq:"\u03c3\u00b2\u209a = w\u2081\u00b2\u03c3\u2081\u00b2 + w\u2082\u00b2\u03c3\u2082\u00b2 + 2w\u2081w\u2082\u03c3\u2081\u03c3\u2082\u03c1\u2081\u2082",c:"Depends on weights, risks AND correlation"},{n:"Portfolio Return",eq:"E(R\u209a) = w\u2081E(R\u2081) + w\u2082E(R\u2082)",c:"Weighted average \u2014 diversification affects risk, not return"}],
dd:"Markowitz (1952) showed mathematically that spreading investments reduces risk. The key is correlation (\u03c1): at +1, no benefit; at \u22121, risk can be eliminated; at 0, significant reduction. The coin-flip analogy: one \u00a320 bet vs two \u00a310 bets have the same EV, but the two-bet portfolio reduces worst-case probability from 50% to 25%.",
tf:"<strong>The coin-flip intuition:</strong> One \u00a320 bet: 50% chance of \u00b1\u00a320. Two \u00a310 bets: worst case drops from 50% to 25%. Same expected value, less risk. This IS diversification.\n\n<strong>The correlation dial:</strong> Think of \u03c1 as a dial from \u22121 to +1. At +1, diversification is pointless. At \u22121, it's magic. In reality, most stocks are 0 to +0.7 \u2014 enough for it to work.\n\n<strong>Return is additive, risk is NOT:</strong> Portfolio return = weighted average. Portfolio risk \u2260 weighted average \u2014 the covariance term makes it LESS. This is the mathematical basis of diversification.\n\n<strong>Variance recipe:</strong> (1) Find E(V), (2) Subtract mean from each outcome, (3) Square, (4) Multiply by probability, (5) Sum. SD = square root.",
ct:"For variance: go through the 5 steps methodically. For portfolio with \u03c1=0, the covariance term vanishes. Compare single-asset vs portfolio SD to demonstrate diversification benefit.",
el:"Foundation for CAPM. Efficient frontier, correlation's role, CML."},

{id:6,title:"Capital Asset Pricing Model (CAPM)",icon:"\u03b2",color:"#2471a3",chapter:"Systematic Risk & Asset Pricing",
kp:["Diversification limit at ~20 assets \u2014 beyond this, adding more doesn't help","Systematic (market) vs Unsystematic (firm-specific) risk","Market only compensates systematic risk \u2014 unsystematic can be diversified away","Beta = Cov(R\u1d62,R\u2098) / Var(R\u2098) \u2014 standardised covariance with the market","\u03b2=1 for market; \u03b2>1 = more volatile; \u03b2<1 = less volatile","SML: E(R\u1d62) = Rf + \u03b2\u1d62(Rm \u2212 Rf) \u2014 expected return given systematic risk","Above SML = undervalued (buy); Below = overvalued (sell); On SML = fairly priced","Assumptions: rational investors, efficient markets, single period, risk-free borrowing/lending","Limitations: unstable beta, Fama & French multi-factor critique, unrealistic assumptions","Advantage over DGM: explicitly models risk rather than relying on growth estimates"],
fm:[{n:"Beta",eq:"\u03b2\u1d62 = Cov(R\u1d62, R\u2098) / Var(R\u2098)",c:"How much the stock moves with the market"},{n:"SML / CAPM",eq:"E(R\u1d62) = Rf + \u03b2\u1d62 \u00d7 (E(R\u2098) \u2212 Rf)",c:"'Fair' expected return as function of systematic risk"},{n:"Market Risk Premium",eq:"MRP = E(R\u2098) \u2212 Rf",c:"Extra return market demands over risk-free rate"},{n:"Covariance",eq:"Cov(X,Y) = \u03a3 P\u1d62(X\u1d62 \u2212 X\u0304)(Y\u1d62 \u2212 Y\u0304)",c:"How two variables move together"}],
dd:"CAPM builds on Markowitz. Since rational investors hold diversified portfolios, only systematic risk matters. Beta quantifies this. \u03b2=1.5 means the stock swings 1.5\u00d7 the market. SML gives expected return \u2014 usable as Ke in WACC. Fama & French (1992) showed size and value explain returns better than beta alone \u2192 three-factor model. Despite critique, CAPM remains industry standard.",
tf:"<strong>Two types of risk:</strong> Total = systematic + unsystematic. You can't avoid systematic (recessions hit everyone), but CAN eliminate unsystematic by holding ~20 stocks. Since it's 'free' to remove unsystematic risk, the market doesn't pay for it.\n\n<strong>SML as a 'fair price line':</strong> Beta on x-axis, return on y-axis. Above the line = bargain. Below = overpriced. On the line = fairly valued.\n\n<strong>Beta as 'for every 1%':</strong> \u03b2 = 1.5 means: for every 1% the market moves, this stock moves about 1.5%. It answers a concrete, intuitive question.\n\n<strong>CAPM vs DGM:</strong> CAPM models risk explicitly (through \u03b2). DGM (Ke = D\u2081/P\u2080 + g) relies on dividend data and growth estimates. CAPM works for all stocks; DGM only for dividend-payers with stable growth. CAPM is generally considered superior.",
ct:"Beta from data: (1) Mean returns, (2) Deviations, (3) Stock dev \u00d7 market dev \u00d7 probability = covariance, (4) Market variance, (5) \u03b2 = cov/var. Then plug into SML.",
el:"CAPM was on CW1. Know assumptions, Fama & French critique, DGM comparison."},

{id:7,title:"Derivatives & Foreign Exchange",icon:"\ud83c\udf10",color:"#117a65",chapter:"Risk Management & Currency Markets",
kp:["Derivative = contract deriving value from an underlying asset","Four types: Forwards, Futures, Options, Swaps","Forwards: OTC, customised, held to maturity, counterparty risk","Futures: exchange-traded, standardised, daily mark-to-market, clearing house, no counterparty risk","Options: right NOT obligation; call (buy) / put (sell); buyer pays premium","Options: asymmetric payoff \u2014 limited downside (premium), unlimited upside for buyer","Swaps: exchange cash flows \u2014 e.g., fixed \u2194 floating rate","Uses: hedging, speculation, arbitrage \u2014 derivatives are zero-sum games","Exchange rates: direct vs indirect; bid vs ask (spread); spot vs forward","PPP: rates adjust for inflation differentials between countries","IRP: interest rate differentials offset by forward premium/discount","Three FX risks: Transaction (cash flow), Translation (accounting), Economic (competitiveness)","Internal hedging: leading/lagging, netting, foreign currency borrowing"],
fm:[{n:"Call Option Profit",eq:"Profit = max(S \u2212 E, 0) \u2212 Premium",c:"Exercise only if spot S > exercise price E"},{n:"Put Option Profit",eq:"Profit = max(E \u2212 S, 0) \u2212 Premium",c:"Exercise only if exercise E > spot S"},{n:"Margin Call",eq:"When balance < maintenance margin",c:"Top up to initial margin level"},{n:"Relative PPP",eq:"\u0394FX \u2248 Inflation_dom \u2212 Inflation_for",c:"Higher-inflation currency depreciates"},{n:"Covered IRP",eq:"F/S = (1 + r_d) / (1 + r_f)",c:"Forward rate eliminates arbitrage from interest differentials"}],
dd:"Derivatives originated in 1850s Chicago for grain price certainty. Forwards fix future prices but you're 'stuck' if prices move favourably. Futures solve counterparty risk via clearing houses. Options solve the 'stuck' problem: pay a premium for the RIGHT (not obligation) to trade. Swaps transform exposure. In FOREX: PPP explains long-run trends (Big Mac Index), IRP explains forward-spot relationships. Three FX risks: transaction (immediate), translation (accounting), economic (strategic competitiveness).",
tf:"<strong>Options as insurance:</strong> Buying a put = insurance on your shares. Premium = insurance cost. If price falls below exercise price, insurance pays out. If price stays high, you lose the premium but you're happy.\n\n<strong>Forwards vs Futures = bespoke suit vs off-the-rack:</strong> Forwards are tailored but the tailor might go bankrupt (counterparty risk). Futures are standardised but the department store (exchange) guarantees delivery.\n\n<strong>The zero-sum check:</strong> For every derivatives question, ask: if one party gains, who loses? In hedging, the gain/loss on the derivative offsets the loss/gain on the underlying.\n\n<strong>Margin tracking:</strong> Start with initial margin. Daily: price change \u2192 P&L \u2192 adjust balance. If balance < maintenance \u2192 margin call \u2192 top up to initial.",
ct:"Futures: Day | Price | Daily P&L | Balance | Margin Call table. Options: payoff diagrams. FOREX: clarify base vs quote currency.",
el:"Forwards vs Futures table. Options payoff. Hedging strategies. FX theories. Transaction/Translation/Economic risk."},

{id:8,title:"WACC & Modigliani-Miller",icon:"\ud83c\udfd7\ufe0f",color:"#6c3483",chapter:"Capital Structure & Cost of Capital",
kp:["WACC = weighted average cost of capital \u2014 minimum return firm must earn","Cost of Debt after tax: Kd(1\u2212T) \u2014 interest is tax-deductible","Cost of Pref Shares: Kps = Div/P\u2080 \u2014 flat perpetuity","Cost of Equity via DGM: Kos = D\u2081/P\u2080 + g","Cost of Equity via CAPM: Kos = Rf + \u03b2(Rm \u2212 Rf)","Use MARKET values for weights, not book values","MM 1958 (no tax): VL = VU; capital structure irrelevant; WACC constant","Pizza analogy: more slices \u2260 more pizza","MM 1963 (with tax): VL = VU + TD; debt adds value via tax shield","100% debt optimal under MM 1963 \u2014 but ignores financial distress","Financial distress: direct (legal fees) + indirect (lost customers, fire sales)","Trade-off theory: optimal gearing where tax benefit = distress cost"],
fm:[{n:"WACC",eq:"WACC = Kd(1\u2212T)\u00d7Wd + Kps\u00d7Wps + Kos\u00d7Wos",c:"Weighted average of all capital costs"},{n:"Cost of Debt (after-tax)",eq:"Kdt = Kd \u00d7 (1 \u2212 T)",c:"Tax-adjusted because interest reduces taxable profit"},{n:"Cost of Pref Shares",eq:"Kps = Div / P\u2080",c:"Fixed dividend / market price"},{n:"Cost of Equity (DGM)",eq:"Kos = D\u2081/P\u2080 + g",c:"Dividend yield + expected growth"},{n:"Cost of Equity (CAPM)",eq:"Kos = Rf + \u03b2(Rm \u2212 Rf)",c:"Risk-free + risk premium"},{n:"MM 1958 Prop I",eq:"VL = VU",c:"Without tax: structure irrelevant"},{n:"MM 1963 Prop I",eq:"VL = VU + T\u00d7D",c:"With tax: each \u00a3 of debt adds T pence via tax shield"},{n:"MM Prop II",eq:"Ke = Ku + (Ku \u2212 Kd) \u00d7 D/E",c:"Cost of equity rises linearly with leverage"}],
dd:"MM 1958 showed (under perfect markets) that financing doesn't affect value \u2014 total value depends on asset cash flows, not how they're split (pizza analogy). With tax (1963), interest is deductible, creating a tax shield worth T\u00d7D. But 100% debt is absurd because distress costs rise. Trade-off theory finds the optimum where marginal tax benefit equals marginal distress cost.",
tf:"<strong>The pizza analogy (MM 1958):</strong> Yogi Berra: 'Cut it in 8, I'm hungry.' Total pizza doesn't change. Splitting cash flows between debt/equity doesn't change total value. Breaks down with tax.\n\n<strong>The three-act play:</strong> Act 1 (MM 1958): Structure irrelevant. Act 2 (MM 1963): More debt = more value (tax shield). Act 3 (Trade-off): Limit because distress costs rise. Each act relaxes an assumption.\n\n<strong>WACC checklist:</strong> (1) Cost of each source \u2014 DON'T FORGET TAX ON DEBT. (2) Market value weights. (3) Formula. Common trap: using before-tax cost of debt.",
ct:"WACC: (1) Each cost separately (Kd after tax!), (2) Market value weights, (3) Formula. Show all sub-calculations.",
el:"Capital structure debate. MM with/without tax. Pizza analogy. Distress costs. Trade-off theory."},

{id:9,title:"Dividend Policy",icon:"\ud83d\udcb0",color:"#d4ac0d",chapter:"Dividends vs Retained Earnings",
kp:["Dividend policy = distribute earnings vs retain and reinvest","MM Irrelevance: under perfect markets, payout ratio doesn't affect value","'Homemade dividends': investors can sell shares to create desired income","Key: price identical regardless of payout IF retained earnings earn ROE = Ke","Bird-in-the-Hand (Gordon 1959): prefer certain dividends \u2014 largely refuted as 'fallacy'","Tax Preference: capital gains taxed lower \u2192 low payout preferred","Signalling: dividend changes convey management's private information","Pecking Order: internal funds \u2192 debt \u2192 equity (cheapest to most expensive)","Akerlof's 'lemons': external investors can't tell jewels from lemons","Clientele Effect: different investor types prefer different payout patterns","Lintner (1956): firms smooth dividends \u2014 only increase when sustainable","Share buybacks: flexible, tax-efficient alternative to dividends"],
fm:[{n:"Growth Rate",eq:"g = Retention Ratio \u00d7 ROE",c:"Growth funded by retained earnings"},{n:"Price (100% payout)",eq:"P = Div / Ke",c:"Flat perpetuity \u2014 no growth"},{n:"Price (partial payout)",eq:"P = D\u2081 / (Ke \u2212 g)",c:"Gordon Growth Model"},{n:"MM Proof",eq:"If ROE = Ke, P is same for any payout ratio",c:"Value from growth exactly compensates lost dividends"}],
dd:"MM argue value depends on earnings power, not how earnings are split. If a firm cuts dividends, retained earnings generate growth whose PV exactly compensates. In reality: taxes discriminate, transaction costs exist, and dividends send signals. Pecking Order (Akerlof's lemons) explains preference for internal financing. Lintner found firms smooth dividends empirically.",
tf:"<strong>MM world vs real world:</strong> MM's logic is airtight in a perfect world. Every other theory says: 'Yes, but the real world has [taxes / info asymmetry / transaction costs].' Use MM as baseline, layer on frictions.\n\n<strong>Signal vs noise:</strong> Dividends work as signals because they're costly to fake. A firm raising dividends commits to higher future payouts \u2014 if unsustainable, the embarrassing cut destroys value.\n\n<strong>Pecking Order chain:</strong> Info asymmetry \u2192 external investors demand premium \u2192 external capital expensive \u2192 prefer internal funds \u2192 dividends only from leftover cash.\n\n<strong>The numerical proof:</strong> Show P = \u00a310 with 100% payout AND P = \u00a310 with 20% payout (when ROE = Ke). This is the most convincing exam technique.",
ct:"MM proof: Scenario 1: P = \u00a31/0.10 = \u00a310. Scenario 2: g = 0.8\u00d710% = 8%, D\u2081 = \u00a30.20, P = 0.20/(0.10\u22120.08) = \u00a310. Same!",
el:"Compare all theories. Akerlof's lemons \u2192 pecking order. Lintner's smoothing. Buybacks."},

{id:10,title:"Working Capital Management",icon:"\ud83d\udd04",color:"#a04000",chapter:"Liquidity & Day-to-Day Finance",
kp:["NWC = Current Assets \u2212 Current Liabilities \u2014 measures liquidity","WCM balances liquidity risk vs profitability","Operating Cycle = DIO + DSO","Cash Conversion Cycle = DIO + DSO \u2212 DPO","Shorter CCC = more efficient \u2014 less external financing needed","Aggressive: low WC, high return, high shortage risk","Conservative: high WC, low risk, high carrying costs","Trade credit (3/10 net 40): implicit interest ~44.9% p.a. if discount not taken","EOQ minimises total ordering + carrying costs","JIT (Toyota): minimal inventory, strong supplier relationships","JIT weakness: no buffer for disruptions (COVID exposed this)","Factoring: sell receivables; Invoice discounting: borrow against them","Financing: maturity matching, aggressive (short-term), conservative (long-term)"],
fm:[{n:"NWC",eq:"NWC = CA \u2212 CL",c:"Positive = can cover short-term obligations"},{n:"DIO",eq:"DIO = (Inventory / COGS) \u00d7 365",c:"Days goods sit in inventory"},{n:"DSO",eq:"DSO = (Receivables / Revenue) \u00d7 365",c:"Days until customers pay"},{n:"DPO",eq:"DPO = (Payables / COGS) \u00d7 365",c:"Days firm takes to pay suppliers"},{n:"Operating Cycle",eq:"OC = DIO + DSO",c:"Raw material receipt to cash collection"},{n:"CCC",eq:"CCC = DIO + DSO \u2212 DPO",c:"Net days between cash out and cash in"},{n:"Trade Credit Cost",eq:"Cost = [d/(1\u2212d)]^(365/(full\u2212disc)) \u2212 1",c:"Annualised cost of skipping early-payment discount"},{n:"EOQ",eq:"EOQ = \u221a(2 \u00d7 D \u00d7 S / H)",c:"D=annual demand, S=order cost, H=holding cost/unit"}],
dd:"CCC is the key: positive = you pay suppliers before collecting from customers. Aggressive WCM minimises current assets for higher returns but risks stockouts. Conservative WCM holds buffers but ties up capital. EOQ balances order costs vs carrying costs. JIT works brilliantly until supply chains break. Trade credit (3/10 net 40) sounds small but annualises to ~44.9%.",
tf:"<strong>CCC as a 'cash gap':</strong> Pay supplier (Day 0), inventory sits (DIO), sell and wait (DSO), but you delayed payment by DPO. CCC = the gap you must finance. Negative CCC (some retailers) = suppliers finance YOU.\n\n<strong>Too much vs too little:</strong> For every WC component, there's a cost of too much AND too little. The optimal level minimises the sum.\n\n<strong>Trade credit as a hidden loan:</strong> '3/10 net 40' = pay in 10 days for 3% off, or full price by day 40. Skipping = borrowing 97% for 30 days at 3% \u2192 ~44.9% annualised. Way more than a bank loan.\n\n<strong>Aggressive vs Conservative = risk-return dial:</strong> Aggressive WCM is like a high-\u03b2 stock. Conservative is like a government bond. The broader risk-return theme again.",
ct:"CCC: each component from B/S and P&L, then combine. Trade credit: [0.03/0.97]^(365/30)\u22121. EOQ: identify D, S, H and plug in.",
el:"WCM trade-offs. Aggressive vs conservative. Factoring vs discounting. JIT pros/cons. Financing strategies."}
];

function showView(n,lid){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const tabs=document.querySelectorAll('.nav-tab');
  const m={overview:0,formulas:1,sectionA:2,sectionB:3,checklist:4};
  if(m[n]!==undefined)tabs[m[n]].classList.add('active');
  ['overview','lecture','formulas','sectionA','sectionB','checklist'].forEach(v=>{document.getElementById('v-'+v).hidden=(v!==n)});
  cv=n;
  if(n==='lecture'&&lid)rL(lid);if(n==='formulas')rF();if(n==='sectionA')rA();if(n==='sectionB')rB();if(n==='checklist')rC();
  window.scrollTo({top:0,behavior:'smooth'});
}

function rA(){

const PQ = [
{cat:"NPV & IRR",icon:"\u23f3",color:"#1a5276",questions:[
{q:"A company is considering a project costing \u00a3200,000. Expected cash flows: Year 1: \u00a360,000, Year 2: \u00a370,000, Year 3: \u00a380,000, Year 4: \u00a390,000. The cost of capital is 12%. Calculate the NPV and advise whether the project should be accepted.",
sol:`<strong>Step 1: Calculate discount factors at 12%</strong>
Year 1: DF = 1/(1.12)\u00b9 = 0.8929
Year 2: DF = 1/(1.12)\u00b2 = 0.7972
Year 3: DF = 1/(1.12)\u00b3 = 0.7118
Year 4: DF = 1/(1.12)\u2074 = 0.6355

<strong>Step 2: Calculate present values</strong>
Year 0: \u2212\u00a3200,000 \u00d7 1.0000 = \u2212\u00a3200,000
Year 1: \u00a360,000 \u00d7 0.8929 = \u00a353,574
Year 2: \u00a370,000 \u00d7 0.7972 = \u00a355,804
Year 3: \u00a380,000 \u00d7 0.7118 = \u00a356,944
Year 4: \u00a390,000 \u00d7 0.6355 = \u00a357,195

<strong>Step 3: Sum all present values</strong>
NPV = \u2212200,000 + 53,574 + 55,804 + 56,944 + 57,195
NPV = +\u00a323,517

<strong>Decision:</strong> Since NPV > 0, the project should be <strong>accepted</strong>. It creates \u00a323,517 of value above the required 12% return.`},

{q:"Using the same project above (\u00a3200,000 investment, CFs of 60k, 70k, 80k, 90k), the NPV at 12% is +\u00a323,517 and the NPV at 20% is \u2212\u00a312,208. Estimate the IRR using linear interpolation and advise on the project if the cost of capital is 15%.",
sol:`<strong>Step 1: Identify the two data points</strong>
At r\u2081 = 12%: NPV\u2081 = +\u00a323,517 (positive)
At r\u2082 = 20%: NPV\u2082 = \u2212\u00a312,208 (negative)

<strong>Step 2: Apply the interpolation formula</strong>
IRR = r\u208a + [NPV\u208a / (NPV\u208a \u2212 NPV\u208b)] \u00d7 (r\u208b \u2212 r\u208a)

IRR = 12% + [23,517 / (23,517 \u2212 (\u221212,208))] \u00d7 (20% \u2212 12%)
IRR = 12% + [23,517 / 35,725] \u00d7 8%
IRR = 12% + 0.6584 \u00d7 8%
IRR = 12% + 5.27%
IRR = <strong>17.27%</strong>

<strong>Decision:</strong> Since IRR (17.27%) > cost of capital (15%), the project should be <strong>accepted</strong>. The project's return exceeds the minimum required return.

<strong>Note:</strong> The IRR and NPV methods agree here \u2014 both say accept. This is typical for conventional, independent projects.`}
]},

{cat:"AER & Compounding",icon:"\ud83d\udcca",color:"#1e8449",questions:[
{q:"A bank offers a savings account with a nominal (quoted) rate of 8% per annum, compounded quarterly. What is the Annual Equivalent Rate (AER)?",
sol:`<strong>Formula:</strong> AER = (1 + r/m)\u1d50 \u2212 1

Where:
r = nominal rate = 0.08
m = compounding frequency = 4 (quarterly)

<strong>Calculation:</strong>
AER = (1 + 0.08/4)\u2074 \u2212 1
AER = (1 + 0.02)\u2074 \u2212 1
AER = (1.02)\u2074 \u2212 1
AER = 1.08243 \u2212 1
AER = <strong>0.08243 = 8.24%</strong>

<strong>Interpretation:</strong> Although the quoted rate is 8%, the effective annual rate is 8.24% because interest is compounded four times per year. Each quarter, interest is earned on previously accumulated interest.

<strong>Key insight:</strong> The more frequent the compounding, the higher the AER. Daily compounding at 8% nominal would give AER = (1 + 0.08/365)\u00b3\u2076\u2075 \u2212 1 = 8.33%.`},

{q:"You invest \u00a31,000 and receive \u00a31,350 after 4 years. What is your annualised (geometric average) rate of return? How long would it take to double your money at this rate?",
sol:`<strong>Part 1: Geometric average return</strong>
Formula: r = (FV/PV)^(1/n) \u2212 1

r = (1,350/1,000)^(1/4) \u2212 1
r = (1.35)^(0.25) \u2212 1
r = 1.0778 \u2212 1
r = <strong>0.0778 = 7.78% per annum</strong>

<strong>Why not simple average?</strong> Total return = 35% over 4 years. Simple average = 35%/4 = 8.75%. But this overstates the true rate because it ignores the compounding effect. The geometric average (7.78%) is the correct annualised return.

<strong>Part 2: Doubling time</strong>
Formula: n = log(2) / log(1 + r)

n = log(2) / log(1.0778)
n = 0.6931 / 0.0749
n = <strong>9.25 years</strong>

<strong>Quick check (Rule of 72):</strong> 72 / 7.78 \u2248 9.3 years. Matches our calculation.`}
]},

{cat:"Bond Pricing",icon:"\ud83d\udcdc",color:"#b9770e",questions:[
{q:"A corporate bond has a face value of \u00a31,000, a coupon rate of 6% paid annually, and 5 years to maturity. If the current yield to maturity (YTM) is 8%, calculate the bond's price. Is the bond trading at par, premium, or discount?",
sol:`<strong>Step 1: Identify the cash flows</strong>
Annual coupon = 6% \u00d7 \u00a31,000 = \u00a360
Face value at maturity = \u00a31,000
YTM = 8%, n = 5 years

<strong>Method 1: Individual discounting</strong>
Year 1: \u00a360 / (1.08)\u00b9 = \u00a360 / 1.0800 = \u00a355.56
Year 2: \u00a360 / (1.08)\u00b2 = \u00a360 / 1.1664 = \u00a351.44
Year 3: \u00a360 / (1.08)\u00b3 = \u00a360 / 1.2597 = \u00a347.63
Year 4: \u00a360 / (1.08)\u2074 = \u00a360 / 1.3605 = \u00a344.10
Year 5: \u00a360 / (1.08)\u2075 = \u00a360 / 1.4693 = \u00a340.83
Year 5 (FV): \u00a31,000 / (1.08)\u2075 = \u00a31,000 / 1.4693 = \u00a3680.58

Bond Price = 55.56 + 51.44 + 47.63 + 44.10 + 40.83 + 680.58 = <strong>\u00a3920.15</strong>

<strong>Method 2: Annuity method (faster)</strong>
AF(8%, 5) = [1 \u2212 1/(1.08)\u2075] / 0.08 = [1 \u2212 0.6806] / 0.08 = 3.9927
DF(8%, 5) = 1/(1.08)\u2075 = 0.6806

Price = \u00a360 \u00d7 3.9927 + \u00a31,000 \u00d7 0.6806
Price = 239.56 + 680.58
Price = <strong>\u00a3920.15</strong> \u2714 (same answer)

<strong>The bond trades at a DISCOUNT</strong> because the coupon rate (6%) < YTM (8%). Investors demand 8% but the bond only pays 6% in coupons, so the price must fall below face value to compensate.`},

{q:"If the YTM on the same bond (6% coupon, 5yr, \u00a31,000 FV) falls to 4%, what is the new price? What does this tell you about the relationship between bond prices and interest rates?",
sol:`<strong>Using annuity method at 4%:</strong>
AF(4%, 5) = [1 \u2212 1/(1.04)\u2075] / 0.04 = [1 \u2212 0.8219] / 0.04 = 4.4518
DF(4%, 5) = 1/(1.04)\u2075 = 0.8219

Price = \u00a360 \u00d7 4.4518 + \u00a31,000 \u00d7 0.8219
Price = 267.11 + 821.93
Price = <strong>\u00a31,089.04</strong>

<strong>The bond now trades at a PREMIUM</strong> because coupon rate (6%) > YTM (4%).

<strong>Summary of the inverse relationship:</strong>
\u2022 At YTM = 8%: Price = \u00a3920.15 (discount)
\u2022 At YTM = 6%: Price = \u00a31,000.00 (par)
\u2022 At YTM = 4%: Price = \u00a31,089.04 (premium)

As YTM falls, price rises. As YTM rises, price falls. This is the fundamental inverse relationship between bond prices and interest rates \u2014 the 'seesaw' effect.`}
]},

{cat:"Portfolio Risk & CAPM",icon:"\u03b2",color:"#2471a3",questions:[
{q:"Consider the following probability distribution of returns for Stock X:\n\nBoom (P=0.3): Return = 20%\nNormal (P=0.5): Return = 10%\nRecession (P=0.2): Return = \u22125%\n\nCalculate: (a) Expected return, (b) Variance, (c) Standard deviation.",
sol:`<strong>(a) Expected Return</strong>
E(R) = \u03a3 R\u1d62 \u00d7 P\u1d62
E(R) = (0.20 \u00d7 0.3) + (0.10 \u00d7 0.5) + (\u22120.05 \u00d7 0.2)
E(R) = 0.06 + 0.05 + (\u22120.01)
E(R) = <strong>0.10 = 10%</strong>

<strong>(b) Variance</strong>
\u03c3\u00b2 = \u03a3 P\u1d62 \u00d7 (R\u1d62 \u2212 E(R))\u00b2

Boom:    0.3 \u00d7 (0.20 \u2212 0.10)\u00b2 = 0.3 \u00d7 (0.10)\u00b2 = 0.3 \u00d7 0.01 = 0.0030
Normal:  0.5 \u00d7 (0.10 \u2212 0.10)\u00b2 = 0.5 \u00d7 (0.00)\u00b2 = 0.5 \u00d7 0.00 = 0.0000
Recess:  0.2 \u00d7 (\u22120.05 \u2212 0.10)\u00b2 = 0.2 \u00d7 (\u22120.15)\u00b2 = 0.2 \u00d7 0.0225 = 0.0045

\u03c3\u00b2 = 0.0030 + 0.0000 + 0.0045 = <strong>0.0075</strong>

<strong>(c) Standard Deviation</strong>
\u03c3 = \u221a0.0075 = <strong>0.0866 = 8.66%</strong>

<strong>Interpretation:</strong> The stock has an expected return of 10% with a risk (standard deviation) of 8.66%. A risk-averse investor would only hold this stock if the 10% expected return adequately compensates for the 8.66% volatility.`},

{q:"The risk-free rate is 3% and the expected market return is 11%. Stock A has a beta of 1.4 and Stock B has a beta of 0.7. (a) Calculate the expected return for each stock using CAPM. (b) If Stock A is currently yielding 14%, is it undervalued or overvalued? (c) What is the market risk premium?",
sol:`<strong>(a) Expected returns using the SML</strong>
E(R\u1d62) = Rf + \u03b2\u1d62(E(Rm) \u2212 Rf)

<strong>Stock A (\u03b2 = 1.4):</strong>
E(R\u2090) = 3% + 1.4 \u00d7 (11% \u2212 3%)
E(R\u2090) = 3% + 1.4 \u00d7 8%
E(R\u2090) = 3% + 11.2%
E(R\u2090) = <strong>14.2%</strong>

<strong>Stock B (\u03b2 = 0.7):</strong>
E(R\u1d47) = 3% + 0.7 \u00d7 (11% \u2212 3%)
E(R\u1d47) = 3% + 0.7 \u00d7 8%
E(R\u1d47) = 3% + 5.6%
E(R\u1d47) = <strong>8.6%</strong>

<strong>(b) Stock A valuation</strong>
CAPM says Stock A should yield 14.2%. It's actually yielding 14%.
Since actual return (14%) < required return (14.2%), Stock A sits <strong>below the SML</strong> and is therefore <strong>overvalued</strong>. It's not giving enough return for its level of risk.

<strong>(c) Market Risk Premium</strong>
MRP = E(Rm) \u2212 Rf = 11% \u2212 3% = <strong>8%</strong>

This is the extra return the market as a whole demands over the risk-free rate for bearing systematic risk.`},

{q:"You have two stocks with zero correlation:\n\u2022 Stock P: E(R) = 12%, \u03c3 = 20%\n\u2022 Stock Q: E(R) = 8%, \u03c3 = 10%\n\nCalculate the portfolio return and risk for a 50/50 portfolio. Compare the portfolio risk to the weighted average of individual risks.",
sol:`<strong>Portfolio Return (always a weighted average):</strong>
E(R\u209a) = w\u2081E(R\u2081) + w\u2082E(R\u2082)
E(R\u209a) = 0.5 \u00d7 12% + 0.5 \u00d7 8%
E(R\u209a) = 6% + 4% = <strong>10%</strong>

<strong>Portfolio Variance (with \u03c1 = 0):</strong>
\u03c3\u00b2\u209a = w\u2081\u00b2\u03c3\u2081\u00b2 + w\u2082\u00b2\u03c3\u2082\u00b2 + 2w\u2081w\u2082\u03c3\u2081\u03c3\u2082\u03c1
                                          \u2191 this term = 0 because \u03c1 = 0

\u03c3\u00b2\u209a = (0.5)\u00b2 \u00d7 (0.20)\u00b2 + (0.5)\u00b2 \u00d7 (0.10)\u00b2
\u03c3\u00b2\u209a = 0.25 \u00d7 0.04 + 0.25 \u00d7 0.01
\u03c3\u00b2\u209a = 0.01 + 0.0025
\u03c3\u00b2\u209a = 0.0125

<strong>Portfolio Standard Deviation:</strong>
\u03c3\u209a = \u221a0.0125 = <strong>11.18%</strong>

<strong>Comparison \u2014 the diversification benefit:</strong>
\u2022 Weighted average risk = 0.5 \u00d7 20% + 0.5 \u00d7 10% = 15%
\u2022 Actual portfolio risk = 11.18%
\u2022 Risk reduction = 15% \u2212 11.18% = <strong>3.82 percentage points</strong>

The portfolio earns 10% return with only 11.18% risk, compared to 15% if there were no diversification benefit. This is the power of diversification \u2014 same return but lower risk, purely because the two stocks have zero correlation.`}
]},

{cat:"WACC",icon:"\ud83c\udfd7\ufe0f",color:"#6c3483",questions:[
{q:"A company has the following capital structure (at market values):\n\u2022 Ordinary shares: \u00a36 million\n\u2022 Preference shares: \u00a31.5 million\n\u2022 Bonds: \u00a32.5 million\n\nAdditional information:\n\u2022 Equity beta = 1.2, Risk-free rate = 4%, Market return = 12%\n\u2022 Preference shares pay a dividend of \u00a30.80 and trade at \u00a310\n\u2022 Bonds have a YTM of 6%\n\u2022 Corporate tax rate = 25%\n\nCalculate the WACC.",
sol:`<strong>Step 1: Cost of each source</strong>

<strong>Cost of Ordinary Shares (using CAPM):</strong>
Kos = Rf + \u03b2(Rm \u2212 Rf)
Kos = 4% + 1.2 \u00d7 (12% \u2212 4%)
Kos = 4% + 1.2 \u00d7 8%
Kos = 4% + 9.6% = <strong>13.6%</strong>

<strong>Cost of Preference Shares:</strong>
Kps = Div / P\u2080
Kps = \u00a30.80 / \u00a310 = <strong>8%</strong>

<strong>Cost of Debt (after tax):</strong>
Kdt = Kd \u00d7 (1 \u2212 T)
Kdt = 6% \u00d7 (1 \u2212 0.25)
Kdt = 6% \u00d7 0.75 = <strong>4.5%</strong>

<strong>Step 2: Calculate market value weights</strong>
Total value V = 6 + 1.5 + 2.5 = \u00a310 million

Wos = 6/10 = 0.60
Wps = 1.5/10 = 0.15
Wd = 2.5/10 = 0.25

<strong>Step 3: Calculate WACC</strong>
WACC = Kdt \u00d7 Wd + Kps \u00d7 Wps + Kos \u00d7 Wos
WACC = 4.5% \u00d7 0.25 + 8% \u00d7 0.15 + 13.6% \u00d7 0.60
WACC = 1.125% + 1.20% + 8.16%
WACC = <strong>10.49%</strong>

<strong>Interpretation:</strong> The firm must earn at least 10.49% on its investments to satisfy all capital providers. Any project with IRR < 10.49% (or NPV < 0 when discounted at 10.49%) should be rejected.

<strong>Common mistakes to avoid:</strong>
\u2022 Forgetting to use AFTER-tax cost of debt (not 6%, but 4.5%)
\u2022 Using book values instead of market values for weights
\u2022 Adding tax adjustment to preference shares (only debt interest is tax-deductible)`}
]},

{cat:"Options & Futures",icon:"\ud83c\udf10",color:"#117a65",questions:[
{q:"You buy a European call option on a stock with an exercise price of \u00a350 and a premium of \u00a34. Calculate your profit/loss if the stock price at maturity is: (a) \u00a360, (b) \u00a352, (c) \u00a345.",
sol:`<strong>Call option profit formula:</strong> Profit = max(S \u2212 E, 0) \u2212 Premium

<strong>(a) Stock price = \u00a360</strong>
Payoff = max(60 \u2212 50, 0) = \u00a310
Profit = 10 \u2212 4 = <strong>+\u00a36 (profit)</strong>
Exercise? <strong>Yes</strong> \u2014 you buy at \u00a350 what's worth \u00a360.

<strong>(b) Stock price = \u00a352</strong>
Payoff = max(52 \u2212 50, 0) = \u00a32
Profit = 2 \u2212 4 = <strong>\u2212\u00a32 (loss)</strong>
Exercise? <strong>Yes</strong> \u2014 the payoff (\u00a32) partially offsets the premium (\u00a34). Better to exercise and lose \u00a32 than not exercise and lose \u00a34.

<strong>(c) Stock price = \u00a345</strong>
Payoff = max(45 \u2212 50, 0) = \u00a30
Profit = 0 \u2212 4 = <strong>\u2212\u00a34 (loss)</strong>
Exercise? <strong>No</strong> \u2014 why buy at \u00a350 when market price is \u00a345? Let the option expire. Maximum loss = premium paid.

<strong>Key insight:</strong> The break-even point is \u00a354 (exercise price + premium). The buyer's maximum loss is always limited to the premium (\u00a34), but upside is unlimited.`},

{q:"A trader goes long on 5 futures contracts at \u00a3500 each. Initial margin is \u00a3100 per contract (\u00a3500 total). Maintenance margin is \u00a375 per contract (\u00a3375 total). Track the margin account:\n\nDay 2: price = \u00a3490\nDay 3: price = \u00a3470\nDay 4: price = \u00a3485\nDay 5: price = \u00a3510",
sol:`<strong>Tracking the margin account (5 contracts):</strong>

<strong>Day 1 (entry):</strong> Price = \u00a3500, Balance = \u00a3500 (initial margin)

<strong>Day 2:</strong> Price = \u00a3490
Daily P&L = (490 \u2212 500) \u00d7 5 = \u2212\u00a350
Balance = 500 \u2212 50 = <strong>\u00a3450</strong>
Margin call? No (\u00a3450 > \u00a3375 maintenance)

<strong>Day 3:</strong> Price = \u00a3470
Daily P&L = (470 \u2212 490) \u00d7 5 = \u2212\u00a3100
Balance = 450 \u2212 100 = <strong>\u00a3350</strong>
Margin call? <strong>YES</strong> (\u00a3350 < \u00a3375 maintenance)
Top up: \u00a3500 \u2212 \u00a3350 = +\u00a3150 deposited
New balance = <strong>\u00a3500</strong>

<strong>Day 4:</strong> Price = \u00a3485
Daily P&L = (485 \u2212 470) \u00d7 5 = +\u00a375
Balance = 500 + 75 = <strong>\u00a3575</strong>
Margin call? No

<strong>Day 5:</strong> Price = \u00a3510
Daily P&L = (510 \u2212 485) \u00d7 5 = +\u00a3125
Balance = 575 + 125 = <strong>\u00a3700</strong>
Margin call? No

<strong>Net P&L:</strong> (510 \u2212 500) \u00d7 5 = +\u00a350 profit
But the trader had to deposit \u00a3150 extra on Day 3 (margin call), so total cash committed = \u00a3500 + \u00a3150 = \u00a3650. Final balance = \u00a3700.

<strong>Key point:</strong> The margin call on Day 3 didn't change the net profit \u2014 it just required additional cash to keep the position open.`}
]},

{cat:"Working Capital",icon:"\ud83d\udd04",color:"#a04000",questions:[
{q:"From a company's financial statements:\n\u2022 Revenue: \u00a3800,000\n\u2022 Cost of goods sold: \u00a3500,000\n\u2022 Inventory: \u00a330,000\n\u2022 Accounts receivable: \u00a360,000\n\u2022 Accounts payable: \u00a340,000\n\nCalculate: (a) DIO, (b) DSO, (c) DPO, (d) Operating Cycle, (e) Cash Conversion Cycle. Interpret the result.",
sol:`<strong>(a) Days Inventory Outstanding</strong>
DIO = (Inventory / COGS) \u00d7 365
DIO = (30,000 / 500,000) \u00d7 365
DIO = 0.06 \u00d7 365 = <strong>21.9 days</strong>

<strong>(b) Days Sales Outstanding</strong>
DSO = (Receivables / Revenue) \u00d7 365
DSO = (60,000 / 800,000) \u00d7 365
DSO = 0.075 \u00d7 365 = <strong>27.4 days</strong>

<strong>(c) Days Payable Outstanding</strong>
DPO = (Payables / COGS) \u00d7 365
DPO = (40,000 / 500,000) \u00d7 365
DPO = 0.08 \u00d7 365 = <strong>29.2 days</strong>

<strong>(d) Operating Cycle</strong>
OC = DIO + DSO = 21.9 + 27.4 = <strong>49.3 days</strong>

<strong>(e) Cash Conversion Cycle</strong>
CCC = DIO + DSO \u2212 DPO = 21.9 + 27.4 \u2212 29.2 = <strong>20.1 days</strong>

<strong>Interpretation:</strong> The company takes about 22 days to sell inventory, then 27 days to collect from customers, but delays payment to suppliers by 29 days. The net result is a 20-day 'cash gap' between paying suppliers and receiving cash \u2014 this gap must be financed (e.g., by overdraft or working capital facility).

<strong>To improve:</strong> Reduce DIO (lean inventory), reduce DSO (chase payments faster), increase DPO (negotiate longer payment terms with suppliers).`},

{q:"A supplier offers credit terms of 2/10, net 30. (a) What is the annualised cost of NOT taking the discount? (b) Should the firm take the discount if its bank overdraft rate is 15%?",
sol:`<strong>(a) Annualised cost of trade credit</strong>
Terms: 2/10, net 30 = 2% discount if paid within 10 days, otherwise full payment due in 30 days.

By not taking the discount, the firm is effectively borrowing 98% of the invoice for an extra 20 days (30 \u2212 10) at a cost of 2%.

Formula: Cost = [d / (1 \u2212 d)]^(365 / (full \u2212 disc)) \u2212 1

Cost = [0.02 / (1 \u2212 0.02)]^(365 / (30 \u2212 10)) \u2212 1
Cost = [0.02 / 0.98]^(365/20) \u2212 1
Cost = (0.02041)^(18.25) \u2212 1
Cost = (1.02041)^(18.25) \u2212 1
Cost = 1.4459 \u2212 1
Cost = <strong>0.4459 = 44.59% per annum</strong>

<strong>(b) Decision</strong>
Cost of trade credit: 44.59%
Bank overdraft rate: 15%

The firm should <strong>take the discount</strong> and borrow from the bank at 15% to pay early, because 15% is far cheaper than the implicit 44.59% cost of skipping the discount.

<strong>Key insight:</strong> Trade credit discounts that seem small (just 2%!) can be extremely expensive when annualised. Always compare the annualised cost to available borrowing rates.`},

{q:"Annual demand for a component is 10,000 units. Each order costs \u00a350 to process. The holding cost is \u00a32 per unit per year. Calculate the EOQ and the total number of orders per year.",
sol:`<strong>EOQ Formula:</strong> EOQ = \u221a(2 \u00d7 D \u00d7 S / H)

Where:
D = Annual demand = 10,000 units
S = Ordering cost = \u00a350 per order
H = Holding cost = \u00a32 per unit per year

EOQ = \u221a(2 \u00d7 10,000 \u00d7 50 / 2)
EOQ = \u221a(1,000,000 / 2)
EOQ = \u221a500,000
EOQ = <strong>707 units per order</strong>

<strong>Number of orders per year:</strong>
Orders = D / EOQ = 10,000 / 707 = <strong>14.1 orders per year</strong> (approximately 14 orders)

<strong>Total annual cost at EOQ:</strong>
Total ordering cost = (10,000/707) \u00d7 \u00a350 = \u00a3707
Total holding cost = (707/2) \u00d7 \u00a32 = \u00a3707
Total = \u00a31,414

<strong>Key insight:</strong> At the EOQ, ordering costs exactly equal holding costs \u2014 this is always the case at the optimal point. If you find they're not equal, recheck your calculation.`}
]},

{cat:"Perpetuity & Share Valuation",icon:"\ud83c\udfdb\ufe0f",color:"#7d3c98",questions:[
{q:"A company just paid a dividend of \u00a32.40 per share. Dividends are expected to grow at 5% per year indefinitely. If the required return on equity is 12%, what is the share price today?",
sol:`<strong>Gordon Growth Model:</strong> P\u2080 = d\u2081 / (r \u2212 g)

<strong>Step 1: Calculate next year's dividend</strong>
d\u2081 = d\u2080 \u00d7 (1 + g)
d\u2081 = \u00a32.40 \u00d7 (1 + 0.05)
d\u2081 = \u00a32.40 \u00d7 1.05 = <strong>\u00a32.52</strong>

<strong>Step 2: Apply the growing perpetuity formula</strong>
P\u2080 = \u00a32.52 / (0.12 \u2212 0.05)
P\u2080 = \u00a32.52 / 0.07
P\u2080 = <strong>\u00a336.00</strong>

<strong>Common mistake:</strong> Using d\u2080 (\u00a32.40) instead of d\u2081 (\u00a32.52). The formula requires NEXT year's dividend because the first payment is one period away.

<strong>What if growth = 0?</strong>
P\u2080 = \u00a32.40 / 0.12 = \u00a320.00. Growth adds \u00a316 of value \u2014 more than 44% of the share price comes from expected future growth.`},

{q:"MM argue that dividend policy is irrelevant. Prove this numerically given: Earnings = \u00a31 per share, ROE = Ke = 10%.\n\nScenario 1: 100% payout\nScenario 2: 40% payout",
sol:`<strong>Scenario 1: 100% payout (no retention)</strong>
Dividend = \u00a31.00
Growth = 0 (nothing retained to reinvest)
P\u2080 = Div / Ke = \u00a31.00 / 0.10 = <strong>\u00a310.00</strong>

<strong>Scenario 2: 40% payout (60% retained)</strong>
Dividend = \u00a31.00 \u00d7 0.40 = \u00a30.40
Retention ratio = 0.60
Growth = Retention \u00d7 ROE = 0.60 \u00d7 10% = 6%
P\u2080 = D\u2081 / (Ke \u2212 g) = \u00a30.40 / (0.10 \u2212 0.06) = \u00a30.40 / 0.04 = <strong>\u00a310.00</strong>

<strong>Same price! \u00a310.00 in both cases.</strong>

<strong>Why?</strong> When ROE = Ke, every pound retained earns exactly the required return. The growth in future dividends perfectly compensates for the lower current dividend. The firm is neither creating nor destroying value by retaining earnings.

<strong>When does this break down?</strong>
\u2022 If ROE > Ke: retention creates value \u2192 lower payout = higher price
\u2022 If ROE < Ke: retention destroys value \u2192 higher payout = higher price
\u2022 In the real world: taxes, transaction costs, and signalling effects make dividend policy relevant`}
]}
];

// Add practice tab and view
function addPracticeTab(){
  const ns = document.querySelector('.nav-scroll');
  const btn = document.createElement('button');
  btn.className = 'nav-tab';
  btn.onclick = function(){showView('practice')};
  btn.textContent = 'Practice';
  ns.appendChild(btn);

  const cont = document.querySelector('.container');
  const div = document.createElement('div');
  div.id = 'v-practice';
  div.hidden = true;
  cont.appendChild(div);
}

// Patch showView to handle practice
const _origShow = showView;
showView = function(n, lid){
  if(n === 'practice'){
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.nav-tab')[5].classList.add('active');
    ['overview','lecture','formulas','sectionA','sectionB','checklist','practice'].forEach(v=>{
      const el=document.getElementById('v-'+v);
      if(el) el.hidden=(v!==n);
    });
    rP();
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  const pe=document.getElementById('v-practice');
  if(pe)pe.hidden=true;
  _origShow(n,lid);
};

function rP(){
  const el=document.getElementById('v-practice');
  el.innerHTML=`<div class="hero"><h1>Practice Questions</h1><p>${PQ.reduce((a,c)=>a+c.questions.length,0)} exam-style questions with full worked solutions. Click any question to reveal the answer.</p></div>

        </div>

}
