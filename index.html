<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garvesyregutta</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍷</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0a07;color:#f5e6d3;font-family:'Source Sans 3',sans-serif;min-height:100vh;display:flex;flex-direction:column}
::selection{background:#722f37;color:#f5e6d3}
button{font-family:'Source Sans 3',sans-serif;cursor:pointer}
input,select{font-family:'Source Sans 3',sans-serif}

.nav{position:sticky;top:0;z-index:100;background:rgba(15,10,7,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(114,47,55,0.3)}
.nav-inner{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:relative}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#c9a84c;letter-spacing:0.5px}
.nav-links{display:flex;gap:4px}
.nav-btn{background:none;border:none;color:#b8a898;font-size:14px;padding:8px 16px;border-radius:6px;letter-spacing:0.3px;transition:0.2s}
.nav-btn:hover{color:#f5e6d3}
.nav-btn.active{color:#c9a84c;background:rgba(201,168,76,0.1)}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:8px;background:none;border:none}
.hamburger span{width:22px;height:2px;background:#f5e6d3;transition:0.3s;display:block}
.mob-menu{display:none;position:absolute;top:56px;left:0;right:0;background:rgba(15,10,7,0.98);padding:12px;border-bottom:1px solid rgba(114,47,55,0.3);flex-direction:column;z-index:99}
.mob-menu.open{display:flex}
@media(max-width:680px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .hero-title{font-size:36px!important}
  .ev-grid{grid-template-columns:1fr!important}
  .mem-grid{grid-template-columns:1fr 1fr!important}
}

.hero{position:relative;padding:80px 24px;text-align:center;border-bottom:1px solid rgba(114,47,55,0.2);overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:url('bakgrunnen.png') center/cover no-repeat;filter:blur(3px);transform:scale(1.05);z-index:0}
.hero::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(15,10,7,0.55);z-index:1}
.hero>*{position:relative;z-index:2}
.hero-sub{font-size:14px;color:#8a7a6a;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.hero-title{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:#f5e6d3;margin-bottom:12px;line-height:1.1}
.hero-tagline{font-family:'Playfair Display',serif;font-size:16px;color:#8a7a6a;font-style:italic}

.section{max-width:1100px;margin:0 auto;padding:48px 24px}
.sec-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#f5e6d3;margin-bottom:4px}
.sec-sub{font-size:15px;color:#8a7a6a;margin-bottom:32px;font-weight:300}
.year-title{font-family:'Playfair Display',serif;font-size:22px;color:#c9a84c;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2)}

.ev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.ev-wrap.expanded{grid-column:1/-1}
.ev-card{background:rgba(45,21,32,0.4);border:1px solid rgba(114,47,55,0.2);border-radius:10px;padding:20px 16px;position:relative;cursor:pointer;transition:background 0.2s, border-color 0.2s, opacity 0.2s}
.ev-card.done{opacity:0.55;background:rgba(30,20,15,0.5);border-color:rgba(106,138,90,0.2)}
.ev-card.current{border-color:rgba(201,168,76,0.5);box-shadow:0 0 20px rgba(201,168,76,0.08)}
.ev-card.expanded{border-radius:10px 10px 0 0;border-bottom:none}
.ev-q{font-size:13px;color:#8a7a6a;letter-spacing:1px;font-family:'Playfair Display',serif}
.ev-host{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#f5e6d3;margin:4px 0}
.ev-date{font-size:13px;color:#8a7a6a;font-weight:300}
.ev-addr{font-size:12px;color:#b8956a;margin-top:4px}
.badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:1px}
.badge-next{background:#c9a84c;color:#0f0a07}
.badge-done{background:#6a8a5a;color:#f5e6d3}
.ev-arrow{position:absolute;bottom:8px;right:12px;font-size:11px;color:#5a4a3a;transition:transform 0.3s}
.ev-arrow.open{transform:rotate(180deg)}
.ev-counts{margin-top:8px;display:flex;gap:12px;font-size:12px}
.ev-counts .ja{color:#6a8a5a}
.ev-counts .nei{color:#a85454}

.ev-panel{background:rgba(30,14,20,0.7);border:1px solid rgba(114,47,55,0.2);border-top:1px solid rgba(114,47,55,0.1);border-radius:0 0 10px 10px;padding:16px;display:none}
.ev-panel.open{display:block}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
@media(max-width:680px){.detail-grid{grid-template-columns:1fr 1fr!important}}
.detail-field{display:flex;flex-direction:column;gap:3px}
.detail-label{font-size:11px;color:#8a7a6a;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.detail-input{background:rgba(15,10,7,0.5);border:1px solid rgba(114,47,55,0.25);border-radius:6px;padding:8px 10px;color:#f5e6d3;font-size:13px;outline:none;width:100%}
.detail-input:focus{border-color:rgba(201,168,76,0.4)}
.detail-input::placeholder{color:#4a3a2a}
.detail-select{background:rgba(15,10,7,0.5);border:1px solid rgba(114,47,55,0.25);border-radius:6px;padding:8px 10px;color:#f5e6d3;font-size:13px;outline:none;width:100%;appearance:auto}
.detail-select option{background:#1a0e0a;color:#f5e6d3}
.detail-summary{margin-bottom:12px;padding:8px 12px;background:rgba(201,168,76,0.06);border-radius:6px;font-size:13px;color:#b8956a}

.oppmote-label{font-size:11px;color:#8a7a6a;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.rsvp-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:7px;cursor:pointer;transition:background 0.15s,border-color 0.15s;margin-bottom:4px}
.rsvp-row.ja{background:rgba(106,138,90,0.12);border:1px solid rgba(106,138,90,0.25)}
.rsvp-row.nei{background:rgba(168,84,84,0.12);border:1px solid rgba(168,84,84,0.25)}
.rsvp-row.none{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04)}
.rsvp-left{display:flex;align-items:center;gap:10px}
.rsvp-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#f5e6d3;font-family:'Playfair Display',serif;transition:background 0.2s}
.rsvp-avatar.ja{background:#6a8a5a}
.rsvp-avatar.nei{background:#a85454}
.rsvp-avatar.none{background:rgba(114,47,55,0.35)}
.rsvp-name{font-size:14px;color:#f5e6d3}
.rsvp-name.answered{font-weight:600}
.vert-badge{font-size:10px;color:#c9a84c;background:rgba(201,168,76,0.15);padding:2px 7px;border-radius:4px;font-weight:600}
.rsvp-status{font-size:12px;font-weight:500}
.rsvp-status.ja{color:#6a8a5a}
.rsvp-status.nei{color:#a85454}
.rsvp-status.none{color:#4a3a2a}
.panel-footer{margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.panel-hint{font-size:11px;color:#4a3a2a}
.mark-btn{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;border:none;transition:0.2s}
.mark-btn.mark{background:rgba(106,138,90,0.2);border:1px solid rgba(106,138,90,0.3);color:#6a8a5a}
.mark-btn.undo{background:rgba(168,84,84,0.2);border:1px solid rgba(168,84,84,0.3);color:#a85454}

.frist-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.frist-card{background:rgba(45,21,32,0.4);border:1px solid rgba(114,47,55,0.2);border-radius:10px;padding:24px;text-align:center}
.frist-num{font-family:'Playfair Display',serif;font-size:42px;color:#c9a84c;font-weight:700}
.frist-label{font-size:13px;color:#8a7a6a;margin-bottom:6px;font-weight:300}
.frist-desc{font-size:14px;color:#f5e6d3}

.org-box{background:rgba(45,21,32,0.4);border:1px solid rgba(114,47,55,0.2);border-radius:10px;padding:24px;margin-bottom:24px}
.org-title{font-family:'Playfair Display',serif;font-size:18px;color:#c9a84c;margin-bottom:12px}
.org-text{font-size:14px;color:#b8a898;margin-bottom:8px;line-height:1.6}
.q-table{width:100%;border-collapse:collapse;margin-top:12px;margin-bottom:8px}
.q-table th{text-align:left;font-size:12px;color:#8a7a6a;text-transform:uppercase;letter-spacing:1px;padding:8px 12px;border-bottom:1px solid rgba(114,47,55,0.2)}
.q-table td{font-size:14px;color:#b8a898;padding:8px 12px;border-bottom:1px solid rgba(114,47,55,0.1)}
.q-table td:first-child{color:#c9a84c;font-family:'Playfair Display',serif;font-weight:600}
.kap-btn{width:100%;background:rgba(45,21,32,0.3);border:1px solid rgba(114,47,55,0.2);border-radius:8px;padding:16px 20px;color:#f5e6d3;font-family:'Playfair Display',serif;font-size:17px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.kap-body{padding:12px 20px;border-left:2px solid rgba(201,168,76,0.3);margin-left:12px;margin-top:8px;display:none}
.kap-body.open{display:block}
.par-id{font-family:'Playfair Display',serif;font-size:14px;color:#c9a84c;font-weight:600;display:block;margin-bottom:4px}
.par-text{font-size:14px;color:#b8a898;line-height:1.6}
.par-bot{font-size:13px;color:#a85454;margin-top:4px;font-weight:600}
.par-unntak{font-size:13px;color:#6a8a5a;margin-top:2px;font-style:italic}
.par-block{margin-bottom:16px}
.vkk-grid{display:flex;justify-content:center;gap:32px;margin-top:20px;flex-wrap:wrap}
.vkk-item{text-align:center;background:rgba(45,21,32,0.4);border:1px solid rgba(114,47,55,0.2);border-radius:12px;padding:20px 24px 16px}
.vkk-item img{width:110px;height:150px;object-fit:contain}
.vkk-label{font-family:'Playfair Display',serif;font-size:17px;color:#c9a84c;margin-top:10px;font-weight:700}
.vkk-beats{font-size:13px;color:#6a8a5a;margin-top:4px;font-weight:600}
.vkk-info{margin-top:20px;font-size:14px;color:#b8a898;line-height:1.8;text-align:center}

.add-btn{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);color:#c9a84c;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600}
.add-form{background:rgba(45,21,32,0.4);border:1px solid rgba(114,47,55,0.3);border-radius:10px;padding:24px;margin-bottom:24px;display:none}
.add-form.open{display:block}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.form-input{background:rgba(15,10,7,0.6);border:1px solid rgba(114,47,55,0.3);border-radius:6px;padding:10px 14px;color:#f5e6d3;font-size:14px;outline:none}
.form-input::placeholder{color:#5a4a3a}
.submit-btn{background:#722f37;border:none;color:#f5e6d3;padding:10px 24px;border-radius:6px;font-weight:600;font-size:14px}
.wine-card{display:flex;align-items:center;gap:16px;background:rgba(45,21,32,0.3);border:1px solid rgba(114,47,55,0.15);border-radius:10px;padding:16px 20px;margin-bottom:8px}
.wine-rank{font-size:22px;min-width:36px;text-align:center}
.wine-info{flex:1}
.wine-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#f5e6d3}
.wine-detail{font-size:13px;color:#b8a898;margin-top:2px}
.wine-meta{font-size:12px;color:#8a7a6a;margin-top:2px}
.wine-score{text-align:center}
.score-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#c9a84c}
.score-label{font-size:10px;color:#8a7a6a;text-transform:uppercase;letter-spacing:1px}
.del-btn{background:none;border:none;color:#5a3a3a;font-size:20px;padding:4px 8px;cursor:pointer}
.del-btn:hover{color:#a85454}

.mem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.mem-card{background:rgba(45,21,32,0.3);border:1px solid rgba(114,47,55,0.15);border-radius:10px;padding:24px}
.mem-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.mem-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#722f37,#c9a84c);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#f5e6d3;flex-shrink:0}
.mem-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#f5e6d3}
.mem-role{font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;margin-top:4px}
.mem-stats{border-top:1px solid rgba(114,47,55,0.15);padding-top:12px}
.stat-row{display:flex;justify-content:space-between;font-size:13px;color:#b8a898;margin-bottom:6px}
.stat-val{font-weight:600;color:#f5e6d3}
.progress-bar{width:100%;height:6px;background:rgba(114,47,55,0.2);border-radius:3px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,#722f37,#c9a84c);border-radius:3px;transition:width 0.5s}
.stat-small{display:flex;gap:12px;font-size:12px;color:#8a7a6a}
.stat-small strong{color:#f5e6d3}
.info-box{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:20px;margin-bottom:24px;font-size:14px;color:#c9a84c;line-height:1.6}
.roles-box{margin-top:32px;background:rgba(45,21,32,0.3);border:1px solid rgba(114,47,55,0.15);border-radius:10px;padding:20px}
.roles-title{font-family:'Playfair Display',serif;font-size:18px;color:#c9a84c;margin-bottom:12px}
.roles-text{font-size:14px;color:#b8a898;line-height:1.7;margin-bottom:6px}

.page{display:none}
.page.active{display:block}
main{flex:1}
footer{text-align:center;padding:24px;border-top:1px solid rgba(114,47,55,0.15)}
footer span{font-size:12px;color:#5a4a3a;font-family:'Playfair Display',serif;letter-spacing:1px}
.empty{color:#8a7a6a;text-align:center;padding:40px}
.flex-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}

/* Vinguide */
.fine-bar{width:100%;height:10px;background:rgba(114,47,55,0.2);border-radius:5px;overflow:hidden;margin-top:6px}
.fine-bar-fill{height:100%;border-radius:5px;transition:width 0.5s}
.fine-stat{text-align:center;padding:16px}
.fine-stat-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700}
.fine-stat-label{font-size:11px;color:#8a7a6a;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.fine-card{background:rgba(45,21,32,0.3);border:1px solid rgba(114,47,55,0.15);border-radius:8px;padding:14px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.fine-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:0.5px}
.fine-badge.pending{background:rgba(201,168,76,0.15);color:#c9a84c;border:1px solid rgba(201,168,76,0.3)}
.fine-badge.approved{background:rgba(168,84,84,0.15);color:#a85454;border:1px solid rgba(168,84,84,0.3)}
.fine-badge.appealed{background:rgba(184,149,106,0.15);color:#b8956a;border:1px solid rgba(184,149,106,0.3)}
.fine-badge.paid{background:rgba(106,138,90,0.15);color:#6a8a5a;border:1px solid rgba(106,138,90,0.3)}
.fine-badge.reversed{background:rgba(138,122,106,0.15);color:#8a7a6a;border:1px solid rgba(138,122,106,0.3)}

/* Vinguide */
.guide-toc{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:40px}
.guide-toc a{display:block;background:rgba(45,21,32,0.3);border:1px solid rgba(114,47,55,0.15);border-radius:8px;padding:12px 16px;color:#b8a898;font-size:14px;text-decoration:none;transition:border-color 0.2s,color 0.2s}
.guide-toc a:hover{border-color:rgba(201,168,76,0.4);color:#c9a84c}
.guide-toc a span{color:#c9a84c;font-family:'Playfair Display',serif;font-weight:700;margin-right:6px}
.guide-section{margin-bottom:40px}
.guide-section h3{font-family:'Playfair Display',serif;font-size:22px;color:#c9a84c;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2)}
.guide-section p{font-size:15px;color:#b8a898;line-height:1.75;margin-bottom:12px}
.guide-section strong{color:#f5e6d3}
.guide-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.guide-table th{text-align:left;color:#c9a84c;font-family:'Playfair Display',serif;font-size:12px;text-transform:uppercase;letter-spacing:1px;padding:10px 12px;border-bottom:1px solid rgba(201,168,76,0.3);white-space:nowrap}
.guide-table td{color:#b8a898;padding:10px 12px;border-bottom:1px solid rgba(114,47,55,0.1);vertical-align:top}
.guide-table tr:hover td{background:rgba(45,21,32,0.3)}
.guide-tip{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:10px;padding:20px;margin:16px 0;font-size:14px;color:#c9a84c;line-height:1.7}
.guide-list{font-size:15px;color:#b8a898;line-height:1.75;margin:12px 0;padding-left:20px}
.guide-list li{margin-bottom:6px}
.guide-hero{background:rgba(45,21,32,0.4);border:1px solid rgba(114,47,55,0.2);border-radius:10px;padding:24px;margin-bottom:32px;text-align:center}
.guide-hero p{color:#8a7a6a;font-style:italic;font-size:14px;margin:0}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:8px;transition:background 0.3s}
.sync-dot.online{background:#6a8a5a}
.sync-dot.offline{background:#a85454}
</style>
</head>

async function fetchViaCors(targetUrl){
  const proxies=[
    {u:"https://corsproxy.io/?url="+encodeURIComponent(targetUrl),json:false},
    {u:"https://api.allorigins.win/raw?url="+encodeURIComponent(targetUrl),json:false},
    {u:"https://api.allorigins.win/get?url="+encodeURIComponent(targetUrl),json:true,f:"contents"},
    {u:"https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(targetUrl),json:false},
  ];
  for(const p of proxies){
    try{
      const r=await fetch(p.u,{signal:AbortSignal.timeout(10000)});
      if(!r.ok)continue;
      if(p.json){const d=await r.json();const t=d[p.f]||"";if(t.length>200)return t}
      else{const t=await r.text();if(t.length>200)return t}
    }catch(e){continue}
  }
  return null;
}

async function fetchVinmonopolet(eid){
  const urlInput=document.getElementById("ew-url-"+eid);
  const status=document.getElementById("ew-status-"+eid);
  const btn=document.getElementById("ew-fetch-btn-"+eid);
  const url=urlInput.value.trim();
  const isVM=url.includes("vinmonopolet.no");
  const isSB=url.includes("systembolaget.se");
  if(!url||(!isVM&&!isSB)){status.innerHTML=`<span style="color:#a85454">Lim inn en lenke fra Vinmonopolet eller Systembolaget</span>`;return}
  const src=isVM?"Vinmonopolet":"Systembolaget";
  status.innerHTML=`<span style="color:#c9a84c">Henter fra ${src}...</span>`;
  btn.disabled=true;

  let name="",producer="",country="",type="",vintage="",price=0;

  try{
    if(isVM){
      // Extract product ID from URL (/p/XXXXXXX)
      const pidM=url.match(/\/p\/(\d+)/);
      if(!pidM){status.innerHTML=`<span style="color:#a85454">Fant ikke produkt-ID i lenken. Bruk en lenke som inneholder /p/XXXXXXX</span>`;btn.disabled=false;return}
      const pid=pidM[1];

      // Step 1: Always extract name + vintage from URL (reliable baseline)
      const urlPath=decodeURIComponent(url).replace(/\+/g," ");
      const slugMatch=urlPath.match(/\/([^\/]+)\/p\/\d+/);
      if(slugMatch){
        let slug=slugMatch[1].replace(/-/g," ");
        const vm=slug.match(/(\d{4})\s*$/);
        if(vm)vintage=vm[1];
        name=slug.replace(/\s*\d{4}\s*$/,"").trim();
      }

      // Step 2: Try API to get producer, country, type, price (and better name if available)
      const apiUrl="https://www.vinmonopolet.no/vmpws/v2/vmp/search?searchType=product&q="+pid+"&fields=FULL";
      let raw=await fetchViaCors(apiUrl);
      if(raw){
        try{
          const data=JSON.parse(raw);
          if(data.productSearchResult&&data.productSearchResult.products&&data.productSearchResult.products.length){
            const p=data.productSearchResult.products[0];
            // Only use API name if it's valid (not browser warning)
            const apiName=p.productShortName||p.name||"";
            if(apiName&&apiName.length>2&&!apiName.toLowerCase().includes("nettleser")&&!apiName.toLowerCase().includes("browser")&&!apiName.toLowerCase().includes("utdatert")){
              const vm=apiName.match(/(\d{4})\s*$/);
              if(vm)vintage=vm[1];
              name=apiName.replace(/\s*\d{4}\s*$/,"").trim();
            }
            if(!vintage&&p.year)vintage=String(p.year);
            if(!vintage&&p.vintage)vintage=String(p.vintage);
            if(p.price)price=Math.round(p.price.value||0);
            if(p.main_producer&&p.main_producer.name)producer=p.main_producer.name;
            if(p.main_country&&p.main_country.name)country=p.main_country.name;
            const cat=((p.main_category&&p.main_category.name)||"").toLowerCase();
            type={"rødvin":"Rødvin","hvitvin":"Hvitvin","rosévin":"Rosé","musserende vin":"Musserende","sterkvin":"Dessertvin"}[cat]||"";
          }
        }catch(e){}
      }

      // Step 3: If still missing data, try HTML scrape
      if(!producer||!price){
        let raw2=await fetchViaCors(url);
        if(raw2){
          if(!price){const pm=raw2.match(/Kr\s*([\d\s,.]+)/);if(pm)price=Math.round(parseFloat(pm[1].replace(/\s/g,"").replace(",",".")))}
          if(!type){const tm=raw2.match(/Varetype<\/[^>]+>\s*<[^>]+>([^<]+)/i);if(tm){const t=tm[1].trim().toLowerCase();type={"rødvin":"Rødvin","hvitvin":"Hvitvin","rosévin":"Rosé","musserende vin":"Musserende","sterkvin":"Dessertvin"}[t]||""}}
          if(!country){const cm=raw2.match(/Land, distrikt<\/[^>]+>[\s\S]*?<a[^>]*>([^<]+)/i);if(cm)country=cm[1].trim()}
          if(!producer){const pdm=raw2.match(/Produsent<\/[^>]+>[\s\S]*?<a[^>]*>([^<]+)/i);if(pdm)producer=pdm[1].trim()}
        }
      }

      // Step 4: Try to guess type from URL if still missing
      if(!type){
        const lurl=url.toLowerCase();
        if(lurl.includes("rødvin")||lurl.includes("r%c3%b8dvin"))type="Rødvin";
        else if(lurl.includes("hvitvin"))type="Hvitvin";
        else if(lurl.includes("ros%c3%a9")||lurl.includes("rosévin"))type="Rosé";
        else if(lurl.includes("musserende"))type="Musserende";
      }

      // Step 5: Try to get country + region from URL path
      if(!country){
        const landMatch=urlPath.match(/\/Land\/(.+?)\/p\/\d+/i);
        if(landMatch){
          const parts=landMatch[1].split("/");
          parts.pop(); // remove product slug
          country=parts.map(p=>p.replace(/-/g," ")).join(", ");
        }
      } else {
        // Enrich country with region from URL if API only gave country name
        const landMatch=urlPath.match(/\/Land\/(.+?)\/p\/\d+/i);
        if(landMatch){
          const parts=landMatch[1].split("/");
          parts.pop(); // remove product slug
          if(parts.length>1){
            country=parts.map(p=>p.replace(/-/g," ")).join(", ");
          }
        }
      }

    } else if(isSB){
      // Extract product ID
      const pidM=url.match(/(\d{5,})/);
      if(!pidM){status.innerHTML=`<span style="color:#a85454">Fant ikke produkt-ID i lenken</span>`;btn.disabled=false;return}
      const pid=pidM[1];

      // Strategy 1: Try Systembolaget API
      const apiUrl="https://api-extern.systembolaget.se/sb-api-ecommerce/v1/productsearch/search?size=1&page=1&productId="+pid;
      let raw=await fetchViaCors(apiUrl);
      if(raw){
        try{
          const data=JSON.parse(raw);
          if(data.products&&data.products.length){
            const p=data.products[0];
            name=((p.productNameBold||"")+" "+(p.productNameThin||"")).trim();
            const vm=name.match(/,?\s*(\d{4})\s*$/);vintage=vm?vm[1]:"";
            if(vintage)name=name.replace(/,?\s*\d{4}\s*$/,"").trim();
            price=p.price||0;country=p.country||"";producer=p.producerName||"";
            const cat=((p.categoryLevel1||"")+" "+(p.categoryLevel2||"")).toLowerCase();
            if(cat.includes("rött"))type="Rødvin";else if(cat.includes("vitt"))type="Hvitvin";
            else if(cat.includes("rosé"))type="Rosé";else if(cat.includes("mousserande"))type="Musserende";
          }
        }catch(e){}
      }

      // Strategy 2: Scrape HTML
      if(!name){
        raw=await fetchViaCors(url);
        if(raw){
          const hm=raw.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);
          if(hm){let fn=hm[1].replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();const vm=fn.match(/,?\s*(\d{4})\s*$/);vintage=vm?vm[1]:"";name=vintage?fn.replace(/,?\s*\d{4}\s*$/,"").trim():fn}
          const pm=raw.match(/(\d+):-/);if(pm)price=parseInt(pm[1]);
          if(raw.match(/Rött vin|rött-vin/i))type="Rødvin";else if(raw.match(/Vitt vin|vitt-vin/i))type="Hvitvin";
          else if(raw.match(/Rosévin|rosé/i))type="Rosé";else if(raw.match(/Mousserande/i))type="Musserende";
          const cm=raw.match(/sortiment\/([\w-]+)\/"/i);if(cm)country=cm[1].charAt(0).toUpperCase()+cm[1].slice(1).replace(/-/g," ");
        }
      }
    }

    if(!name){status.innerHTML=`<span style="color:#a85454">Kunne ikke hente data. Prøv igjen eller fyll inn manuelt.</span>`;btn.disabled=false;return}

    const setVal=(id,v)=>{const el=document.getElementById(id);if(el&&v)el.value=v};
    setVal("ew-name-"+eid,name);
    if(producer)setVal("ew-producer-"+eid,producer);
    if(country)setVal("ew-country-"+eid,country);
    if(vintage)setVal("ew-vintage-"+eid,vintage);
    if(price)setVal("ew-price-"+eid,price);
    const typeEl=document.getElementById("ew-type-"+eid);
    if(typeEl&&type){for(let o of typeEl.options){if(o.value===type||o.text===type){typeEl.value=o.value;break}}}

    const cur=isSB?" SEK":" kr";
    status.innerHTML=`<span style="color:#6a8a5a">✓ Hentet fra ${src}: ${esc(name)}${vintage?" ("+vintage+")":""}${price?" — "+price+cur:""}</span>`;
  }catch(e){
    status.innerHTML=`<span style="color:#a85454">Feil ved henting. Prøv igjen eller fyll inn manuelt.</span>`;
  }
  btn.disabled=false;
}

function formatDate(iso){
  if(!iso)return"";
  const d=new Date(iso+"T12:00:00");
  const days=["søndag","mandag","tirsdag","onsdag","torsdag","fredag","lørdag"];
  const months=["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];
  return days[d.getDay()]+", "+d.getDate()+". "+months[d.getMonth()]+" "+d.getFullYear();
}

function renderHjem(){
  const cy=new Date().getFullYear(),cq=Math.ceil((new Date().getMonth()+1)/3);
  let h=`<div class="hero"><p class="hero-sub">Velkommen til</p><h1 class="hero-title">Garvesyregutta</h1><p class="hero-tagline">Est. MMXXIV — Vedtekter, vin og venner siden 2024</p></div>`;
  h+=`<section class="section"><h2 class="sec-title">Kommende vinkvelder</h2><p class="sec-sub">Trykk på en vinkveld for detaljer og oppmøte</p>`;
  SCHEDULE.forEach(yg=>{
    h+=`<div style="margin-bottom:40px"><h3 class="year-title">${yg.year}</h3><div class="ev-grid">`;
    yg.events.forEach(baseEv=>{
      const ev=getEv(baseEv.id);const isDone=completed[ev.id];
      const isCur=!isDone&&yg.year===cy&&parseQ(baseEv.q)===cq;
      const isOpen=expanded===ev.id;const evR=rsvps[ev.id]||{};

      h+=`<div class="detail-field"><span class="detail-label">Fra dato</span><input class="detail-input" type="date" value="${esc(det.exactDate||"")}" onclick="event.stopPropagation()" onchange="event.stopPropagation();updateEventDetail('${ev.id}','exactDate',this.value);updateEventDetail('${ev.id}','date',formatDate(this.value))"></div>`;

      // Deadline tracking

        const deadlineDate=new Date(effectiveInvite.getTime()+7*86400000);
        const daysLeft=Math.ceil((deadlineDate-now)/86400000);
        const isOverdue=daysLeft<0;
        const eventDate=det.exactDate?new Date(det.exactDate+"T00:00:00"):null;
        const invTooLate=eventDate?((eventDate-invDate)/86400000<28):false;

        const boxStyle=isOverdue?'background:rgba(168,84,84,0.1);border:1px solid rgba(168,84,84,0.2);color:#a85454':daysLeft<=3?'background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);color:#c9a84c':'background:rgba(106,138,90,0.08);border:1px solid rgba(106,138,90,0.2);color:#6a8a5a';

        h+=`</div><span class="rsvp-status ${cls}">${st==="ja"?"Kommer":st==="nei"?"Kan ikke":"Ikke svart"}</span></div>`;

        const bodyParts=["Hei gutta!",`Vinkveld ${baseEv.q} ${yg.year} er herved innkalt.`,`Dato: ${formatDate(det.exactDate)}${det.endDate&&det.endDate!==det.exactDate?" – "+formatDate(det.endDate):""}`,det.time?"Klokkeslett: "+det.time:"",det.address?"Sted: "+det.address:"",det.info?"Info: "+det.info:"","","Svarfrist: 7 dager etter mottak.","","Mvh, "+ev.host];

    });
    h+=`</div></div>`;
  });
  h+=`</section><section class="section"><h2 class="sec-title">Viktige frister</h2><div class="frist-grid">`;
  [{n:"28",l:"dager før",d:"Innkallelse til vinkveld"},{n:"7",l:"dager etter",d:"Frist for å melde forfall"},{n:"500",l:"kr",d:"Deltakelsesavgift per person"}].forEach(f=>{

function renderViner(){
  const evWines=window._evWines||{};
  const ratings=window._ratings||{};

  // Calculate overall leaderboard
  const allWines=[];
  ALL_EVENTS.forEach(ev=>{
    const wines=evWines[ev.id]||{};
    Object.keys(wines).forEach(wk=>{
      const w=wines[wk];
      const wr=ratings[ev.id]?ratings[ev.id][wk]||{}:{};
      const scores=Object.values(wr).filter(v=>typeof v==='number').map(v=>v<=5?v*20:v);
      const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
      allWines.push({...w,_eid:ev.id,_wk:wk,avg,votes:scores.length,q:ev.q,year:ev.year,host:getEv(ev.id).host});
    });
  });
  allWines.sort((a,b)=>b.avg-a.avg||b.votes-a.votes);

  let h=`<section class="section">`;
  h+=`<h2 class="sec-title">Topplisten</h2><p class="sec-sub">Samlet rangering fra alle vinkvelder</p>`;

  // Overall leaderboard
  if(allWines.filter(w=>w.votes).length){
    if(!window._openLeaderWine)window._openLeaderWine=null;
    if(window._showFullList===undefined)window._showFullList=false;
    if(window._wineFilter===undefined)window._wineFilter=null;
    if(window._wineSort===undefined)window._wineSort="rating";

    // Filter & sort controls
    const types=["Alle","Rødvin","Hvitvin","Rosé","Musserende","Dessertvin","Oransjevin"];
    const typeColors={"Alle":"#f5e6d3","Rødvin":"#a85454","Hvitvin":"#c9a84c","Rosé":"#c97a8a","Musserende":"#8a9a6a","Dessertvin":"#b8956a","Oransjevin":"#c97a4a"};
    h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center">`;
    types.forEach(t=>{
      const active=(t==="Alle"&&!window._wineFilter)||(window._wineFilter===t);
      h+=`<button onclick="window._wineFilter=${t==='Alle'?'null':"'"+t+"'"};window._showFullList=false;_dirty.viner=true;render()" style="background:${active?'rgba(114,47,55,0.3)':'rgba(255,255,255,0.03)'};border:1px solid ${active?typeColors[t]+'66':'rgba(255,255,255,0.06)'};color:${active?typeColors[t]:'#5a4a3a'};padding:6px 14px;border-radius:20px;font-size:12px;font-weight:${active?'600':'400'};cursor:pointer;transition:0.2s">${t}</button>`;
    });
    h+=`<select onchange="window._wineSort=this.value;_dirty.viner=true;render()" style="margin-left:auto;background:rgba(15,10,7,0.5);border:1px solid rgba(114,47,55,0.25);border-radius:6px;padding:6px 10px;color:#b8a898;font-size:12px;outline:none;cursor:pointer">`;
    h+=`<option value="rating"${window._wineSort==="rating"?" selected":""}>Sorter: Poeng</option>`;
    h+=`<option value="price_low"${window._wineSort==="price_low"?" selected":""}>Sorter: Pris lav-høy</option>`;
    h+=`<option value="price_high"${window._wineSort==="price_high"?" selected":""}>Sorter: Pris høy-lav</option>`;
    h+=`</select></div>`;
    if(window._maxPrice===undefined)window._maxPrice="";
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">`;
    h+=`<span style="font-size:12px;color:#8a7a6a">Maks pris:</span>`;
    h+=`<input type="number" min="0" step="50" placeholder="Alle priser" value="${window._maxPrice}" oninput="window._maxPrice=this.value;window._showFullList=false;_dirty.viner=true;render()" style="width:110px;background:rgba(15,10,7,0.5);border:1px solid rgba(114,47,55,0.25);border-radius:6px;padding:6px 10px;color:#f5e6d3;font-size:13px;outline:none">`;
    if(window._maxPrice){h+=`<span style="font-size:12px;color:#c9a84c">Under ${window._maxPrice} kr</span>`}
    h+=`</div>`;

    let ranked=allWines.filter(w=>w.votes);
    if(window._wineFilter)ranked=ranked.filter(w=>w.type===window._wineFilter);
    if(window._maxPrice)ranked=ranked.filter(w=>w.price&&w.price<=parseInt(window._maxPrice));
    if(window._wineSort==="price_low")ranked.sort((a,b)=>(a.price||9999)-(b.price||9999));
    else if(window._wineSort==="price_high")ranked.sort((a,b)=>(b.price||0)-(a.price||0));
    else ranked.sort((a,b)=>b.avg-a.avg||b.votes-a.votes);

    const showCount=window._showFullList?ranked.length:Math.min(3,ranked.length);
    const podiumColors=["#c9a84c","#a8a8a8","#b87333"];
    const podiumBg=["rgba(201,168,76,0.08)","rgba(168,168,168,0.06)","rgba(184,115,51,0.06)"];

    for(let i=0;i<showCount;i++){

      const typeColor=w.type==="Rødvin"?"#a85454":w.type==="Hvitvin"?"#c9a84c":w.type==="Rosé"?"#c97a8a":w.type==="Musserende"?"#8a9a6a":w.type==="Dessertvin"?"#b8956a":"#8a7a6a";
      const wid=w._eid+"_"+w._wk;
      const isOpen=window._openLeaderWine===wid;
      const isPodium=i<3;
      const borderC=isPodium?podiumColors[i]+"55":"rgba(114,47,55,0.15)";
      const bgC=isPodium?podiumBg[i]:"";

      h+=`<div class="wine-name" style="${isPodium?'font-size:19px':''}">${esc(w.name)}${w.vintage?' <span style="color:#8a7a6a;font-weight:400;font-size:14px">'+esc(w.vintage)+'</span>':''}</div>`;

  } else {

function renderVinguide(){
  const sections=[
    {title:"Hurtigstart",content:function(){
      let c=`<div style="overflow-x:auto"><table class="guide-table"><tr><th>Type</th><th>Servering</th><th>Lufting</th><th>Passer til</th></tr>`;
      [["Musserende","6-8 °C","Normalt ingen","Aperitiff, skalldyr, snacks"],
      ["Lett hvit","8-10 °C","5-10 min","Fisk, salater, geitost"],
      ["Fyldig hvit","10-12 °C","10-20 min","Kylling, kremet saus, lyst kjøtt"],
      ["Rosé","8-10 °C","5 min","Sommermat, spekemat, grill"],
      ["Lett rød","12-14 °C","15-30 min","Fugl, svin, pasta, charcuterie"],
      ["Middels rød","15-17 °C","30-60 min","Pizza, lam, storfe, gryter"],
      ["Kraftig rød","16-18 °C","1-2 timer","Biff, vilt, harde oster"],
      ["Dessertvin","8-12 °C","Normalt ingen","Blåmuggost, desserter, frukt"]
      ].forEach(r=>{c+=`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`});
      return c+`</table></div>`}},
    {title:"Hva vin egentlig er",content:()=>`<p>Vin er gjæret druesaft. Små forskjeller i drue, klima, jord, modning, gjæring, eik og lagring gir svært ulike uttrykk.</p><p>Tenk på vin langs <strong>fem akser: sødme, syre, tannin, alkohol og kropp</strong>. Når du skjønner disse fem, blir både kjøp og matparing langt enklere.</p><p>Rødvin får farge og tannin fra skallkontakt. Hvitvin lages uten lang skallkontakt. Rosé er en mellomting. Musserende får bobler ved at CO₂ bevares eller dannes i en ny gjæring.</p>`},
    {title:"Hvordan smake vin",content:()=>`<p>Bruk rekkefølgen: <strong>se, lukt, smak, vurder avslutning</strong>. Se etter intensitet og viskositet. Lukt etter frukt, blomster, krydder, urter, fat, jordlige toner eller modenhet.</p><p>Et godt spørsmål er ikke "liker jeg denne?", men <strong>"hva prøver denne vinen å være, og lykkes den?"</strong></p><p>Vanlige aromaord: sitrus, grønt eple, pære, steinfrukt, tropisk frukt, røde bær, mørke bær, pepper, vanilje, smør, toast, lær, sopp, tobakk, mineralitet.</p>`},
    {title:"Oppbevaring",content:()=>`<p>Vin liker <strong>mørke, stabil temperatur, moderat luftfuktighet og minst mulig vibrasjon</strong>. Den største fienden er store temperatursvingninger over tid.</p><p>For lengre lagring er 10-14 °C ideelt. Et mørkt skap med stabil temperatur er bedre enn kjøkkenbenk eller vinduskarm.</p><p>Flasker med naturkork bør ligge horisontalt. Skrukork trenger ikke ligge.</p><div class="guide-tip">80-90% av vin som selges er laget for å drikkes relativt ung, ikke for tiår i kjeller.</div>`},
    {title:"Holdbarhet etter åpning",content:function(){
      let c=`<div style="overflow-x:auto"><table class="guide-table"><tr><th>Type</th><th>Holdbarhet</th></tr>`;
      [["Musserende","Best samme dag, 1-3 dager med champagnekork"],["Lett hvit / rosé","2-4 dager i kjøleskap"],["Fyldig hvit","2-4 dager, noen ganger lenger"],["Lett rød","2-3 dager, gjerne i kjøleskap"],["Kraftig rød","3-5 dager. Kan smake bedre dag 2"],["Søtvin / portvin","Flere dager til uker"]].forEach(r=>{
        c+=`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td></tr>`});
      return c+`</table></div>`}},
    {title:"Serveringstemperatur",content:()=>`<p>For varm vin virker slapp og alkoholpreget. For kald vin virker lukket og hard.</p><div class="guide-tip"><strong>Praktisk regel:</strong> Rødvin skal sjelden ha ekte romtemperatur i moderne hjem. Hvite viner bør få noen minutter ut av kjøleskapet. Bedre litt for kald enn litt for varm - vinen stiger raskt i glasset.</div>`},
    {title:"Lufting",content:()=>`<p><strong>Lett rød:</strong> 15-30 min. <strong>Middels rød:</strong> 30-60 min. <strong>Kraftig ung rød:</strong> 1-2 timer. Hvit og musserende trenger normalt lite lufting.</p><p>Ung Barolo, Cabernet Sauvignon, Syrah og Rioja Reserva/Gran Reserva kan ofte blomstre med god lufting.</p><div class="guide-tip">Smak vinen ved åpning, så igjen etter 15, 30 og 60 minutter. Bruk lufting som et verktøy, ikke et rituale.</div>`},
    {title:"Glass og servering",content:()=>`<ul class="guide-list"><li>Bruk rene, luktfrie glass. Oppvaskmiddelrest ødelegger bobler og aroma.</li><li>Hold glasset i stetten - det holder temperaturen stabil.</li><li>Fyll omtrent en tredel for bedre duft og sirkulasjon.</li><li>Server fra lett til kraftig, tørr til søt, ung til gammel.</li></ul>`},
    {title:"Mat og vin",content:()=>`<p><strong>Balanse er nøkkelen.</strong> Lett mat med tung vin gjør vinen brutal. Tung mat med lett vin gjør vinen anonym.</p><ul class="guide-list"><li><strong>Syre</strong> i vin fungerer fantastisk til fet eller salt mat.</li><li><strong>Tannin</strong> fungerer godt til protein og fett, men dårlig til sterk chili.</li><li><strong>Sødme</strong> i maten kan gjøre tørr vin hardere - prøv fruktig vin til asiatisk mat.</li><li><strong>Sausen betyr ofte mer enn proteinet.</strong></li></ul>`},
    {title:"Mat- og vinmatrise",content:function(){
      let c=`<div style="overflow-x:auto"><table class="guide-table"><tr><th>Mat</th><th>Trygt valg</th><th>Vil imponere</th><th>Unngå</th></tr>`;
      [["Skalldyr","Brut musserende","Champagne / Chablis","Tung eiket rødvin"],
      ["Hvit fisk","Sauvignon Blanc","Hvit Burgund","Overmoden, alkoholsterk"],
      ["Laks","Pinot Noir","Fatpreget Chardonnay","Meget tannisk rødvin"],
      ["Kylling","Chardonnay","Pinot Noir, kjølig klima","For søt vin"],
      ["Svin","Riesling","Barbera / Chianti","Svært fatpreget Cabernet"],
      ["Biff","Cabernet Sauvignon","Nebbiolo / moden Bordeaux","Svak, tynn hvitvin"],
      ["Lam","Syrah","Rioja Reserva","Lett aromatisk hvit"],
      ["Asiatisk sterkt","Halvtørr Riesling","Gewürztraminer","Høy alkohol + tannin"],
      ["Tomatbasert pasta","Chianti","Etna Rosso","Lavsyrlig rødvin"],
      ["Blåmuggost","Sauternes","Portvin / Tokaji","Tørr tannisk rød"]
      ].forEach(r=>{c+=`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td><td>${r[2]}</td><td style="color:#a85454">${r[3]}</td></tr>`});
      return c+`</table></div>`}},
    {title:"Klassiske feil å unngå",content:()=>`<ul class="guide-list"><li>Ikke server rødvin ved 22 °C fordi noen har sagt "romtemperatur".</li><li>Ikke iskjøl hvite så mye at aromaene forsvinner.</li><li>Ikke dekanter gammel moden vin for aggressivt.</li><li>Ikke velg vin bare etter drue - produsent, område og årgang betyr mye.</li><li>Ikke anta at dyrere alltid betyr bedre til maten.</li><li>Ikke lagre vanlige flasker i årevis uten plan.</li></ul>`},
    {title:"Tips for vinklubb",content:()=>`<p>Ha alltid noen tydelige stiler tilgjengelig: frisk musserende, syrlig hvit, fyldigere hvit, saftig lett rød, strukturert rød og søtvin til ost/dessert.</p><p>Lag smakinger rundt kontraster: gammel vs. ny verden, stål vs. fat, kjølig vs. varmt klima, samme drue fra ulike regioner.</p><div class="guide-tip"><strong>Smakeskjema:</strong> Utseende, nese, smak, struktur, lengde, matvennlighet, prisverdi - og om du ville kjøpt den igjen.</div>`},
    {title:"Bygg kunnskap raskt",content:()=>`<p><strong>Lær disse druene først:</strong> Riesling, Sauvignon Blanc, Chardonnay, Chenin Blanc, Pinot Noir, Cabernet Sauvignon, Syrah, Nebbiolo og Sangiovese.</p><p><strong>Nøkkelområder:</strong> Champagne, Chablis, Bourgogne, Mosel, Loire, Rioja, Piemonte, Toscana, Bordeaux, Rhône, Napa, Marlborough og Etna.</p><p>Tenk alltid i stil før prestisje: frisk eller rik, floral eller jordlig, lett eller strukturert.</p>`},
  ];

  let h=`<section class="section">`;
  h+=`<h2 class="sec-title">Vinguide</h2><p class="sec-sub">Alt som er verdt å vite om vin — trykk for å utvide</p>`;

  sections.forEach((s,i)=>{
    h+=`<button class="kap-btn" onclick="toggleGuide(${i})"><span>${s.title}</span><span style="transform:${openGuide===i?'rotate(180deg)':'none'};transition:0.3s;font-size:18px">▼</span></button>`;

  h+=`<div class="guide-tip" style="text-align:center;font-size:16px;padding:28px;margin-top:24px">`;
  h+=`<strong style="color:#f5e6d3;font-family:'Playfair Display',serif;font-size:18px">Den viktigste hovedregelen</strong><br><br>`;
  h+=`Server vin litt kjøligere enn folk tror, smak den underveis, og match intensiteten i glasset med intensiteten på tallerkenen.</div>`;

  document.getElementById("page-vinguide").innerHTML=h;
}

window._openFinePerson=null;
window._showFineForm=false;
function toggleFinePerson(p){window._openFinePerson=window._openFinePerson===p?null:p;_dirty.boter=true;render()}

function addFine(){
  const person=document.getElementById("fine-person").value;
  const rule=document.getElementById("fine-rule").value;
  const amount=parseInt(document.getElementById("fine-amount").value);
  const desc=document.getElementById("fine-desc").value.trim();
  const issuedBy=document.getElementById("fine-issuedby").value;
  if(!person||!amount||isNaN(amount))return;
  const ruleObj=FINE_RULES.find(r=>r.id===rule)||{};
  db.ref("fines").push({
    person,rule,ruleLabel:ruleObj.label||"Annet",amount,
    description:desc||ruleObj.desc||"",issuedBy,
    status:"pending",date:new Date().toISOString().split("T")[0]
  });
  window._showFineForm=false;_dirty.boter=true;render();
}

function setFineStatus(key,status){db.ref("fines/"+key+"/status").set(status)}
function deleteFine(key){db.ref("fines/"+key).remove()}
function prefillFineAmount(){
  const rule=document.getElementById("fine-rule").value;
  const r=FINE_RULES.find(x=>x.id===rule);
  if(r&&r.amount){document.getElementById("fine-amount").value=r.amount}
}

function renderBoter(){
  const fines=window._fines||{};

  const reversed=fineList.filter(f=>f.status==="reversed");

  const totalPaid=paid.reduce((s,f)=>s+f.amount,0);
  const totalApproved=approved.reduce((s,f)=>s+f.amount,0);

  let h=`<section class="section">`;

    FINE_RULES.forEach(r=>{h+=`<option value="${r.id}">${r.label}${r.amount?' ('+r.amount+' kr)':''}</option>`});
    h+=`</select></div>`;
    h+=`<div class="detail-field"><span class="detail-label">Beløp (kr)</span><input class="detail-input" id="fine-amount" type="number" placeholder="Beløp"></div>`;
    h+=`<div class="detail-field"><span class="detail-label">Utstedt av</span><select class="detail-select" id="fine-issuedby"><option value="">Velg...</option><option>Bot-sjef</option><option>Styret</option><option>Juryen</option>`;
    MEMBERS.forEach(m=>{h+=`<option value="${m.short}">${m.short}</option>`});
    h+=`</select></div>`;
    h+=`</div>`;
    h+=`<div class="detail-field" style="margin-top:8px"><span class="detail-label">Beskrivelse (valgfritt)</span><input class="detail-input" id="fine-desc" placeholder="Hva skjedde?"></div>`;
    h+=`<button class="submit-btn" style="margin-top:12px" onclick="addFine()">Registrer bot</button>`;
    h+=`</div>`;
  }

  // Per-person breakdown
  h+=`<h3 style="font-family:'Playfair Display',serif;font-size:20px;color:#c9a84c;margin-bottom:16px">Per medlem</h3>`;

  MEMBERS.forEach(m=>{
    const pf=fineList.filter(f=>f.person===m.short);
    if(!pf.length)return;
    const pOwed=pf.filter(f=>f.status==="approved").reduce((s,f)=>s+f.amount,0);
    const pPending=pf.filter(f=>f.status==="pending").reduce((s,f)=>s+f.amount,0);
    const pAppealed=pf.filter(f=>f.status==="appealed").reduce((s,f)=>s+f.amount,0);
    const pPaid=pf.filter(f=>f.status==="paid").reduce((s,f)=>s+f.amount,0);
    const pTotal=pf.reduce((s,f)=>f.status!=="reversed"?s+f.amount:s,0);
    const isOpen=window._openFinePerson===m.short;

    h+=`<div style="margin-bottom:8px">`;
    h+=`<button class="kap-btn" onclick="toggleFinePerson('${m.short}')">`;
    h+=`<span style="display:flex;align-items:center;gap:10px"><span style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#722f37,#c9a84c);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#f5e6d3;flex-shrink:0">${m.short[0]}</span>${m.short}</span>`;
    h+=`<span style="display:flex;gap:12px;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:400">`;
    if(pOwed)h+=`<span style="color:#a85454">${pOwed} kr skyldig</span>`;
    if(pPending)h+=`<span style="color:#c9a84c">${pPending} kr pending</span>`;
    if(pAppealed)h+=`<span style="color:#b8956a">${pAppealed} kr anke</span>`;
    if(pPaid)h+=`<span style="color:#6a8a5a">${pPaid} kr betalt</span>`;
    h+=`<span style="transform:${isOpen?'rotate(180deg)':'none'};transition:0.3s;font-size:18px">▼</span></span>`;
    h+=`</button>`;

    if(isOpen){
      h+=`<div style="background:rgba(30,14,20,0.7);border:1px solid rgba(114,47,55,0.2);border-top:none;border-radius:0 0 10px 10px;padding:16px">`;
      const sorted=[...pf].sort((a,b)=>{
        const ord={pending:0,appealed:1,approved:2,paid:3,reversed:4};
        return(ord[a.status]??9)-(ord[b.status]??9);
      });
      sorted.forEach(f=>{
        const statusLabels={pending:"Til behandling",approved:"Godkjent / skyldig",appealed:"Til anke",paid:"Betalt",reversed:"Reversert"};
        h+=`<div class="fine-card">`;
        h+=`<div style="flex:1;min-width:180px">`;
        h+=`<div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#f5e6d3">${f.amount} kr</div>`;
        h+=`<div style="font-size:13px;color:#b8a898;margin-top:2px">${esc(f.ruleLabel||f.rule||"")}</div>`;
        if(f.description)h+=`<div style="font-size:12px;color:#8a7a6a;margin-top:2px">${esc(f.description)}</div>`;
        h+=`<div style="font-size:11px;color:#5a4a3a;margin-top:4px">${esc(f.date||"")}${f.issuedBy?" · Utstedt av "+esc(f.issuedBy):""}</div>`;
        h+=`</div>`;
        h+=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">`;
        h+=`<span class="fine-badge ${f.status}">${statusLabels[f.status]||f.status}</span>`;
        h+=`<select class="detail-select" style="width:auto;min-width:100px;font-size:12px;padding:4px 8px" onchange="setFineStatus('${f._key}',this.value)">`;
        h+=`<option value="pending"${f.status==="pending"?" selected":""}>Til behandling</option>`;
        h+=`<option value="approved"${f.status==="approved"?" selected":""}>Godkjent</option>`;
        h+=`<option value="appealed"${f.status==="appealed"?" selected":""}>Til anke</option>`;
        h+=`<option value="paid"${f.status==="paid"?" selected":""}>Betalt</option>`;
        h+=`<option value="reversed"${f.status==="reversed"?" selected":""}>Reversert</option>`;
        h+=`</select>`;
        h+=`<button class="del-btn" onclick="deleteFine('${f._key}')" title="Slett">×</button>`;
        h+=`</div></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });

  // Members with no fines
  const membersWithFines=new Set(fineList.map(f=>f.person));
  const cleanMembers=MEMBERS.filter(m=>!membersWithFines.has(m.short));
  if(cleanMembers.length&&fineList.length){
    h+=`<div style="margin-top:16px;padding:16px;background:rgba(106,138,90,0.06);border:1px solid rgba(106,138,90,0.15);border-radius:10px;font-size:14px;color:#6a8a5a">`;
    h+=`Uten bøter: ${cleanMembers.map(m=>m.short).join(", ")}`;
    h+=`</div>`;
  }

  if(!fineList.length){
    h+=`<p class="empty">Ingen bøter registrert ennå. Bruk "+ Ny bot" for å registrere en bot.</p>`;
  }

  h+=`</section>`;
  document.getElementById("page-boter").innerHTML=h;
}

function renderMedlemmer(){
  const roles=computeRoles();const done=ALL_EVENTS.filter(e=>completed[e.id]);
  const stats=MEMBERS.map(m=>{
    const att=done.filter(e=>(rsvps[e.id]||{})[m.short]==="ja").length;
    const a3=done.slice(-3).filter(e=>(rsvps[e.id]||{})[m.short]==="ja").length;
    const a5=done.slice(-5).filter(e=>(rsvps[e.id]||{})[m.short]==="ja").length;
    return{...m,role:getRole(m.short,roles),att,total:done.length,a3,a5};
  });
  const ord={"Styreleder":0,"Styremedlem":1,"Bot-sjef":2,"Medlem":3};
  stats.sort((a,b)=>(ord[a.role]??3)-(ord[b.role]??3)||b.att-a.att);
  let h=`<section class="section"><h2 class="sec-title">Medlemmer</h2><p class="sec-sub">Roller beregnes automatisk fra oppmøtehistorikk</p>`;
  if(!done.length)h+=`<div class="info-box">Ingen vinkvelder er markert som avholdt ennå. Marker vinkvelder som avholdt på forsiden og registrer oppmøte for å beregne roller automatisk.</div>`;
  h+=`<div class="mem-grid">`;
  stats.forEach(m=>{
    const rc=roleColor(m.role),rb=roleBg(m.role),bc=m.role!=="Medlem"?rc+"33":"rgba(114,47,55,0.15)";
    h+=`<div class="mem-card" style="border-color:${bc}"><div class="mem-top"><div class="mem-avatar">${m.short[0]}</div><div>`;
    h+=`<div class="mem-name">${esc(m.name)}</div><div class="mem-role" style="color:${rc};background:${rb}">${m.role}</div></div></div>`;
    if(done.length){
      const pct=m.total?Math.round(m.att/m.total*100):0;
      h+=`<div class="mem-stats"><div class="stat-row"><span>Totalt oppmøte</span><span class="stat-val">${m.att}/${m.total}</span></div>`;
      h+=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
      h+=`<div class="stat-small"><span>Siste 3: <strong>${m.a3}/${Math.min(3,done.length)}</strong></span>`;
      h+=`<span>Siste 5: <strong>${m.a5}/${Math.min(5,done.length)}</strong></span></div></div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  if(done.length){
    h+=`<div class="roles-box"><h3 class="roles-title">Slik beregnes rollene</h3>`;
    h+=`<p class="roles-text"><strong style="color:#c9a84c">Styreleder:</strong> Best oppmøte siste 3 vinkvelder. Ved uavgjort sitter nåværende leder.</p>`;
    h+=`<p class="roles-text"><strong style="color:#b8956a">Styremedlemmer:</strong> Nest best oppmøte siste 3 vinkvelder (2 stk).</p>`;
    h+=`<p class="roles-text"><strong style="color:#a85454">Bot-sjef:</strong> Best oppmøte siste 5 vinkvelder.</p></div>`;
  }
  h+=`</section>`;
  document.getElementById("page-medlemmer").innerHTML=h;
}

render();
</script>
</body>
