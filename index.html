const L=[
{id:1,t:"Time Value of Money & NPV",i:"\u23f3",co:"#1a5276",ch:"Present Value & Discounting",
kp:["Money has time value \u2014 \u00a3100 today > \u00a3100 future (interest, inflation, risk)","Compounding: PV\u2192FV. Discounting: FV\u2192PV (the reverse)","Discount factor 1/(1+r)^n shrinks as n grows","NPV = \u03a3 discounted CFs \u2212 initial investment","Decision: Accept if NPV \u2265 0, reject otherwise","Mutually exclusive: choose highest NPV"],
fm:[{n:"Future Value",eq:"FV = PV × (1+r)<sup>n</sup>",c:"Investment grows to this"},{n:"Present Value",eq:"PV = <span class=fr><span class=fr-t>FV</span><span class=fr-b>(1+r)<sup>n</sup></span></span>",c:"Today\u2019s value of a future CF"},{n:"Discount Factor",eq:"DF = <span class=fr><span class=fr-t>1</span><span class=fr-b>(1+r)<sup>n</sup></span></span>",c:"Always 0\u20131, converts FV\u2192PV"},{n:"NPV",eq:"NPV = \u03a3 <span class=fr><span class=fr-t>CF<sub>t</sub></span><span class=fr-b>(1+r)<sup>t</sup></span></span> \u2212 I<sub>0</sub>",c:"Value created above required return"}],
dd:"A pound today > a pound tomorrow because of (1) time impatience, (2) risk, (3) inflation. The discount rate r captures all three. NPV transforms all CFs to year-0 equivalents. Positive NPV = project exceeds investors\u2019 required return.",
tf:[{h:"The \u2018time machine\u2019 model",b:"Discounting = time machine bringing future money to today. DF is the exchange rate. At 10%, \u00a31 next year = \u00a30.91 today. Always ask: WHEN does each CF occur, WHAT RATE translates it?"},{h:"The \u2018minimum bar\u2019 trick",b:"NPV > 0 doesn\u2019t mean profit \u2014 it means the project EXCEEDS the minimum return investors demand. The discount rate IS the bar."},{h:"Exam setup",b:"Draw table: Year | CF | DF | PV. Compute DF = 1/(1+r)^n for each year. Multiply CF\u00d7DF. Sum PVs. Subtract I_0. Write decision rule: \u2018Since NPV > 0, accept.\u2019"}],
pq:[{q:"Project costs \u00a3200,000. CFs: Yr1=\u00a360k, Yr2=\u00a370k, Yr3=\u00a380k, Yr4=\u00a390k. Rate=12%. Find NPV.",a:"Year 0: \u2212\u00a3200,000 \u00d7 1.0000 = \u2212\u00a3200,000\nYear 1: \u00a360,000 \u00d7 1/1.12^1 = \u00d7 0.8929 = \u00a353,571\nYear 2: \u00a370,000 \u00d7 1/1.12^2 = \u00d7 0.7972 = \u00a355,804\nYear 3: \u00a380,000 \u00d7 1/1.12^3 = \u00d7 0.7118 = \u00a356,943\nYear 4: \u00a390,000 \u00d7 1/1.12^4 = \u00d7 0.6355 = \u00a357,195\n\nNPV = \u2212200,000 + 53,571 + 55,804 + 56,943 + 57,195\nNPV = +\u00a323,513\n\nSince NPV > 0, ACCEPT. Creates \u00a323,513 above 12% return.\n\nSpot: initial investment (neg CF at yr 0), the discount rate, timing of each CF."},{q:"Project A: costs \u00a3100k, NPV=\u00a330k. Project B: costs \u00a3500k, NPV=\u00a380k. Mutually exclusive. Which?",a:"Project B \u2014 higher NPV (\u00a380k > \u00a330k).\n\nNPV measures ABSOLUTE value. Even if A has higher % return, B creates \u00a350k more value. This is why NPV > IRR for mutually exclusive decisions."}]},

{id:2,t:"Interest Rates & Appraisal",i:"\ud83d\udcca",co:"#1e8449",ch:"Returns & Project Selection",
kp:["The discount rate is what investors demand as a MINIMUM return \u2014 it\u2019s the price of using their money. If a project can\u2019t beat this rate, it\u2019s destroying value.",
"A \u2018return\u2019 is simply what you get back relative to what you put in. \u00a3100 in, \u00a3150 out = 50% return. But TIME matters \u2014 50% over 1 year is great, 50% over 20 years is terrible.",
"Simple average return (total%/years) is WRONG for multi-year investments because it ignores compounding. Use the geometric average instead.",
"AER (Annual Equivalent Rate) is the TRUE annual rate when interest compounds more than once a year. A bank quoting 8% compounded quarterly is really charging 8.24%.",
"IRR is the discount rate that makes NPV exactly zero. Think of it as asking: \u2018what rate of return does this project actually earn?\u2019 If that rate exceeds what investors demand (k), the project is worth doing.",
"IRR has serious problems: (1) non-conventional cash flows can give multiple answers, (2) it ignores project SIZE so can rank mutually exclusive projects wrongly, (3) sometimes no IRR exists at all.",
"Payback asks \u2018how quickly do I get my money back?\u2019 Simple and popular, but ignores the time value of money and everything that happens after the payback date.",
"AAR uses accounting profit and book values, not actual cash flows. It depends on arbitrary depreciation methods and is not a true economic return."],
fm:[{n:"Geometric Return",eq:"r = ( <span class=fr><span class=fr-t>FV</span><span class=fr-b>PV</span></span> )<sup>1/n</sup> \u2212 1",c:"The TRUE annualised return that properly reverses compounding. Use this, not simple average."},{n:"AER",eq:"AER = (1 + <span class=fr><span class=fr-t>r</span><span class=fr-b>m</span></span>)<sup>m</sup> \u2212 1",c:"Converts a quoted rate with m compounding periods into what you ACTUALLY earn/pay per year."},{n:"Doubling Time",eq:"n = <span class=fr><span class=fr-t>log(2)</span><span class=fr-b>log(1+r)</span></span>",c:"How many years to double. Quick check: Rule of 72 = 72/rate."},{n:"IRR Interpolation",eq:"IRR = r<sub>+</sub> + <span class=fr><span class=fr-t>NPV<sub>+</sub></span><span class=fr-b>NPV<sub>+</sub> \u2212 NPV<sub>\u2212</sub></span></span> × (r<sub>\u2212</sub> \u2212 r<sub>+</sub>)",c:"Estimates the exact rate where NPV crosses zero, using two trial rates."},{n:"Payback",eq:"PP = Full years + <span class=fr><span class=fr-t>Remaining</span><span class=fr-b>Next year\u2019s CF</span></span>",c:"Time to recover investment. Crude but intuitive."},{n:"AAR",eq:"<span class=fr><span class=fr-t>Avg Net Income</span><span class=fr-b>Avg Book Value</span></span>",c:"Accounting ratio, not a real return. Avoid unless asked."}],
dd:"This entire lecture answers one question: \u2018Is this project worth doing?\u2019 There are four methods to answer it, and they sometimes disagree.\n\nThe CORE IDEA is that investors have alternatives. If they give money to your project, they can\u2019t invest it elsewhere. So your project must earn at least as much as their best alternative \u2014 this is the cost of capital (k). NPV checks whether the project beats this bar (in \u00a3). IRR checks the same thing (in %).\n\nWhy do we need IRR if NPV already works? Because managers find percentages more intuitive. \u2018This project returns 17%\u2019 is easier to grasp than \u2018this project has NPV of \u00a323,513\u2019. But IRR can mislead, which is why NPV is the gold standard.\n\nWhy geometric average instead of simple? Imagine investing \u00a3100 that doubles to \u00a3200 in year 1 (+100%) then falls back to \u00a3100 in year 2 (\u221250%). Simple average: (100%+(\u221250%))/2 = +25%. But you\u2019re back where you started! The geometric average correctly gives 0%.\n\nWhy AER matters: Banks quote nominal rates to look cheap. \u20188% compounded quarterly\u2019 sounds like 8% but is really 8.24% because each quarter\u2019s interest earns interest in the next quarter. AER reveals the true cost.",
tf:[{h:"WHY do we need different appraisal methods?",b:"Imagine you\u2019re a CEO deciding whether to build a new factory. You need to answer: (1) Does it create value? \u2192 NPV tells you in pounds. (2) What return does it earn? \u2192 IRR tells you as a percentage. (3) How quickly do I get my money back? \u2192 Payback tells you in years. Each answers a different question. NPV is the most reliable because it measures actual value created."},{h:"The \u2018opportunity cost\u2019 concept (why the discount rate exists)",b:"If you invest \u00a3100k in Project A, you CAN\u2019T invest that \u00a3100k in Project B. The discount rate represents what you\u2019re giving up \u2014 the return you could earn elsewhere. If the stock market returns 10%, any project must beat 10% to be worthwhile. That\u2019s why we discount at the cost of capital."},{h:"Simple vs Geometric average \u2014 the trap",b:"\u00a3100 \u2192 \u00a3200 (+100%) \u2192 \u00a3100 (\u221250%). Simple average: (100\u221250)/2 = +25%. But you made NOTHING! Geometric: (100/100)^(1/2)\u22121 = 0%. The geometric average is correct because it reverses the compounding process. Simple average always overstates multi-period returns."},{h:"AER in plain English",b:"A bank says \u20188% interest, compounded quarterly.\u2019 That means every 3 months they add 2% (=8%/4) to your balance. But in Q2, you earn 2% on the original PLUS 2% on Q1\u2019s interest. By year-end you actually earned 8.24%, not 8%. The more frequently they compound, the higher the true rate. AER strips away the marketing and shows reality."},{h:"When methods disagree (EXAM FAVOURITE)",b:"NPV says Project A is better (\u00a380k vs \u00a330k). IRR says Project B is better (24% vs 18%). Who\u2019s right? NPV \u2014 always. The conflict happens because IRR ignores scale. B earns a higher RATE on a smaller investment. A earns a lower rate on a larger investment but creates more TOTAL VALUE. Think: would you prefer 50% return on \u00a310, or 10% return on \u00a310,000?"}],
pq:[{q:"NPV at 12% = +\u00a323,513. NPV at 20% = \u2212\u00a312,208. Find IRR. Cost of capital = 15%.",a:"WHAT ARE WE DOING? Finding the exact rate where NPV = 0.\nWe know NPV is positive at 12% and negative at 20%.\nSo the \u2018zero crossing\u2019 must be somewhere between 12% and 20%.\n\nIRR = r+ + [NPV+ / (NPV+ \u2212 NPV\u2212)] \u00d7 (r\u2212 \u2212 r+)\n\nr+ = 12% (the rate giving positive NPV)\nr\u2212 = 20% (the rate giving negative NPV)\nNPV+ = 23,513\nNPV\u2212 = \u221212,208\n\nIRR = 12% + [23,513 / (23,513 \u2212 (\u221212,208))] \u00d7 (20% \u2212 12%)\n    = 12% + [23,513 / 35,721] \u00d7 8%\n    = 12% + 0.6584 \u00d7 8%\n    = 12% + 5.27%\n    = 17.27%\n\nDecision: IRR (17.27%) > cost of capital (15%) \u2192 ACCEPT.\nThe project earns 17.27% but investors only demand 15%.\n\nSETUP TIP: Always show the two NPV calculations first."},{q:"Nominal rate 8% compounded quarterly. Find AER.",a:"WHAT IS THE QUESTION REALLY ASKING?\nThe bank says \u20188%\u2019 but compounds 4 times a year.\nWhat do you ACTUALLY earn by the end of the year?\n\nAER = (1 + r/m)^m \u2212 1\n\nr = 0.08 (the quoted/nominal rate)\nm = 4 (quarterly = 4 times per year)\n\nAER = (1 + 0.08/4)^4 \u2212 1\n    = (1 + 0.02)^4 \u2212 1\n    = (1.02)^4 \u2212 1\n    = 1.0824 \u2212 1\n    = 0.0824 = 8.24%\n\nThe real rate is 8.24%, not 8%.\nThe extra 0.24% comes from earning interest on interest.\n\nCommon frequencies: monthly=12, quarterly=4, semi-annual=2, daily=365."},{q:"Invest \u00a31,000, receive \u00a31,350 after 4 years. Annualised return? Doubling time?",a:"WHAT IS THE QUESTION ASKING?\nYou made 35% total over 4 years. But what\u2019s the\nANNUAL rate that produces this result with compounding?\n\nr = (FV/PV)^(1/n) \u2212 1\n  = (1350/1000)^(1/4) \u2212 1\n  = (1.35)^(0.25) \u2212 1\n  = 1.0778 \u2212 1\n  = 7.78% per year\n\nWHY NOT 35%/4 = 8.75%?\nBecause simple average ignores compounding.\n7.78% compounded 4 years: 1000 \u00d7 1.0778^4 = 1,350 \u2713\n8.75% compounded 4 years: 1000 \u00d7 1.0875^4 = 1,397 \u2718 (too high!)\n\nDOUBLING TIME:\nn = log(2)/log(1+r) = log(2)/log(1.0778)\n  = 0.693/0.0749 = 9.25 years\n\nRule of 72 quick check: 72/7.78 \u2248 9.3 years \u2713"},{q:"Project A: Initial \u00a3100k, NPV = \u00a330k, IRR = 24%.\nProject B: Initial \u00a3400k, NPV = \u00a380k, IRR = 18%.\nMutually exclusive. Which should be chosen? Why do NPV and IRR disagree?",a:"NPV says: Project B (\u00a380k > \u00a330k) \u2192 B creates more value.\nIRR says: Project A (24% > 18%) \u2192 A earns a higher rate.\n\nCORRECT ANSWER: Choose Project B.\n\nWHY THEY DISAGREE:\nIRR ignores SCALE. A earns 24% but on only \u00a3100k.\nB earns 18% but on \u00a3400k.\n\n24% \u00d7 \u00a3100k = \u00a324k of value created\n18% \u00d7 \u00a3400k = \u00a372k of value created\n(These are approximate \u2014 NPV is more precise)\n\nAnalogy: Would you prefer 50% return on \u00a310\nor 10% return on \u00a310,000?\n50% \u00d7 10 = \u00a35 vs 10% \u00d7 10,000 = \u00a31,000.\n\nNPV measures VALUE. IRR measures RATE.\nWhen they conflict, NPV wins. Always."}]},

{id:3,t:"Financial Markets, Equity & EMH",i:"\ud83c\udfdb\ufe0f",co:"#7d3c98",ch:"Market Efficiency & Share Valuation",
kp:[
"Financial markets split into MONEY markets (short-term, <1 year \u2014 Treasury bills, commercial paper, CDs) and CAPITAL markets (long-term, >1 year \u2014 shares, bonds).",
"Ordinary shares = ownership of the company. You get voting rights and dividends, BUT you\u2019re LAST in line \u2014 after tax, interest, and all other costs are paid. High risk, high potential return.",
"Preference shares = a hybrid between debt and equity. You get a FIXED dividend (like interest on debt) and priority over ordinary shareholders in liquidation. But usually no voting rights.",
"A perpetuity is a cash flow that repeats FOREVER. Sounds impossible to value, but the maths simplifies beautifully: V = CF/r. If it grows at g% per year: V = CF\u2081/(r\u2212g). This is the foundation of all share valuation.",
"The P/E ratio = Price/Earnings = 1/(r\u2212g). A HIGH P/E means the market thinks the firm has either LOW risk (small r) or HIGH growth (big g) or both. A LOW P/E means high risk or low growth.",
"Enterprise Value (EV) = total firm value = Equity + Debt \u2212 Cash. This is what you\u2019d pay to buy the ENTIRE firm. It separates firm value from how it\u2019s financed.",
"The Efficient Market Hypothesis (EMH) says the share price is the BEST POSSIBLE estimate of what the firm is really worth, because thousands of investors are constantly analysing and trading.",
"Weak form EMH: you cannot make money by studying PAST PRICES. Charts, trends, and technical indicators are useless because any pattern is already exploited and priced in.",
"Semi-strong form: you cannot make money using ANY PUBLIC information (accounts, news, analyst reports). The price already reflects all of it. Fundamental analysis won\u2019t give you an edge.",
"Strong form: even PRIVATE/INSIDER information is reflected in prices. Almost certainly false \u2014 if it were true, insider trading wouldn\u2019t be profitable (but it is, which is why it\u2019s illegal)."],
fm:[
{n:"Flat Perpetuity",eq:"V = <span class=fr><span class=fr-t>CF</span><span class=fr-b>r</span></span>",c:"An infinite, constant cash flow. Example: \u00a3100/year forever at 10% = \u00a3100/0.10 = \u00a31,000. The key insight: infinity has a FINITE value because each future \u00a3 is worth less than the last."},
{n:"Growing Perpetuity (Gordon Model)",eq:"V = <span class=fr><span class=fr-t>CF<sub>1</sub></span><span class=fr-b>r \u2212 g</span></span>",c:"Cash flows grow at g% per year forever. CF\u2081 must be NEXT year\u2019s CF, not this year\u2019s. Only works if g < r."},
{n:"Share Price (DVM)",eq:"P<sub>0</sub> = <span class=fr><span class=fr-t>d<sub>1</sub></span><span class=fr-b>r \u2212 g</span></span>",c:"Same formula applied to dividends. d\u2081 = next year\u2019s dividend. r = required return. g = dividend growth rate."},
{n:"P/E Ratio",eq:"P/E = <span class=fr><span class=fr-t>1</span><span class=fr-b>r \u2212 g</span></span>",c:"If P/E = 20, then r\u2212g = 5%. High P/E = market expects low risk or high growth."},
{n:"Enterprise Value",eq:"EV = Equity + Debt \u2212 Cash",c:"Total value of the firm regardless of financing. Used to compare firms with different capital structures."}],
dd:"This lecture has two big ideas: HOW to value shares, and WHETHER the market does it correctly.\n\nShare valuation: If a company pays you a dividend every year forever, what\u2019s that worth TODAY? You can\u2019t add up infinite dividends directly, but clever maths shows the answer is simply V = CF/r. If dividends grow, it\u2019s V = CF\u2081/(r\u2212g). The whole thing boils down to just TWO numbers: r (how risky is this company?) and g (how fast will it grow?). Everything else is noise.\n\nWhy does infinity have a finite price? Because each future pound is worth less than the last. The 100th year\u2019s dividend, discounted back, is almost worthless. The sum converges to CF/r.\n\nThe EMH: Imagine 10,000 people all guessing an ox\u2019s weight. Some are experts, some are clueless. But the AVERAGE of all guesses is remarkably accurate (Galton, 1906 \u2014 off by just 1 pound). The stock market works the same way. Each investor may be wrong, but in aggregate, they produce prices that reflect all available information. \u2018Ask the Audience\u2019 on Who Wants to Be a Millionaire gets it right 91% of the time vs 65% for \u2018Phone a Friend\u2019. Crowds beat individuals.",
tf:[
{h:"d\u2080 vs d\u2081 trap (THE most common exam mistake)",b:"The Gordon model formula P = d\u2081/(r\u2212g) needs NEXT YEAR\u2019s dividend, not this year\u2019s. If the question says \u2018the company just paid a dividend of \u00a32.40\u2019 or \u2018current dividend is \u00a32.40\u2019, that\u2019s d\u2080. You MUST compute d\u2081 = d\u2080 \u00d7 (1+g) = 2.40 \u00d7 1.05 = \u00a32.52 before plugging in. If it says \u2018next year\u2019s dividend is expected to be \u00a32.52\u2019, that IS d\u2081 \u2014 use it directly."},
{h:"Why infinity has a finite price",b:"Imagine getting \u00a3100 per year forever at 10% discount rate. Year 1 is worth \u00a390.91. Year 10 is worth \u00a338.55. Year 50 is worth \u00a30.85. Year 100 is worth \u00a30.007. The payments keep coming but each is worth practically nothing. Sum them all up and you get exactly \u00a31,000 = CF/r = 100/0.10. The infinite series CONVERGES because discounting crushes distant cash flows."},
{h:"The two-variable trick (r and g decode everything)",b:"Every share price = just r and g. High P/E means either low r (safe, stable company \u2014 market trusts it) or high g (fast growth expected). If you know the share price and one variable, you can always solve for the other. Example: P=\u00a380, e\u2081=\u00a35 \u2192 P/E=16 \u2192 r\u2212g = 1/16 = 6.25%. If r=10%, then g=3.75%."},
{h:"Three EMH layers \u2014 how to argue in an essay",b:"Think of EMH as a spectrum:\n\nWeak form (EASIEST to defend): Past prices are useless for prediction. Evidence: random walk tests, technical trading rules don\u2019t consistently profit after costs.\n\nSemi-strong (MOSTLY true): Public info is priced in within minutes. Evidence: event studies show near-instant price reaction to earnings announcements. But anomalies exist (January effect, momentum).\n\nStrong form (almost certainly FALSE): If even insider info were priced in, insider trading wouldn\u2019t be profitable \u2014 but it is (Martha Stewart, etc.). This is why insider trading is illegal.\n\nExam tip: always present BOTH sides, then give a nuanced conclusion: \u2018Markets are broadly semi-strong efficient, but behavioural biases and anomalies create pockets of exploitable inefficiency.\u2019"},
{h:"Ordinary vs Preference shares \u2014 know the difference",b:"ORDINARY: You own the company. You vote. You get dividends IF the board declares them (no guarantee). If the firm goes bankrupt, you\u2019re LAST in line \u2014 after all creditors and preference shareholders. High risk, high potential reward.\n\nPREFERENCE: You get a FIXED dividend (like 5% of face value) every year, paid BEFORE ordinary shareholders. If the firm goes bust, you get paid before ordinary shareholders. But you usually CAN\u2019T vote. Lower risk, lower reward. Behaves more like a bond than a share."}
],
pq:[
{q:"Company just paid dividend of \u00a32.40. Growth = 5% forever. Required return = 12%. Find the share price.",a:"WHAT IS THIS ASKING?\nWhat would you pay for a stream of dividends that grows\nat 5% per year forever, if you need a 12% return?\n\nStep 1: Find NEXT year\u2019s dividend (d\u2081)\nd\u2081 = d\u2080 \u00d7 (1+g) = \u00a32.40 \u00d7 1.05 = \u00a32.52\n\nWHY? Because the formula values payments starting\nONE year from now, not today. The \u00a32.40 was already paid.\n\nStep 2: Apply Gordon Growth Model\nP\u2080 = d\u2081 / (r \u2212 g) = \u00a32.52 / (0.12 \u2212 0.05)\n   = \u00a32.52 / 0.07 = \u00a336.00\n\nSANITY CHECK: What if growth were 0%?\nP = \u00a32.40/0.12 = \u00a320.00\nGrowth adds \u00a316 (44%) to the share price!\n\nCOMMON MISTAKE: Using d\u2080 = \u00a32.40 directly:\n2.40/0.07 = \u00a334.29 \u2014 WRONG. You\u2019d lose marks."},
{q:"Firm has earnings of \u00a35/share and P/E ratio of 16.\n(a) What is the implied r\u2212g?\n(b) If the required return is 10%, what growth rate does the market expect?\n(c) What is the current share price?",a:"(a) P/E = 1/(r\u2212g), so r\u2212g = 1/P/E = 1/16 = 6.25%\n\nWHAT DOES THIS MEAN?\nThe gap between risk and growth is 6.25%.\nSmall gap = high price. Large gap = low price.\n\n(b) If r = 10%, then g = r \u2212 6.25% = 3.75%\nThe market expects this firm to grow at 3.75% per year.\n\n(c) Share price = Earnings \u00d7 P/E = \u00a35 \u00d7 16 = \u00a380\nCheck: P = e\u2081/(r\u2212g) = 5/0.0625 = \u00a380 \u2713"},
{q:"A firm generates \u00a3500,000 in cash flow per year, expected to remain constant forever. The appropriate discount rate is 8%. What is the firm worth?",a:"This is a FLAT perpetuity (no growth, g=0).\n\nV = CF / r = \u00a3500,000 / 0.08 = \u00a36,250,000\n\nWHY DOES THIS WORK?\nIf you put \u00a36.25m in the bank at 8%, you\u2019d earn\n\u00a3500,000 per year in interest \u2014 exactly the same CF.\nSo the firm is worth exactly as much as the bank\ndeposit that replicates its cash flows.\n\nIf growth were 3%:\nV = CF\u2081/(r\u2212g) = 500,000\u00d71.03/(0.08\u22120.03)\n  = 515,000/0.05 = \u00a310,300,000\nGrowth almost DOUBLES the value!"}]},

{id:4,t:"Bonds & Bond Pricing",i:"\ud83d\udcdc",co:"#b9770e",ch:"Fixed Income Securities",
kp:[
"A bond is an IOU \u2014 a loan from the investor to the company or government. The investor lends money (buys the bond) and receives regular interest (coupons) plus their money back at maturity.",
"Every bond is defined by FOUR things: Face Value (the amount repaid at the end, usually \u00a31,000), Coupon Rate (annual interest as % of face value), Maturity (when the face value is repaid), and Payment Frequency (annual or semi-annual).",
"Bond VALUE = the present value of ALL future cash flows. The cash flows are: coupon payments (an annuity) plus the face value repaid at maturity (a single lump sum).",
"The critical relationship: bond prices and market interest rates (YTM) move in OPPOSITE directions. This is the seesaw. When rates rise, bond prices fall. When rates fall, bond prices rise.",
"WHY the seesaw works: If market rates rise to 8% but your bond only pays 6%, nobody wants your bond at full price \u2014 they can get 8% elsewhere. So your bond\u2019s price must DROP until its effective yield matches 8%.",
"Par, Premium, Discount: Coupon rate = YTM \u2192 price = face value (par). Coupon > YTM \u2192 price > face value (premium, because the bond pays MORE than the market rate). Coupon < YTM \u2192 price < face value (discount).",
"Coupons are an ANNUITY \u2014 the same payment repeated every year. Instead of discounting each one individually, you can use the annuity factor (AF) as a shortcut.",
"UK government bonds are called GILTS. Types: conventional (normal coupon + bullet repayment), index-linked (coupon and principal adjust with inflation/RPI), convertible, irredeemable (no maturity date \u2014 pure perpetuity).",
"LIBOR (London Interbank Offered Rate) was the global reference rate until 2023. Replaced by SONIA (UK) and SOFR (US) after the LIBOR-rigging scandal.",
"Credit rating agencies (Moody\u2019s, S&P, Fitch) grade bonds from AAA (safest) to D (default). Lower rating = higher yield demanded = lower bond price. The extra yield is the credit spread."],
fm:[
{n:"Bond Price (individual method)",eq:"P = \u03a3 <span class=fr><span class=fr-t>C</span><span class=fr-b>(1+y)<sup>t</sup></span></span> + <span class=fr><span class=fr-t>FV</span><span class=fr-b>(1+y)<sup>n</sup></span></span>",c:"Discount each coupon one by one, then add the discounted face value. Safe but slow for long maturities."},
{n:"Bond Price (annuity method)",eq:"P = C × AF<sub>(y,n)</sub> + FV × DF<sub>(y,n)</sub>",c:"FASTER: Multiply the annual coupon by the annuity factor, then add face value times the discount factor. Both methods give the SAME answer."},
{n:"Annuity Factor",eq:"AF = <span class=fr><span class=fr-t>1 \u2212 <span class=fr><span class=fr-t>1</span><span class=fr-b>(1+y)<sup>n</sup></span></span></span><span class=fr-b>y</span></span>",c:"The present value of \u00a31 received every year for n years at rate y. It\u2019s a shortcut that replaces n separate discount factor calculations."},
{n:"Coupon Payment (\u00a3)",eq:"C = Coupon Rate × Face Value",c:"The actual cash you receive each year. 6% on \u00a31,000 = \u00a360. Note: the exam gives you the RATE \u2014 you must multiply by face value to get pounds."}],
dd:"Bonds are conceptually simpler than shares because the cash flows are CONTRACTUAL \u2014 they\u2019re written into the bond agreement. No guessing about future dividends or growth rates. You know exactly how much you\u2019ll receive and when.\n\nThe ENTIRE bond pricing exercise comes down to one question: \u2018What are these known future cash flows worth TODAY?\u2019 And you already know how to answer that from Lecture 1 \u2014 discount each cash flow back to the present.\n\nThe seesaw explained with a story: Imagine you own a bond paying 6% (\u00a360/year on \u00a31,000). Yesterday, the market rate was 6% \u2014 your bond was worth exactly \u00a31,000 (par). Today, the market rate jumps to 8%. A new investor can now buy a BRAND NEW bond paying 8% (\u00a380/year). Why would they buy YOUR bond paying only \u00a360? They wouldn\u2019t \u2014 unless you drop your price enough that the effective yield reaches 8%. So your \u00a31,000 bond drops to ~\u00a3920.\n\nThe same logic works in reverse: if rates fall to 4%, your 6%-coupon bond is now more attractive than new 4% bonds. Investors bid up the price to ~\u00a31,089.\n\nAnnuity factor explained: Instead of calculating PV for Year 1, Year 2, Year 3... Year 20 separately (20 calculations!), the annuity factor lets you do it in ONE step. It\u2019s the sum of all the individual discount factors. Multiply it by the coupon and you\u2019re done.",
tf:[
{h:"The seesaw \u2014 predict BEFORE calculating",b:"Whenever you see a bond question, BEFORE touching your calculator, check: is coupon rate above or below YTM?\n\nCoupon > YTM \u2192 Price MUST be above face value (premium)\nCoupon < YTM \u2192 Price MUST be below face value (discount)\nCoupon = YTM \u2192 Price = face value exactly (par)\n\nIf your calculated answer violates this rule, you\u2019ve made an error. Go back and check."},
{h:"Why two methods exist and when to use each",b:"INDIVIDUAL METHOD: Discount each year\u2019s CF separately. Year 1: C/(1+y)^1, Year 2: C/(1+y)^2, etc., then add FV/(1+y)^n. Safe, transparent, shows every step. Best for SHORT bonds (3\u20135 years) or when you want to be very explicit.\n\nANNUITY METHOD: P = C\u00d7AF + FV\u00d7DF. Just two calculations. Much faster for LONG bonds (10\u201330 years). The AF handles all the coupon discounting in one step.\n\nBoth give the EXACT same answer. Use whichever the exam seems to expect, but annuity is generally preferred for speed."},
{h:"Semi-annual bonds (exam twist)",b:"Many bonds pay coupons TWICE a year. The adjustment is simple but easy to mess up:\n\n1. HALVE the coupon rate (6% annual \u2192 3% per period)\n2. DOUBLE the periods (5 years \u2192 10 periods)\n3. HALVE the YTM (8% annual \u2192 4% per period)\n\nThen use the same formulas with these adjusted numbers. Example: 6% annual coupon, 5yr, YTM 8% \u2192 becomes 3% coupon, 10 periods, 4% discount rate. The coupon payment becomes \u00a330 per period instead of \u00a360 per year."},
{h:"What numbers to extract from the exam question",b:"You need exactly FOUR numbers:\n1. FACE VALUE (FV): Usually \u00a31,000 (US/corporate) or \u00a3100 (UK gilts). This is repaid at maturity.\n2. COUPON RATE: Given as a %. Multiply by FV to get the \u00a3 amount. \u20186% coupon\u2019 on \u00a31,000 = \u00a360/year.\n3. YTM (Yield to Maturity): The market interest rate. This is your DISCOUNT RATE.\n4. MATURITY: Number of years. Check if semi-annual.\n\nThe YTM is NOT the coupon rate. The coupon determines how much you RECEIVE. The YTM determines how much it\u2019s WORTH."},
{h:"The credit spread story",b:"A UK government gilt with 5yr maturity might yield 4% (nearly risk-free). A corporate bond from a BBB-rated company with the same maturity might yield 6%. The 2% difference is the CREDIT SPREAD \u2014 extra return investors demand for the risk that the company might default. Lower rating = wider spread = lower bond price."}],
pq:[
{q:"Bond: FV=\u00a31,000, coupon=6% annual, 5yr maturity, YTM=8%.\nCalculate the price using BOTH methods.\nIs it par, premium, or discount? WHY?",a:"BEFORE CALCULATING: Coupon (6%) < YTM (8%)\n\u2192 Must be DISCOUNT (price < \u00a31,000)\n\nStep 1: Find the coupon in \u00a3\nC = 6% \u00d7 \u00a31,000 = \u00a360 per year\n\nMETHOD A \u2014 Individual discounting:\nYr1: \u00a360 / 1.08^1 = \u00a360/1.0800 = \u00a355.56\nYr2: \u00a360 / 1.08^2 = \u00a360/1.1664 = \u00a351.44\nYr3: \u00a360 / 1.08^3 = \u00a360/1.2597 = \u00a347.63\nYr4: \u00a360 / 1.08^4 = \u00a360/1.3605 = \u00a344.10\nYr5: \u00a360 / 1.08^5 = \u00a360/1.4693 = \u00a340.83\nFV:  \u00a31,000 / 1.08^5 = \u00a31,000/1.4693 = \u00a3680.58\n\nPrice = 55.56+51.44+47.63+44.10+40.83+680.58\n      = \u00a3920.15\n\nMETHOD B \u2014 Annuity (faster, same answer):\nAF(8%,5) = [1 \u2212 1/1.08^5] / 0.08\n         = [1 \u2212 0.6806] / 0.08\n         = 0.3194 / 0.08\n         = 3.9927\n\nDF(8%,5) = 1/1.08^5 = 0.6806\n\nPrice = \u00a360 \u00d7 3.9927 + \u00a31,000 \u00d7 0.6806\n      = 239.56 + 680.58\n      = \u00a3920.15 \u2713 Same answer!\n\nDISCOUNT (\u00a3920 < \u00a31,000) because coupon rate (6%)\nis below market rate (YTM 8%). Investors demand a\nlower price to compensate for the below-market coupon."},
{q:"Same bond but YTM drops to 4%. New price? What happened and why?",a:"BEFORE CALCULATING: Coupon (6%) > YTM (4%)\n\u2192 Must be PREMIUM (price > \u00a31,000)\n\nAF(4%,5) = [1 \u2212 1/1.04^5] / 0.04\n         = [1 \u2212 0.8219] / 0.04\n         = 0.1781 / 0.04\n         = 4.4518\n\nPrice = \u00a360 \u00d7 4.4518 + \u00a31,000 \u00d7 0.8219\n      = 267.11 + 821.93\n      = \u00a31,089.04\n\nPREMIUM (\u00a31,089 > \u00a31,000) because the bond pays 6%\nbut the market now only requires 4%. This bond is\nMORE GENEROUS than new bonds, so investors pay extra.\n\nTHE SEESAW SUMMARY:\nAt YTM 8%: Price = \u00a3920   (discount)\nAt YTM 6%: Price = \u00a31,000 (par)\nAt YTM 4%: Price = \u00a31,089 (premium)\n\nAs YTM \u2193 price \u2191. As YTM \u2191 price \u2193. Always."},
{q:"A zero-coupon bond (no coupons) has face value \u00a31,000 and matures in 3 years. YTM = 6%. What is its price?",a:"Zero-coupon means NO periodic payments.\nThe only CF is \u00a31,000 at Year 3.\n\nPrice = FV / (1+y)^n\n      = \u00a31,000 / 1.06^3\n      = \u00a31,000 / 1.1910\n      = \u00a3839.62\n\nThe investor pays \u00a3839.62 today and receives\n\u00a31,000 in 3 years. The \u00a3160.38 difference IS\nthe interest \u2014 earned as capital gain, not coupon.\n\nTreasury bills work this way. They\u2019re always\npriced at a DISCOUNT because there\u2019s no coupon."}]},

{id:5,t:"Risk, Return & Portfolio Theory",i:"\u2696\ufe0f",co:"#c0392b",ch:"Markowitz & Diversification",
kp:[
"Risk in finance = STANDARD DEVIATION of returns. It measures how much your actual return might differ from what you expect. High SD = wide range of possible outcomes = more uncertainty.",
"Risk-averse investors refuse 'fair bets' (expected value = 0). They need POSITIVE expected value as compensation for accepting uncertainty. The bigger the risk, the bigger the compensation they demand.",
"Loss aversion (Kahneman & Tversky): losing \u00a320 hurts MORE than gaining \u00a320 feels good. The pain-to-pleasure ratio is roughly 2:1. This is why insurance exists \u2014 people pay to avoid possible loss.",
"PORTFOLIO DIVERSIFICATION is the most powerful idea in this lecture: by holding TWO OR MORE assets that don't move in perfect lockstep, you can reduce risk WITHOUT reducing expected return. Free lunch!",
"The key variable is CORRELATION (\u03c1). At \u03c1=+1: no diversification benefit (assets move identically). At \u03c1=\u22121: risk eliminated completely (perfect hedge). At \u03c1=0: significant risk reduction while return stays the same.",
"The coin-flip intuition: One \u00a320 bet gives you 50% chance of +\u00a320 or \u221220. Two separate \u00a310 bets give you only 25% chance of the worst outcome (\u221220). Same expected value, less downside risk.",
"The EFFICIENT FRONTIER is the curve of portfolios offering the highest return for each level of risk. No rational investor would choose a portfolio BELOW this curve (same risk, lower return).",
"The CAPITAL MARKET LINE (CML) combines the risk-free asset with the MARKET PORTFOLIO (M). All rational investors pick some point on this line \u2014 more risk-averse investors hold more of the risk-free asset, risk-seekers hold more of M."],
fm:[
{n:"Expected Value",eq:"E(V) = \u03a3 V<sub>i</sub> × P<sub>i</sub>",c:"The probability-weighted average. What you'd earn ON AVERAGE over thousands of repetitions. Each possible outcome multiplied by its probability, then summed."},
{n:"Variance",eq:"\u03c3\u00b2 = \u03a3 P<sub>i</sub> × (V<sub>i</sub> \u2212 E(V))<sup>2</sup>",c:"How spread out the outcomes are. Squaring the deviations ensures positive and negative deviations don't cancel out, and penalises large deviations more than small ones."},
{n:"Standard Deviation",eq:"\u03c3 = \u221a\u03c3\u00b2",c:"The square root of variance. Returns it to the same units as the return (%). THIS is the number reported as 'risk' in finance."},
{n:"Portfolio Variance (2 assets)",eq:"\u03c3<sup>2</sup><sub>p</sub> = w<sub>1</sub><sup>2</sup>\u03c3<sub>1</sub><sup>2</sup> + w<sub>2</sub><sup>2</sup>\u03c3<sub>2</sub><sup>2</sup> + 2w<sub>1</sub>w<sub>2</sub>\u03c3<sub>1</sub>\u03c3<sub>2</sub>\u03c1",c:"Portfolio risk depends on THREE things: individual risks, weights, AND how the assets move together (correlation \u03c1). The third term is what creates the diversification benefit."},
{n:"Portfolio Return",eq:"E(R<sub>p</sub>) = w<sub>1</sub>E(R<sub>1</sub>) + w<sub>2</sub>E(R<sub>2</sub>)",c:"Just a weighted average. NOTE: return is always the simple weighted average, but RISK is NOT. This asymmetry is why diversification is a free lunch."}],
dd:"Harry Markowitz won the Nobel Prize for showing that you can reduce risk without sacrificing return, simply by combining assets that don't move in perfect lockstep. The maths proves something that seems too good to be true.\n\nThe coin-flip analogy: Imagine a single \u00a320 bet on a coin. Heads = +\u00a320, Tails = \u2212\u00a320. Expected value = 0. Now instead, place TWO independent \u00a310 bets. Four outcomes: HH (+\u00a320, prob 25%), HT (\u00a30, 25%), TH (\u00a30, 25%), TT (\u2212\u00a320, 25%). Same expected value (0), but the chance of the WORST outcome (\u221220) dropped from 50% to 25%, and new middle outcomes (0) appeared with 50% combined probability. A risk-averse person strongly prefers the second setup.\n\nThe mathematical insight: Portfolio RETURN = weighted average (simple). Portfolio RISK \u2260 weighted average. The covariance/correlation term means total risk is LESS than the weighted average of individual risks. This gap = the diversification benefit. It's free. Everyone should take it.\n\nThe efficient frontier: Plot every possible portfolio on a graph (x-axis = risk, y-axis = return). The top edge of this cloud is the efficient frontier. Everything below is dominated \u2014 same risk but lower return. The CML extends this by adding a risk-free asset, creating a straight line from Rf through the tangent portfolio M.",
tf:[
{h:"Return is additive, risk is NOT (the key insight)",b:"Portfolio return = w\u2081R\u2081 + w\u2082R\u2082. Simple weighted average. Always.\n\nPortfolio risk \u2260 w\u2081\u03c3\u2081 + w\u2082\u03c3\u2082. The covariance term means portfolio risk is LESS than the weighted average of individual risks (unless \u03c1 = +1). This gap is the diversification benefit.\n\nExample: Stock A (\u03c3=20%) and Stock B (\u03c3=10%), 50/50 split.\nWeighted average risk = 15%.\nActual portfolio risk (if \u03c1=0) = 11.18%.\nYou 'saved' 3.82 percentage points of risk for FREE."},
{h:"Variance calculation recipe (step-by-step column approach)",b:"Set up a table with these columns:\n\nOutcome | Return (R) | Prob (P) | R\u2212E(R) | [R\u2212E(R)]\u00b2 | P\u00d7[R\u2212E(R)]\u00b2\n\n(1) First calculate E(R) = \u03a3 R\u00d7P (fill columns 1-3, sum column R\u00d7P)\n(2) Fill column 4: subtract E(R) from each return\n(3) Fill column 5: square each deviation\n(4) Fill column 6: multiply by probability\n(5) Sum column 6 = VARIANCE\n(6) Square root = STANDARD DEVIATION\n\nDoing it in columns prevents errors. The exam loves this format."},
{h:"Zero correlation makes life easy",b:"When \u03c1 = 0, the covariance term 2w\u2081w\u2082\u03c3\u2081\u03c3\u2082\u03c1 = 0 (anything times zero = zero). So:\n\u03c3\u00b2\u209a = w\u2081\u00b2\u03c3\u2081\u00b2 + w\u2082\u00b2\u03c3\u2082\u00b2 only.\n\nThis is MUCH simpler. Most exam questions give \u03c1=0 to keep the calculation manageable. If they don't state \u03c1, they'll usually tell you to assume zero or give you the covariance directly."},
{h:"Why risk-averse people refuse fair bets",b:"A 'fair bet' has expected value of zero \u2014 you won't gain or lose ON AVERAGE. But a risk-averse person won't take it because the PAIN of potential loss outweighs the PLEASURE of potential gain. To get them to play, you need to tilt the odds in their favour (positive EV). The more risk-averse, the bigger the tilt required. This is why riskier investments must offer higher expected returns."}],
pq:[
{q:"Stock X returns:\nBoom (P=0.3): 20%\nNormal (P=0.5): 10%\nRecession (P=0.2): \u22125%\n\nFind E(R), variance, and standard deviation.",a:"STEP 1: Expected Return\nE(R) = (0.3 \u00d7 20%) + (0.5 \u00d7 10%) + (0.2 \u00d7 \u22125%)\n     = 6% + 5% + (\u22121%) = 10%\n\nSTEP 2: Deviations from mean\nBoom:    20% \u2212 10% = +10%\nNormal:  10% \u2212 10% =   0%\nRecess: \u22125% \u2212 10% = \u221215%\n\nSTEP 3: Square each deviation\nBoom:    (10%)\u00b2  = 100\nNormal:  (0%)\u00b2   = 0\nRecess: (\u221215%)\u00b2 = 225\n\nSTEP 4: Multiply by probability\nBoom:    0.3 \u00d7 100 = 30\nNormal:  0.5 \u00d7 0   = 0\nRecess:  0.2 \u00d7 225 = 45\n\nSTEP 5: Sum = Variance\n\u03c3\u00b2 = 30 + 0 + 45 = 75 (in %\u00b2 terms, or 0.0075)\n\nSTEP 6: Square root = Standard Deviation\n\u03c3 = \u221a75 = 8.66%\n\nInterpretation: Expected 10% return with 8.66% risk.\nThe returns could plausibly range from about\n10%\u22128.66% = 1.3% to 10%+8.66% = 18.7% (one SD)."},
{q:"Stock P: E(R)=12%, \u03c3=20%.\nStock Q: E(R)=8%, \u03c3=10%.\nCorrelation = 0.\nFind the 50/50 portfolio return and risk.\nDemonstrate the diversification benefit.",a:"RETURN (always a weighted average):\nE(R\u209a) = 0.5 \u00d7 12% + 0.5 \u00d7 8% = 10%\n\nRISK (correlation = 0, so covariance term drops out):\n\u03c3\u00b2\u209a = w\u2081\u00b2\u03c3\u2081\u00b2 + w\u2082\u00b2\u03c3\u2082\u00b2\n    = (0.5)\u00b2 \u00d7 (20%)\u00b2 + (0.5)\u00b2 \u00d7 (10%)\u00b2\n    = 0.25 \u00d7 400 + 0.25 \u00d7 100\n    = 100 + 25 = 125\n\u03c3\u209a = \u221a125 = 11.18%\n\nDIVERSIFICATION BENEFIT:\nWeighted average risk = 0.5\u00d720% + 0.5\u00d710% = 15%\nActual portfolio risk = 11.18%\nRisk REDUCED by 3.82 percentage points!\n\nYou get 10% return with only 11.18% risk, versus\n15% if there were no diversification. Same return,\nless risk = the power of diversification."},
{q:"Using the same two stocks (P and Q), what would the portfolio risk be if correlation were +1? And if \u22121?",a:"IF \u03c1 = +1 (perfect positive correlation):\n\u03c3\u00b2\u209a = 0.25\u00d7400 + 0.25\u00d7100 + 2\u00d70.5\u00d70.5\u00d720\u00d710\u00d71\n    = 100 + 25 + 100 = 225\n\u03c3\u209a = \u221a225 = 15% = exactly the weighted average\nNO diversification benefit. Assets move in lockstep.\n\nIF \u03c1 = \u22121 (perfect negative correlation):\n\u03c3\u00b2\u209a = 100 + 25 + 2\u00d70.5\u00d70.5\u00d720\u00d710\u00d7(\u22121)\n    = 100 + 25 \u2212 100 = 25\n\u03c3\u209a = \u221a25 = 5%\nMassive risk reduction! (Could even reach 0% with\nthe right weights.)\n\nSummary: \u03c1=+1 \u2192 15%, \u03c1=0 \u2192 11.18%, \u03c1=\u22121 \u2192 5%\nLower correlation = more diversification benefit."}
]},

{id:6,t:"CAPM",i:"\u03b2",co:"#2471a3",ch:"Systematic Risk & Asset Pricing",
kp:[
"Once you hold about 20 different stocks, adding more barely reduces risk further. The remaining risk that CAN'T be diversified away is called SYSTEMATIC (or market) risk.",
"Systematic risk comes from economy-wide factors: recessions, interest rate changes, pandemics, wars. It affects ALL companies, so you can't escape it by diversifying.",
"Unsystematic (firm-specific) risk comes from things unique to one company: CEO fired, product recall, factory fire. This CAN be eliminated by holding a diversified portfolio.",
"The market ONLY rewards you for bearing systematic risk. Unsystematic risk is not rewarded because you can remove it 'for free' by diversifying. If you choose not to, that's your problem.",
"BETA (\u03b2) measures a stock's SYSTEMATIC risk relative to the market. It answers: 'For every 1% the market moves, how many % does this stock move?' \u03b2=1.5 means 1.5 times as volatile.",
"\u03b2 is calculated as Cov(Stock, Market) / Var(Market). It's essentially covariance standardised so that the market itself always has \u03b2=1.",
"The SML (Security Market Line): E(R\u1d62) = Rf + \u03b2(Rm\u2212Rf). This gives the FAIR expected return for a given level of systematic risk. Rf = risk-free rate, Rm = market return, (Rm\u2212Rf) = market risk premium.",
"Stocks ABOVE the SML deliver more return than they 'should' for their risk \u2192 undervalued (buy). BELOW the SML \u2192 overvalued (sell). ON the SML \u2192 fairly priced.",
"CAPM assumptions: rational investors, efficient markets, single period, risk-free borrowing/lending, no taxes, homogeneous expectations. None fully hold in reality.",
"Fama & French (1992) showed that SIZE (small caps outperform) and VALUE (high book-to-market outperform) explain returns better than beta alone. But CAPM remains the industry standard for its simplicity."],
fm:[
{n:"Beta",eq:"\u03b2<sub>i</sub> = <span class=fr><span class=fr-t>Cov(R<sub>i</sub>, R<sub>m</sub>)</span><span class=fr-b>Var(R<sub>m</sub>)</span></span>",c:"How much the stock co-moves with the market, standardised. Cov = joint movement. Dividing by Var(Rm) makes the market's own beta exactly 1.0."},
{n:"SML / CAPM",eq:"E(R<sub>i</sub>) = R<sub>f</sub> + \u03b2<sub>i</sub> (R<sub>m</sub> \u2212 R<sub>f</sub>)",c:"The 'fair' expected return. Rf = risk-free return (e.g., T-bill). \u03b2 scales the market risk premium. Higher \u03b2 = more systematic risk = higher required return."},
{n:"Market Risk Premium",eq:"MRP = R<sub>m</sub> \u2212 R<sub>f</sub>",c:"The extra return the market as a whole demands above the risk-free rate. Historically about 5-8% depending on the period and country."},
{n:"Covariance",eq:"Cov(X,Y) = \u03a3 P<sub>i</sub>(X<sub>i</sub> \u2212 X\u0304)(Y<sub>i</sub> \u2212 Y\u0304)",c:"Measures how two variables move together. Positive = same direction. Negative = opposite. Zero = no relationship. Like variance, but between TWO variables instead of one."}],
dd:"CAPM is the bridge from portfolio theory (L5) to practical asset pricing. The logic chain:\n\n(1) Rational investors diversify \u2192 (2) Unsystematic risk is eliminated \u2192 (3) Only systematic risk remains \u2192 (4) Only systematic risk should earn a return premium \u2192 (5) Beta measures systematic risk \u2192 (6) The SML gives the 'fair' return for each beta level.\n\nBeta intuition: Think of the market as the ocean. All ships (stocks) rise and fall with the tide (systematic risk). But some ships rock more than others. A \u03b2=1.5 ship swings 50% more than the ocean. A \u03b2=0.7 ship is more stable. Beta measures how violently your ship rocks relative to the sea.\n\nThe SML as a pricing mechanism: If Stock A has \u03b2=1.4 and the SML says it should return 14.2%, but it's currently yielding 16%, it's a bargain (above the SML). The market will bid up its price until the yield falls to 14.2%. Conversely, a stock yielding less than its SML return will see its price fall.\n\nCAPM vs DGM: Both estimate the cost of equity (Ke), but differently. CAPM uses market data (\u03b2, Rf, Rm) and explicitly models risk. DGM uses dividend data (D\u2081/P\u2080 + g) and implicitly assumes risk through r. CAPM works for all stocks; DGM only for stable dividend-payers.",
tf:[
{h:"Two types of risk \u2014 the fundamental distinction",b:"SYSTEMATIC (market/undiversifiable): Recessions, rate changes, inflation, wars. Affects ALL firms. You CANNOT escape it no matter how many stocks you own. The market PAYS you for bearing this.\n\nUNSYSTEMATIC (firm-specific/diversifiable): CEO scandal, product failure, lawsuit. Affects ONE firm. You CAN eliminate it by holding ~20 different stocks. The market does NOT pay for this \u2014 why would it? You can remove it for free.\n\nTotal risk = Systematic + Unsystematic. As you add stocks to a portfolio, unsystematic risk falls toward zero but systematic risk remains. Beta measures ONLY the systematic part."},
{h:"Beta \u2014 'for every 1% the market moves'",b:"\u03b2 = 1.0: Stock moves exactly with the market. 1% market rise \u2192 1% stock rise.\n\u03b2 = 1.5: Stock is 50% MORE volatile. 1% market rise \u2192 1.5% stock rise. More risk, more return.\n\u03b2 = 0.7: Stock is 30% LESS volatile. 1% market rise \u2192 0.7% stock rise. Safer, lower return.\n\u03b2 = 0: Stock unaffected by market (only unsystematic risk). Return = Rf only.\n\u03b2 < 0: Stock moves OPPOSITE to market (very rare, e.g., gold in crises).\n\nIn practice: Utilities \u03b2\u22480.5 (stable, defensive). Banks \u03b2\u22481.3 (cyclical). Tech \u03b2\u22481.5+ (volatile, growth)."},
{h:"SML \u2014 the fair-price line (exam favourite)",b:"Draw axes: X = beta, Y = expected return.\nTwo anchor points: (0, Rf) and (1, Rm).\nDraw a straight line through them. This is the SML.\n\nEvery stock SHOULD sit on this line. If a stock is:\n\u2022 ABOVE the SML: It returns MORE than it should for its risk \u2192 undervalued \u2192 BUY\n\u2022 BELOW the SML: It returns LESS than it should \u2192 overvalued \u2192 SELL\n\u2022 ON the SML: Fairly priced \u2192 HOLD\n\nExam wording: 'The stock currently yields 14%. CAPM says it should yield 14.2%. Since 14% < 14.2%, the stock is BELOW the SML and therefore OVERVALUED.'"},
{h:"CAPM vs DGM \u2014 know both, compare them",b:"CAPM: Ke = Rf + \u03b2(Rm\u2212Rf)\n\u2022 Works for ALL stocks (even non-dividend-payers)\n\u2022 Explicitly models risk through beta\n\u2022 Requires Rf, Rm, and \u03b2 estimates\n\u2022 Beta is unstable over time (weakness)\n\nDGM: Ke = D\u2081/P\u2080 + g\n\u2022 Only works for dividend-paying firms with stable growth\n\u2022 Implicitly captures risk (buried in r and g)\n\u2022 Requires dividend data and growth estimate\n\u2022 Growth estimate (g) is often unreliable (weakness)\n\nConclusion: CAPM is generally PREFERRED because it models risk explicitly. Use DGM as a secondary check or when beta data isn't available."},
{h:"Fama & French critique \u2014 what to say in essays",b:"Fama & French (1992) tested CAPM empirically and found:\n\u2022 Beta ALONE has weak explanatory power for returns\n\u2022 Two additional factors explain returns much better:\n  \u2014 SIZE: Small-cap stocks earn higher returns than large-cap\n  \u2014 VALUE: High book-to-market stocks earn more than low B/M\n\u2022 This led to the THREE-FACTOR MODEL: R = Rf + \u03b2(Rm\u2212Rf) + s\u00d7SMB + h\u00d7HML\n\nDoes this kill CAPM? Not entirely. CAPM remains the industry standard because:\n(1) It's simpler, (2) The additional factors may represent compensation for different TYPES of risk, (3) 'The worst model except for all the others.'"}],
pq:[
{q:"Rf=3%, Rm=11%. Stock A: \u03b2=1.4, Stock B: \u03b2=0.7.\n(a) Find expected return for each.\n(b) Stock A currently yields 14%. Is it overvalued or undervalued?\n(c) What is the market risk premium?",a:"(a) Apply SML: E(R) = Rf + \u03b2(Rm\u2212Rf)\n\nStock A: E(R) = 3% + 1.4 \u00d7 (11%\u22123%)\n              = 3% + 1.4 \u00d7 8%\n              = 3% + 11.2% = 14.2%\n\nStock B: E(R) = 3% + 0.7 \u00d7 8%\n              = 3% + 5.6% = 8.6%\n\n(b) CAPM says A should yield 14.2%.\n    A currently yields 14%.\n    14% < 14.2% \u2192 BELOW the SML \u2192 OVERVALUED.\n    The stock doesn't give enough return for its risk.\n    Investors would sell \u2192 price falls \u2192 yield rises to 14.2%.\n\n(c) MRP = Rm \u2212 Rf = 11% \u2212 3% = 8%\n    This is the extra return the market as a whole\n    demands above the risk-free rate."},
{q:"Given data: Cov(Stock, Market) = 0.006, Var(Market) = 0.004.\nRf = 2%, Rm = 10%.\n(a) Calculate beta.\n(b) Find the expected return.\n(c) If the stock actually yields 12%, is it a good buy?",a:"(a) \u03b2 = Cov/Var = 0.006/0.004 = 1.5\n\n    The stock is 50% more volatile than the market.\n\n(b) E(R) = 2% + 1.5 \u00d7 (10%\u22122%) = 2% + 12% = 14%\n\n(c) CAPM says 14%, stock yields only 12%.\n    12% < 14% \u2192 BELOW SML \u2192 OVERVALUED.\n    NOT a good buy. You're not compensated for\n    the risk you're taking."}
]},

{id:7,t:"Derivatives & FOREX",i:"\ud83c\udf10",co:"#117a65",ch:"Risk Management & Currency",
kp:[
"A DERIVATIVE is a contract whose value depends on (is 'derived from') the price of something else \u2014 the 'underlying'. The underlying can be a commodity (oil, wheat), a financial asset (shares, bonds), a currency, or an interest rate.",
"FORWARD contract: two parties agree NOW on a price for a transaction that happens in the FUTURE. No money changes hands today. OTC (private, customised), with counterparty risk (other party might default).",
"FUTURES contract: same concept as a forward but STANDARDISED and traded on an EXCHANGE. The exchange's clearing house guarantees both sides, eliminating counterparty risk. Positions are marked-to-market DAILY.",
"Marking-to-market means your account is adjusted every day based on price changes. If the price moves against you, money is deducted. If it falls below the maintenance margin, you get a MARGIN CALL (must deposit more cash).",
"OPTIONS give the buyer the RIGHT but NOT THE OBLIGATION to buy (call) or sell (put) at a specific price (exercise/strike price). The buyer pays a PREMIUM for this right. The seller (writer) must fulfil if the buyer exercises.",
"Options have ASYMMETRIC payoff: the buyer's maximum loss is limited to the premium, but upside is unlimited. The seller faces the opposite \u2014 limited gain (premium) but potentially unlimited loss.",
"SWAPS: two parties agree to exchange cash flows. Most common: plain vanilla interest rate swap (exchange fixed for floating payments). Both benefit from CERTAINTY about their cash flows.",
"Three uses of derivatives: HEDGING (reducing risk), SPECULATION (betting on direction), ARBITRAGE (exploiting price differences for risk-free profit). Derivatives are ZERO-SUM games between counterparties.",
"FOREX: exchange rate = price of one currency in terms of another. Direct quote = home currency per unit of foreign. Bid = price market pays to buy. Ask = price market sells at. Spread = ask \u2212 bid = the dealer's profit.",
"PPP says exchange rates adjust for inflation differences. If UK inflation > US inflation, the pound weakens (depreciates) to maintain purchasing power equivalence.",
"IRP says interest rate differences between countries are offset by the forward exchange rate. No arbitrage: investing domestically or converting-investing-converting back gives the same return.",
"Three FX risks: TRANSACTION (a specific payment changes value before settlement), TRANSLATION (overseas accounts change when consolidated), ECONOMIC (long-term competitiveness affected by currency strength)."],
fm:[
{n:"Call Option Profit",eq:"Profit = max(S\u2212E, 0) \u2212 Premium",c:"S = spot price at maturity. E = exercise/strike price. You exercise only if S > E (buying the asset cheaper than market). Profit = payoff minus what you paid for the option."},
{n:"Put Option Profit",eq:"Profit = max(E\u2212S, 0) \u2212 Premium",c:"You exercise only if E > S (selling the asset for more than market price). Maximum loss = premium. The put is insurance against the price falling."},
{n:"Margin Call Trigger",eq:"When margin balance < maintenance margin",c:"You must deposit additional funds to bring the balance back up to the INITIAL margin (not maintenance). If you don't, your position is closed."},
{n:"Relative PPP",eq:"\u0394FX \u2248 Inflation_domestic \u2212 Inflation_foreign",c:"If domestic inflation is 2% higher than foreign, the domestic currency should depreciate by roughly 2%. This is a LONG-RUN tendency."},
{n:"Covered IRP",eq:"<span class=fr><span class=fr-t>F</span><span class=fr-b>S</span></span> = <span class=fr><span class=fr-t>1 + r<sub>domestic</sub></span><span class=fr-b>1 + r<sub>foreign</sub></span></span>",c:"The forward rate adjusts so that investing at home or abroad gives the same return when you hedge the FX risk. No free lunch from interest rate differences."}],
dd:"Derivatives exist because businesses face price uncertainty. A farmer doesn't know what wheat will sell for at harvest. An airline doesn't know next quarter's fuel price. A UK exporter doesn't know what the dollar will be worth when they receive payment. Derivatives let these parties LOCK IN prices today for future transactions.\n\nForwards vs Futures: Imagine buying a tailored suit (forward) vs buying off the rack (futures). The tailored suit fits perfectly (customised terms) but if the tailor goes bankrupt before delivery, you're stuck (counterparty risk). The off-the-rack suit comes in standard sizes (standardised contracts) but the department store guarantees it (clearing house \u2014 no counterparty risk). The store also requires a deposit (margin) and adjusts your account daily (mark-to-market).\n\nOptions: The key insight is ASYMMETRY. When you buy a call option, the most you can lose is the premium (like losing your insurance premium if your house doesn't burn down). But if the price soars, your profit is unlimited. The seller faces the mirror image \u2014 limited gain, unlimited potential loss. This is why option selling is risky and option buying is popular for hedging.\n\nFOREX is the world's largest market ($7.5 trillion/day). PPP explains long-run trends (Big Mac Index shows currencies should equalise purchasing power). IRP explains why forward rates differ from spot rates (interest differentials are offset so there's no arbitrage). In practice, firms face three types of FX risk and can hedge externally (derivatives) or internally (leading/lagging, netting, FX borrowing).",
tf:[
{h:"Options as insurance \u2014 the complete analogy",b:"Home insurance: You pay a premium. If your house burns down (price falls below exercise), the insurance pays out. If nothing happens (price stays high), you lose the premium but you're happy because your house is fine.\n\nCall option: Pay premium. If stock price rises above exercise price, you profit. If not, you lose only the premium. Your downside is CAPPED.\n\nPut option: Pay premium. If stock price falls below exercise price, you profit (you can sell at the higher exercise price). Like insuring your shares against a crash.\n\nKey exam question: 'Should you exercise when payoff is positive but less than premium?' YES! You exercise to RECOVER some of the premium cost. E.g., payoff = \u00a32, premium = \u00a34: exercising gives you a net loss of \u00a32, not exercising gives net loss of \u00a34."},
{h:"Forwards vs Futures \u2014 the six-point comparison table",b:"1. TERMS: Forward = customised (negotiated). Futures = standardised (set by exchange).\n2. TRADING: Forward = OTC (private, between two parties). Futures = on exchange (public, regulated).\n3. CLEARING: Forward = none. Futures = clearing house acts as buyer to every seller, seller to every buyer.\n4. COUNTERPARTY RISK: Forward = YES (other party might default). Futures = NO (exchange guarantees).\n5. LIQUIDITY: Forward = low (hard to exit early). Futures = high (can sell your position).\n6. SETTLEMENT: Forward = held to maturity (physical delivery). Futures = usually closed before maturity (cash settlement).\n\nIn an essay, present this as a clear comparison. In a calculation, futures involve margin accounts (mark-to-market)."},
{h:"Margin account tracking \u2014 the complete method",b:"Setup: Entry price, number of contracts, initial margin, maintenance margin.\n\nDraw a table:\nDay | Price | Daily P&L | Cumulative Balance | Margin Call?\n\nDay 1: Price = entry, Balance = initial margin.\nEach subsequent day:\n  P&L = (Today's price \u2212 Yesterday's price) \u00d7 Number of contracts\n  New balance = Previous balance + P&L\n  If balance < maintenance margin \u2192 MARGIN CALL\n    Deposit = initial margin \u2212 current balance\n    New balance = initial margin (topped up)\n\nFinal: Net P&L = (Final price \u2212 Entry price) \u00d7 Contracts\nTotal cash committed = initial margin + sum of all margin call deposits."},
{h:"Three FX risks \u2014 know the distinction",b:"TRANSACTION risk: A UK firm is owed $1m from a US customer, payable in 3 months. If the pound strengthens ($/\u00a3 rises), those dollars convert to fewer pounds. IMMEDIATE, SPECIFIC, CASH impact.\n\nTRANSLATION risk: A UK firm has a subsidiary in Japan. When consolidating accounts, the \u00a5 value of assets must be converted to \u00a3. If the yen weakens, the subsidiary's assets APPEAR smaller on the consolidated balance sheet. NO actual cash lost \u2014 it's an ACCOUNTING issue.\n\nECONOMIC risk: A UK manufacturer competes with Chinese imports. If the pound strengthens, UK exports become more expensive and Chinese imports cheaper. The firm loses COMPETITIVENESS over the LONG TERM.\n\nHedging methods: External (forwards, futures, options, swaps). Internal (leading/lagging = timing payments, netting = offsetting subsidiary payments, FX borrowing = borrowing in the exposed currency)."}],
pq:[
{q:"Buy a European call option: exercise price = \u00a350, premium = \u00a34.\nStock price at maturity: (a) \u00a360 (b) \u00a352 (c) \u00a345.\nFor each: exercise or not? Profit/loss?",a:"FORMULA: Profit = max(S\u2212E, 0) \u2212 Premium\n\n(a) S = \u00a360:\nPayoff = max(60\u221250, 0) = \u00a310\nProfit = 10 \u2212 4 = +\u00a36\nExercise? YES \u2014 buy at \u00a350 what's worth \u00a360.\n\n(b) S = \u00a352:\nPayoff = max(52\u221250, 0) = \u00a32\nProfit = 2 \u2212 4 = \u2212\u00a32\nExercise? YES! Even though you make a net loss,\nexercising recovers \u00a32 of your \u00a34 premium.\nNot exercising = \u2212\u00a34 loss. Exercising = only \u2212\u00a32.\n\n(c) S = \u00a345:\nPayoff = max(45\u221250, 0) = \u00a30\nProfit = 0 \u2212 4 = \u2212\u00a34\nExercise? NO \u2014 buying at \u00a350 when market is \u00a345\nwould add loss on top of lost premium.\n\nBreak-even: E + Premium = \u00a350 + \u00a34 = \u00a354.\nMax loss = \u00a34 (the premium). Upside = unlimited."},
{q:"Long 5 futures at \u00a3500 each.\nInitial margin = \u00a3500 total. Maintenance = \u00a3375.\nDay 2: \u00a3490, Day 3: \u00a3470, Day 4: \u00a3485, Day 5: \u00a3510.\nTrack the margin account.",a:"Day 1: Price=\u00a3500, Balance=\u00a3500\n\nDay 2: P&L = (490\u2212500)\u00d75 = \u2212\u00a350\n  Balance = 500\u221250 = \u00a3450\n  Call? No (450 > 375 maintenance)\n\nDay 3: P&L = (470\u2212490)\u00d75 = \u2212\u00a3100\n  Balance = 450\u2212100 = \u00a3350\n  Call? YES (350 < 375 maintenance)\n  Deposit: 500\u2212350 = +\u00a3150\n  New balance: \u00a3500 (back to initial)\n\nDay 4: P&L = (485\u2212470)\u00d75 = +\u00a375\n  Balance = 500+75 = \u00a3575\n  Call? No\n\nDay 5: P&L = (510\u2212485)\u00d75 = +\u00a3125\n  Balance = 575+125 = \u00a3700\n  Call? No\n\nSUMMARY:\nNet P&L = (510\u2212500) \u00d7 5 = +\u00a350 profit\nTotal cash deposited = 500 + 150 = \u00a3650\nFinal balance = \u00a3700\nReturn on cash = 50/650 = 7.7%\n\nKey: Margin call tops up to INITIAL (500),\nnot maintenance (375)."}
]},

{id:8,t:"WACC & Modigliani-Miller",i:"\ud83c\udfd7\ufe0f",co:"#6c3483",ch:"Capital Structure & Cost of Capital",
kp:[
"WACC = Weighted Average Cost of Capital. It's the MINIMUM return a firm must earn on its investments. If a project earns less than WACC, it's destroying value. Think of it as the 'hurdle rate'.",
"Firms fund themselves with a MIX of debt, preference shares, and ordinary equity. Each has a different cost. WACC blends them into one rate, weighted by how much of each the firm uses.",
"Cost of Debt AFTER TAX: Kdt = Kd \u00d7 (1\u2212T). Interest is tax-deductible, so the REAL cost to the firm is lower than the stated interest rate. This is the #1 thing students forget.",
"Cost of Preference Shares: Kps = Annual Dividend / Market Price. Simple perpetuity. Preference dividends are NOT tax-deductible (unlike debt interest).",
"Cost of Ordinary Shares has TWO methods: DGM (Kos = D\u2081/P\u2080 + g) uses dividend data. CAPM (Kos = Rf + \u03b2(Rm\u2212Rf)) uses market risk data. Use whichever the exam provides data for.",
"ALWAYS use MARKET VALUES for weights, not book values. Market values reflect what the capital is actually worth today. Book values are historical and often outdated.",
"MM 1958 (no tax): The 'pizza analogy' \u2014 cutting a pizza into more slices doesn't give you more pizza. Similarly, changing the debt/equity mix doesn't change total firm value. VL = VU.",
"MM 1958 Prop II: Adding cheap debt makes equity MORE EXPENSIVE (shareholders face more risk). The benefit of cheap debt is EXACTLY offset by costlier equity. WACC stays constant.",
"MM 1963 (with tax): Interest is tax-deductible, creating a TAX SHIELD worth T\u00d7D. VL = VU + TD. More debt = more tax savings = higher firm value. WACC falls with leverage.",
"But 100% debt is absurd because FINANCIAL DISTRESS COSTS rise: legal fees (direct), lost customers and employees (indirect), fire sales of assets. Eventually these outweigh the tax shield.",
"TRADE-OFF THEORY: The optimal capital structure is where the MARGINAL tax shield equals the MARGINAL distress cost. In practice, most firms use 30\u201360% debt."],
fm:[
{n:"WACC",eq:"WACC = Kd(1\u2212T)\u00d7Wd + Kps\u00d7Wps + Kos\u00d7Wos",c:"The blended cost of all capital. Each component cost is multiplied by its proportion of total market value. This is the discount rate for firm valuation."},
{n:"After-tax Cost of Debt",eq:"K<sub>dt</sub> = K<sub>d</sub> × (1 \u2212 T)",c:"Interest payments reduce taxable profit. If Kd=6% and T=25%, the real cost is only 4.5%. THE most common exam mistake is forgetting this tax adjustment."},
{n:"Cost of Pref Shares",eq:"K<sub>ps</sub> = <span class=fr><span class=fr-t>Div</span><span class=fr-b>P<sub>0</sub></span></span>",c:"Fixed dividend divided by current market price. A simple flat perpetuity. Note: preference dividends are NOT tax-deductible."},
{n:"Cost of Equity (DGM)",eq:"K<sub>os</sub> = <span class=fr><span class=fr-t>D<sub>1</sub></span><span class=fr-b>P<sub>0</sub></span></span> + g",c:"Dividend yield (D\u2081/P\u2080) plus expected growth (g). Only works for stable dividend-paying firms."},
{n:"Cost of Equity (CAPM)",eq:"K<sub>os</sub> = R<sub>f</sub> + \u03b2(R<sub>m</sub> \u2212 R<sub>f</sub>)",c:"Risk-free rate plus beta times market risk premium. Works for all firms. Generally preferred over DGM."},
{n:"MM 1958 Prop I",eq:"V<sub>L</sub> = V<sub>U</sub>",c:"Without tax: levered firm value = unlevered firm value. Capital structure is IRRELEVANT to total value. The pizza analogy."},
{n:"MM 1963 Prop I",eq:"V<sub>L</sub> = V<sub>U</sub> + T × D",c:"With tax: levered firm is worth MORE by exactly the tax shield. E.g., VU=\u00a310m, T=25%, D=\u00a34m \u2192 VL = 10+1 = \u00a311m."},
{n:"MM Prop II (no tax)",eq:"K<sub>e</sub> = K<sub>u</sub> + (K<sub>u</sub> \u2212 K<sub>d</sub>) × <span class=fr><span class=fr-t>D</span><span class=fr-b>E</span></span>",c:"Cost of equity rises linearly with leverage. Ku = unlevered cost of equity. More debt \u2192 higher Ke \u2192 but WACC stays constant (no tax) or falls (with tax)."}],
dd:"This lecture answers: 'Does it matter how a firm is financed?'\n\nThe pizza analogy (MM 1958): A pizza is a pizza. Cutting it into 8 slices instead of 4 gives you the same total pizza. The 'pizza' is the firm's total value (from its assets/projects). The 'slices' are how that value is divided between debt-holders and equity-holders. Rearranging the slices (capital structure) doesn't change the total.\n\nBut WHY? Because if you add cheap debt, shareholders face MORE risk (they get paid last, after interest). So they demand higher returns. The saving from cheap debt is exactly offset by more expensive equity. WACC stays constant. Elegant logic, but requires perfect markets.\n\nThen taxes enter (MM 1963): In reality, interest payments are tax-deductible. A firm paying \u00a3100 in interest saves \u00a325 in tax (at 25%). This \u00a325 is 'free money' from the government \u2014 the tax shield. Over time, the PV of all future tax shields = T\u00d7D. So VL = VU + TD. More debt = more free money.\n\nSo why not 100% debt? Because financial distress costs EXPLODE at high leverage. Direct: bankruptcy lawyers, accountants, court costs. Indirect (and much larger): customers stop buying (will your warranty be honoured?), suppliers demand cash upfront, best employees leave for safer firms, assets sold at fire-sale prices. Eventually these costs EXCEED the tax shield.\n\nThe Trade-off: Graph tax shield benefit (rising with debt) against distress costs (also rising, but accelerating at high debt). The optimal point is where the two lines' slopes are equal. This gives the value-maximising capital structure.",
tf:[
{h:"WACC calculation \u2014 the complete checklist",b:"STEP 1: Cost of each source\n\u2022 Debt: Find the interest rate or YTM. Adjust for tax: Kdt = Kd\u00d7(1\u2212T). DON'T FORGET TAX.\n\u2022 Pref shares: Kps = Div/Price. No tax adjustment (dividends aren't deductible).\n\u2022 Ordinary shares: DGM = D\u2081/P\u2080+g, or CAPM = Rf+\u03b2(Rm\u2212Rf). Use whichever has data.\n\nSTEP 2: Weights \u2014 MARKET values\n\u2022 Equity: Number of shares \u00d7 share price\n\u2022 Debt: Market value of bonds (or book value if not given)\n\u2022 Total V = D + PS + OS\n\u2022 Each weight = component/V\n\nSTEP 3: WACC = sum of (cost \u00d7 weight) for each component.\n\nCommon mistakes: (1) Forgetting tax on debt. (2) Using book values. (3) Using pre-tax Kd. (4) Forgetting that pref shares are a separate component."},
{h:"The pizza analogy \u2014 understanding MM 1958 deeply",b:"Imagine a firm generates \u00a3100k per year forever from its projects.\n\nFinanced 100% equity: Shareholders get all \u00a3100k. If they demand 10%, firm value = 100k/0.10 = \u00a31m.\n\nFinanced 50/50: Debt-holders get \u00a350k (at, say, 5%). Shareholders get \u00a350k but now demand 15% (more risk). Debt value = 50k/0.05 = \u00a31m. Equity value = 50k/0.15 = \u00a3333k. Total = \u00a31.333m?\n\nWait \u2014 that's wrong. MM says total must still be \u00a31m. The equity holders can't REALLY demand 15% in equilibrium. The market adjusts prices so total value stays at \u00a31m. Any deviation creates arbitrage that's quickly corrected.\n\nThis is the profound insight: you can't create value by financial engineering alone. Value comes from ASSETS, not from how you slice the ownership."},
{h:"Tax shield \u2014 the worked example",b:"Firm has debt of \u00a34m. Tax rate = 25%. Interest rate = 6%.\n\nAnnual interest = \u00a34m \u00d7 6% = \u00a3240,000\nTax saving = \u00a3240,000 \u00d7 25% = \u00a360,000 per year\n\nWithout the debt, the firm would pay \u00a360,000 MORE in tax every year. The government is effectively subsidising the firm's borrowing.\n\nPV of the tax shield (assuming perpetual debt) = T \u00d7 D = 25% \u00d7 \u00a34m = \u00a31m.\n\nSo: VL = VU + \u00a31m. The firm is worth \u00a31m MORE just because it has debt. This is why MM 1963 says 'more debt = more value.'"},
{h:"The three-act play \u2014 essay structure for capital structure",b:"ACT 1 (MM 1958 \u2014 no tax): Structure irrelevant. VL = VU. WACC constant. Pizza doesn't change.\n\nACT 2 (MM 1963 \u2014 with tax): Tax shield creates value. VL = VU + TD. More debt = higher value. WACC falls. Implication: 100% debt is optimal.\n\nACT 3 (Trade-off): But 100% debt = bankruptcy. Financial distress costs (direct + indirect) rise with leverage. Optimal structure = where marginal tax shield = marginal distress cost.\n\nCODA (Practice): Most firms use moderate leverage. Industry matters (utilities vs tech). Agency costs between shareholders and creditors add further complexity.\n\nThis structure earns high marks because it shows progression of thought, not just listing facts."}],
pq:[
{q:"Equity: \u00a36m (\u03b2=1.2, Rf=4%, Rm=12%).\nPref shares: \u00a31.5m (div=\u00a30.80, price=\u00a310).\nBonds: \u00a32.5m (YTM=6%).\nTax rate = 25%.\nCalculate WACC.",a:"STEP 1 \u2014 Cost of each source:\n\nCost of Equity (CAPM):\nKos = 4% + 1.2 \u00d7 (12% \u2212 4%)\n    = 4% + 1.2 \u00d7 8% = 4% + 9.6% = 13.6%\n\nCost of Preference Shares:\nKps = \u00a30.80 / \u00a310 = 8%\n(No tax adjustment \u2014 dividends aren't deductible)\n\nCost of Debt (AFTER TAX!):\nKdt = 6% \u00d7 (1 \u2212 0.25) = 6% \u00d7 0.75 = 4.5%\n\nSTEP 2 \u2014 Market value weights:\nTotal V = 6 + 1.5 + 2.5 = \u00a310m\nWos = 6/10 = 0.60\nWps = 1.5/10 = 0.15\nWd  = 2.5/10 = 0.25\nCheck: 0.60+0.15+0.25 = 1.00 \u2713\n\nSTEP 3 \u2014 WACC:\n= Kdt\u00d7Wd + Kps\u00d7Wps + Kos\u00d7Wos\n= 4.5%\u00d70.25 + 8%\u00d70.15 + 13.6%\u00d70.60\n= 1.125% + 1.200% + 8.160%\n= 10.49%\n\nThe firm must earn \u226510.49% on investments.\nAny project with IRR < 10.49% destroys value."},
{q:"MM 1963: A firm has VU = \u00a320m, Debt = \u00a38m, Tax = 30%.\n(a) What is VL?\n(b) What is the value of the tax shield?\n(c) Why doesn't the firm use 100% debt?",a:"(a) VL = VU + T\u00d7D = \u00a320m + 0.30\u00d7\u00a38m = \u00a320m + \u00a32.4m\n    VL = \u00a322.4m\n\n(b) Tax shield = T\u00d7D = 0.30 \u00d7 \u00a38m = \u00a32.4m\n    The firm is worth \u00a32.4m MORE simply because\n    it uses debt instead of equity. The government\n    'subsidises' the interest through tax relief.\n\n(c) Because MM 1963 ignores FINANCIAL DISTRESS:\n    \u2022 Direct costs: Lawyers, accountants, court fees\n    \u2022 Indirect costs: Customers flee (warranty risk),\n      suppliers demand cash upfront, best employees\n      leave, assets sold at fire-sale prices\n    \u2022 Trade-off theory: optimal D where marginal tax\n      shield = marginal distress cost\n    \u2022 In practice: no firm uses 0% or 100% debt."}
]},

{id:9,t:"Dividend Policy",i:"\ud83d\udcb0",co:"#d4ac0d",ch:"Dividends vs Retained Earnings",
kp:[
"The DIVIDEND POLICY question: should a firm pay out its earnings as dividends, or retain and reinvest them? Does the choice affect the share price?",
"MM DIVIDEND IRRELEVANCE: In a perfect world (no taxes, no transaction costs, perfect information), dividend policy does NOT affect firm value. The logic: if a firm retains earnings, they're reinvested and create growth that exactly compensates for the lost dividend.",
"HOMEMADE DIVIDENDS: If a firm doesn't pay enough dividends, an investor can sell some shares. If it pays too much, they can reinvest by buying more shares. Either way, the investor gets the cash flow they want.",
"The KEY to the MM proof: share price is IDENTICAL at any payout ratio IF the firm reinvests retained earnings at a rate equal to the cost of equity (ROE = Ke). Growth from reinvestment exactly compensates for lower dividends.",
"BIRD-IN-THE-HAND (Gordon 1959): Investors prefer a certain dividend NOW over an uncertain capital gain LATER. Therefore higher dividends = higher share price. MM's rebuttal: risk is already captured in the discount rate. Largely REFUTED but still debated.",
"TAX PREFERENCE: In most countries, dividends are taxed higher than capital gains (UK: dividends up to 39.35%, CG 10-20%). Plus CG tax can be DEFERRED until you sell. So investors should prefer LOW dividends. Higher payout = lower after-tax return.",
"SIGNALLING: Managers know more about the firm's future than investors. A dividend INCREASE signals confidence. A CUT signals trouble. This works because it's COSTLY TO FAKE \u2014 unsustainable increases lead to embarrassing cuts.",
"PECKING ORDER (Myers & Majluf): Because of information asymmetry (investors can't tell 'jewels' from 'lemons'), external financing is expensive. Firms prefer: (1) internal funds (cheapest) \u2192 (2) debt \u2192 (3) new equity (most expensive). Dividends only from leftover cash.",
"CLIENTELE EFFECT: Different investors prefer different payout levels. Pension funds need income (high dividends). Growth investors want retention (low dividends). Firms attract a 'clientele' matching their policy. Changing policy disrupts existing shareholders.",
"LINTNER (1956): Empirically, firms SMOOTH dividends. They set a target payout ratio but adjust gradually. Only increase when confident the new level is sustainable. Very reluctant to cut.",
"SHARE BUYBACKS: Increasingly used as a flexible alternative. No commitment to future payouts (unlike dividends). Often more tax-efficient. Signals management believes stock is undervalued. Boosts EPS by reducing share count."],
fm:[
{n:"Sustainable Growth Rate",eq:"g = Retention Ratio × ROE",c:"If a firm retains 60% of earnings and earns 10% ROE on those retained funds, it grows at 6% per year. Higher retention = higher growth but lower current dividends."},
{n:"Price (100% payout)",eq:"P = <span class=fr><span class=fr-t>Div</span><span class=fr-b>K<sub>e</sub></span></span>",c:"Flat perpetuity. No growth because nothing is retained. All earnings paid out. The simplest valuation."},
{n:"Price (partial payout)",eq:"P = <span class=fr><span class=fr-t>D<sub>1</sub></span><span class=fr-b>K<sub>e</sub> \u2212 g</span></span>",c:"Gordon Growth Model. Lower dividend but compensated by growth. g = retention \u00d7 ROE."},
{n:"MM Irrelevance Proof",eq:"If ROE = Ke, then P is the same for any payout ratio",c:"The value created by growth EXACTLY equals the value lost from lower dividends. This is the mathematical core of MM's argument."}],
dd:"This lecture asks: 'Does paying dividends make shareholders richer?' MM say no (in a perfect world). Everyone else says: 'Yes, but the real world has frictions that make dividend policy matter.'\n\nThe MM proof in plain English: A firm earns \u00a31 per share. If it pays out the full \u00a31, shareholders get cash but the firm doesn't grow. If it retains \u00a30.60 and reinvests at ROE = Ke = 10%, the firm grows at g = 0.60 \u00d7 10% = 6%. The dividend is only \u00a30.40, but the growth in future dividends makes up the difference. Share price = \u00a310 either way.\n\nWhy does every other theory disagree? Because the real world has FRICTIONS:\n\u2022 TAXES: Dividends taxed higher than capital gains \u2192 investors prefer low payout\n\u2022 INFORMATION ASYMMETRY: Investors don't know the firm's true prospects \u2192 dividend changes send SIGNALS\n\u2022 TRANSACTION COSTS: Selling shares isn't free \u2192 'homemade dividends' aren't costless\n\u2022 AGENCY PROBLEMS: Without dividends, managers might waste cash on bad projects\n\nThe Pecking Order is rooted in Akerlof's 'Lemons Problem': when selling a used car, the buyer can't tell if it's a good car ('jewel') or a bad one ('lemon'). So they assume the worst and offer a low price. Similarly, when a firm issues new shares, investors assume management knows the stock is OVERVALUED and discount accordingly. This makes external equity very expensive, so firms prefer internal funds.",
tf:[
{h:"The numerical MM proof \u2014 show this in the exam",b:"Given: Earnings = \u00a31/share, ROE = Ke = 10%\n\nScenario 1: 100% payout\nDiv = \u00a31.00, g = 0 (nothing retained)\nP = Div/Ke = 1.00/0.10 = \u00a310.00\n\nScenario 2: 40% payout\nDiv = \u00a30.40, Retention = 60%\ng = 0.60 \u00d7 10% = 6%\nP = D\u2081/(Ke\u2212g) = 0.40/(0.10\u22120.06) = 0.40/0.04 = \u00a310.00\n\nSAME PRICE! The growth from reinvestment exactly compensates for the lower dividend.\n\nWHEN DOES THIS BREAK?\n\u2022 ROE > Ke: Retention adds value \u2192 lower payout = HIGHER price\n\u2022 ROE < Ke: Retention destroys value \u2192 higher payout = HIGHER price\n\u2022 Real world: Taxes, signalling, and transaction costs make policy matter."},
{h:"Signalling \u2014 why it works (costly to fake)",b:"A firm raises its dividend from \u00a32 to \u00a32.50. This COMMITS the firm to paying \u00a32.50 per share every year. If the firm can't sustain this, it will face:\n\u2022 An embarrassing dividend CUT later\n\u2022 A large share price DROP (negative signal)\n\u2022 Loss of investor confidence\n\nBecause the consequences of an unsustainable increase are SEVERE, only firms that genuinely expect higher future earnings will raise dividends. This is why dividends are credible signals. Cheap talk (press releases, forecasts) can be faked. Dividend commitments can't."},
{h:"Pecking Order \u2014 the lemons logic chain",b:"(1) Firm needs \u00a310m for a new project.\n(2) Manager knows the project is great (insider info).\n(3) If they issue shares, investors think: 'Why are they diluting? The stock must be overvalued.' Investors discount the share price.\n(4) This makes external equity EXPENSIVE (the firm gives away too many shares for too little money).\n(5) Debt is better (lenders have priority, so info asymmetry matters less).\n(6) Internal funds are BEST (no external scrutiny at all).\n\nPecking order: Internal funds \u2192 Debt \u2192 Equity.\nDividends are only paid from leftover cash AFTER all profitable projects are funded."},
{h:"Essay structure for dividend policy",b:"Start with MM as the theoretical BASELINE (perfect world \u2192 irrelevant).\nThen layer on real-world FRICTIONS one by one:\n\u2022 Taxes \u2192 Tax Preference theory\n\u2022 Information asymmetry \u2192 Signalling + Pecking Order\n\u2022 Investor heterogeneity \u2192 Clientele Effect\n\nAdd empirical evidence: Lintner's smoothing, buyback trends.\n\nConclude: 'In theory, dividend policy is irrelevant. In practice, the frictions of taxes, information asymmetry, and investor preferences make it one of the most actively debated topics in corporate finance.'"}],
pq:[
